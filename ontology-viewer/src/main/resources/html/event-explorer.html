<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="assets/tailwindcss-cdn.js"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://unpkg.com/@sgratzl/chartjs-chart-boxplot@4"></script>
    <script src="https://unpkg.com/chartjs-chart-matrix@2"></script>
    <script src="assets/lucide.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        #context-menu {
            position: fixed;
            z-index: 60;
            min-width: 15rem;
            padding: 0.4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            background: rgba(15, 23, 42, 0.98);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(18px);
            color: #e2e8f0;
        }

        #context-menu .ctx-header {
            padding: 0.45rem 0.6rem 0.35rem;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #94a3b8;
        }

        #context-menu .ctx-item {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.5rem 0.6rem;
            border-radius: 0.55rem;
            cursor: pointer;
            font-size: 0.875rem;
            line-height: 1.25rem;
            color: #e2e8f0;
        }

        #context-menu .ctx-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        #context-menu .ctx-separator {
            height: 1px;
            margin: 0.35rem 0.2rem;
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
    
    
    </head>
<body class="antialiased bg-slate-950 text-slate-100 font-inter h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <div id="header" class="flex items-center gap-4 border-b border-white/10 bg-slate-900/80 px-5 py-4 backdrop-blur">
        <button id="back-btn" type="button" onclick="javaBridge.navigateBack()" class="inline-flex items-center gap-2 rounded-md border border-white/10 bg-white/5 px-3 py-1.5 text-xs font-medium text-slate-100 transition hover:border-white/20 hover:bg-white/10">
            <i data-lucide="chevron-left" class="h-4 w-4"></i>
            <span>Back</span>
        </button>
        <h1 class="ml-2 flex items-center gap-2 text-base font-semibold tracking-tight text-slate-50"><i data-lucide="bar-chart-3" class="w-4.5 h-4.5"></i> Event Explorer</h1>
        <span id="stats" class="ml-2 text-xs text-slate-400"></span>
    </div>

    <!-- Histogram -->
    <div id="histogram-area" class="h-60 min-h-[180px] flex flex-col flex-shrink-0 p-2 border-b border-white/10 bg-slate-800 overflow-hidden">
        <div id="histogram-controls" class="flex items-center gap-4 pb-2 flex-wrap shrink-0">
            <div class="control-group flex items-center gap-2 flex-wrap">
                <span class="control-label text-xs uppercase tracking-wide text-slate-300 mr-1">Period:</span>
                <button class="ctrl-btn period-btn active px-3 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-unit="auto" onclick="setPeriod('auto')">Auto</button>
                <button class="ctrl-btn period-btn px-3 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-unit="day" onclick="setPeriod('day')">Day</button>
                <button class="ctrl-btn period-btn px-3 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-unit="week" onclick="setPeriod('week')">Week</button>
                <button class="ctrl-btn period-btn px-3 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-unit="month" onclick="setPeriod('month')">Month</button>
                <button class="ctrl-btn period-btn px-3 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-unit="quarter" onclick="setPeriod('quarter')">Quarter</button>
                <button class="ctrl-btn period-btn px-3 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-unit="year" onclick="setPeriod('year')">Year</button>
            </div>
            <div class="control-group ml-auto flex items-center gap-2">
                <span class="control-label text-xs uppercase tracking-wide text-slate-300 mr-1">View:</span>
                <button class="ctrl-btn chart-btn active px-2 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-chart="bar" onclick="setChartType('bar')" title="Stacked bars"><i data-lucide="bar-chart-3" class="w-3.5 h-3.5"></i> Bars</button>
                <button class="ctrl-btn chart-btn px-2 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-chart="line" onclick="setChartType('line')" title="Line chart"><i data-lucide="trending-up" class="w-3.5 h-3.5"></i> Lines</button>
                <button class="ctrl-btn chart-btn px-2 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-chart="area" onclick="setChartType('area')" title="Stacked area"><i data-lucide="layers" class="w-3.5 h-3.5"></i> Area</button>
                <button class="ctrl-btn chart-btn px-2 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-chart="cumulative" onclick="setChartType('cumulative')" title="Cumulative line"><i data-lucide="arrow-up-right" class="w-3.5 h-3.5"></i> Cumul.</button>
                <button class="ctrl-btn chart-btn px-2 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-chart="boxplot" onclick="setChartType('boxplot')" title="Box plot"><i data-lucide="box-select" class="w-3.5 h-3.5"></i> Box</button>
                <button class="ctrl-btn chart-btn px-2 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-chart="violin" onclick="setChartType('violin')" title="Violin plot"><i data-lucide="activity" class="w-3.5 h-3.5"></i> Violin</button>
                <button class="ctrl-btn chart-btn px-2 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-chart="pie" onclick="setChartType('pie')" title="Type distribution"><i data-lucide="pie-chart" class="w-3.5 h-3.5"></i> Donut</button>
                <button class="ctrl-btn chart-btn px-2 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-chart="scatter" onclick="setChartType('scatter')" title="Timeline scatter"><i data-lucide="circle-dot" class="w-3.5 h-3.5"></i> Scatter</button>
                <button class="ctrl-btn chart-btn px-2 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-chart="heatmap" onclick="setChartType('heatmap')" title="Day × Hour heatmap"><i data-lucide="grid-3x3" class="w-3.5 h-3.5"></i> Heat</button>
                <button class="ctrl-btn chart-btn px-2 py-1 rounded-md text-xs bg-slate-700 text-slate-100" data-chart="radar" onclick="setChartType('radar')" title="Day-of-week radar"><i data-lucide="radar" class="w-3.5 h-3.5"></i> Radar</button>
            </div>
        </div>
        <div id="histogram-chart-wrap" class="flex-1 min-h-0 relative">
            <canvas id="histogram-canvas" class="w-full h-full"></canvas>
        </div>
    </div>

    <!-- Context menu -->
    <div id="context-menu" class="hidden"></div>

    <!-- Content: table + detail -->
    <div id="content" class="flex-1 flex min-h-0 overflow-hidden">
        <div id="table-area" class="flex-1 flex flex-col overflow-hidden min-w-0 bg-slate-800">
            <div id="filter-bar" class="flex items-center gap-3 p-3 border-b border-white/10 bg-slate-800 flex-wrap">
                <span class="text-xs uppercase tracking-wide text-slate-300 flex-shrink-0">Filter:</span>
                <input type="text" id="search-input" placeholder="Search events..." oninput="applyFilters()" class="w-56 bg-slate-700 border border-white/10 rounded-md px-3 py-1 text-sm text-slate-100 outline-none">
                <div class="date-input-group flex items-center gap-2">
                    <span class="date-input-label text-xs uppercase tracking-wide text-slate-300">Timeframe:</span>
                    <input type="text" id="date-start" class="date-input bg-slate-700 border border-white/10 rounded-md px-2 py-1 text-sm text-slate-100" placeholder="Start date..." title="Start date and time">
                    <span class="date-range-separator text-sm text-slate-300">→</span>
                    <input type="text" id="date-end" class="date-input bg-slate-700 border border-white/10 rounded-md px-2 py-1 text-sm text-slate-100" placeholder="End date..." title="End date and time">
                    <button id="clear-dates-btn" onclick="clearDateRange()" disabled class="px-2 py-1 bg-slate-700 border border-white/10 rounded-md text-xs text-slate-200">Clear</button>
                    <span class="text-xs text-slate-400 whitespace-nowrap">Ctrl + wheel zooms</span>
                </div>
                <div id="type-chips" class="flex gap-1 flex-wrap"></div>
                <span id="match-count" class="text-xs text-slate-300"></span>
                <div id="filter-tags" class="flex gap-2 flex-wrap"></div>
                <div class="ml-auto flex gap-2 flex-shrink-0">
                    <button class="filter-action-btn px-2 py-1 bg-slate-700 border border-white/10 rounded-md text-xs text-slate-200" onclick="selectAllTypes()">All</button>
                    <button class="filter-action-btn px-2 py-1 bg-slate-700 border border-white/10 rounded-md text-xs text-slate-200" onclick="selectNoTypes()">None</button>
                    <button class="filter-action-btn px-2 py-1 bg-slate-700 border border-white/10 rounded-md text-xs text-slate-200" onclick="clearAllFilters()">Clear</button>
                </div>
            </div>
            <div id="table-scroll" class="flex-1 overflow-auto bg-slate-800">
                <table class="w-full border-separate border-spacing-y-1 text-sm" style="table-layout: fixed;">
                    <thead class="sticky top-0 z-10 bg-slate-800">
                        <tr class="bg-slate-800 text-slate-200 text-xs uppercase">
                            <th onclick="sortBy('label')" id="th-label" class="text-left p-3 font-semibold w-1/3">Name <span class="sort-arrow"><i data-lucide="chevron-up" class="w-3 h-3"></i></span></th>
                            <th onclick="sortBy('type')" id="th-type" class="text-left p-3 font-semibold w-1/4">Type <span class="sort-arrow"><i data-lucide="chevron-up" class="w-3 h-3"></i></span></th>
                            <th onclick="sortBy('start')" id="th-start" class="text-left p-3 font-semibold w-1/3">Timestamp <span class="sort-arrow"><i data-lucide="chevron-up" class="w-3 h-3"></i></span></th>
                        </tr>
                    </thead>
                    <tbody id="event-tbody"></tbody>
                </table>
            </div>
            <div id="table-pagination" class="flex items-center gap-2 px-4 py-2 border-t border-white/10 bg-slate-800 shrink-0 text-xs text-slate-300">
                <button class="px-2 py-1 bg-slate-700 border border-white/10 rounded-md text-xs" onclick="prevPage()" id="page-prev">Prev</button>
                <button class="px-2 py-1 bg-slate-700 border border-white/10 rounded-md text-xs" onclick="nextPage()" id="page-next">Next</button>
                <span id="page-info"></span>
            </div>
        </div>

        <!-- Resizer between table and detail -->
        <div id="detail-resizer" class="h-full w-1 cursor-col-resize bg-transparent hover:bg-white/5" title="Drag to resize" style="touch-action:none;"></div>

        <!-- Detail panel -->
        <div id="detail-panel" class="w-72 min-w-[20rem] border-l border-white/10 bg-slate-800 flex flex-col overflow-hidden">
            <div class="empty-state p-6 text-slate-400" id="detail-empty">
                <span class="icon block mb-2"><i data-lucide="mouse-pointer-click" class="w-8 h-8 mx-auto"></i></span>
                Select an event to view its details
            </div>
            <div id="detail-filled" style="display:none; flex-direction:column; height:100%;">
                <div id="detail-header" class="px-4 py-3 border-b border-white/10">
                    <span id="detail-type" class="inline-block px-2 py-1 rounded-full text-xs font-semibold bg-slate-700 text-slate-100"></span>
                    <h2 id="detail-title" class="text-lg font-semibold mt-2"></h2>
                    <div id="detail-uri" class="text-xs text-slate-400 break-all mt-1"></div>
                </div>
                <div id="detail-content" class="flex-1 overflow-auto p-4"></div>
                <div id="detail-actions" class="px-4 py-3 border-t border-white/10 flex gap-2">
                    <button onclick="openGraph()" class="inline-flex items-center gap-2 px-3 py-1 bg-slate-700 border border-white/10 rounded-md text-sm"><i data-lucide="share-2" class="w-3.5 h-3.5"></i> Open Graph</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        var allEvents = [];
        var filteredEvents = [];
        var activeTypes = new Set();
        var typeColorMap = {};
        var selectedUri = null;
        var sortField = 'start';
        var sortAsc = true;
        var histogramChart = null;
        var currentBucketUnit = 'auto';
        var currentChartType = 'bar';
        var autoBucketUnit = 'day';
        var chartEvents = [];
        var dataTimeMin = null;
        var dataTimeMax = null;
        var eventPageSize = 250;
        var eventPageIndex = 0;
        var suppressHistogramAnimationOnce = false;

        var nameIncludes = [];  // [{text:'...'}] — event must match at least one
        var nameExcludes = [];  // [{text:'...'}] — event must not match any
        var dateStartIso = null;  // ISO datetime string or null
        var dateEndIso = null;    // ISO datetime string or null

        function getEventTimestamp(eventItem) {
            if (typeof eventItem.timestamp === 'number') return eventItem.timestamp;
            var ts = new Date(eventItem.start).getTime();
            return isNaN(ts) ? null : ts;
        }

        var fpStart = null;  // flatpickr instance for start date
        var fpEnd = null;    // flatpickr instance for end date
        var enabledDates = [];  // array of available dates with events

        // Consolidated date formatting: use `formatFlatpickrDate(ms)` for inputs.

        function updateDateRangeControls() {
            // Collect all unique dates from events
            var dateSet = {};
            var firstEventDate = null;
            var lastEventDate = null;
            
            allEvents.forEach(function(e) {
                if (e.start) {
                    var d = new Date(e.start);
                    var dateKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                    dateSet[dateKey] = true;
                    if (!firstEventDate) firstEventDate = new Date(e.start);
                    lastEventDate = new Date(e.start);
                }
            });
            enabledDates = Object.keys(dateSet).sort();

            // Initialize flatpickr for start date if not already initialized
            if (!fpStart) {
                fpStart = flatpickr('#date-start', {
                    enableTime: true,
                    dateFormat: 'Y-m-d H:i',
                    time_24hr: true,
                    enable: enabledDates,
                    onOpen: function() {
                        if (firstEventDate && !fpStart.selectedDates.length) {
                            fpStart.currentMonth = firstEventDate.getMonth();
                            fpStart.currentYear = firstEventDate.getFullYear();
                            fpStart.redraw();
                        }
                    },
                    onClose: function() { applyFilters(); },
                    onDayCreate: function(dObj, dStr, fp, dayElem) {
                        var dateStr = dayElem.dateObj.getFullYear() + '-' + 
                                      String(dayElem.dateObj.getMonth() + 1).padStart(2, '0') + '-' + 
                                      String(dayElem.dateObj.getDate()).padStart(2, '0');
                        if (enabledDates.indexOf(dateStr) >= 0) {
                            dayElem.classList.add('hasEvents');
                        }
                    }
                });
            }

            // Initialize flatpickr for end date if not already initialized
            if (!fpEnd) {
                fpEnd = flatpickr('#date-end', {
                    enableTime: true,
                    dateFormat: 'Y-m-d H:i',
                    time_24hr: true,
                    enable: enabledDates,
                    onOpen: function() {
                        if (lastEventDate && !fpEnd.selectedDates.length) {
                            fpEnd.currentMonth = lastEventDate.getMonth();
                            fpEnd.currentYear = lastEventDate.getFullYear();
                            fpEnd.redraw();
                        }
                    },
                    onClose: function() { applyFilters(); },
                    onDayCreate: function(dObj, dStr, fp, dayElem) {
                        var dateStr = dayElem.dateObj.getFullYear() + '-' + 
                                      String(dayElem.dateObj.getMonth() + 1).padStart(2, '0') + '-' + 
                                      String(dayElem.dateObj.getDate()).padStart(2, '0');
                        if (enabledDates.indexOf(dateStr) >= 0) {
                            dayElem.classList.add('hasEvents');
                        }
                    }
                });
            }

            var clearBtn = document.getElementById('clear-dates-btn');
            if (clearBtn) clearBtn.disabled = !dateStartIso && !dateEndIso;
        }

        function updateAutoBucketUnit(events) {
            var sourceEvents = events || allEvents;
            if (sourceEvents.length === 0) {
                autoBucketUnit = 'day';
                updateAutoLabel();
                return;
            }
            var timestamps = sourceEvents.map(function(e) { return getEventTimestamp(e); }).filter(function(ts) { return ts !== null; });
            if (timestamps.length === 0) {
                autoBucketUnit = 'day';
                updateAutoLabel();
                return;
            }
            var minT = Math.min.apply(null, timestamps);
            var maxT = Math.max.apply(null, timestamps);
            var range = maxT - minT;
            var msDay = 86400000, msMonth = msDay * 30, msYear = msDay * 365;
            if (range > msYear * 10) autoBucketUnit = 'year';
            else if (range > msYear * 2) autoBucketUnit = 'quarter';
            else if (range > msMonth * 6) autoBucketUnit = 'month';
            else if (range > msDay * 30) autoBucketUnit = 'week';
            else autoBucketUnit = 'day';
            updateAutoLabel();
        }

        function formatFlatpickrDate(ms) {
            var d = new Date(ms);
            var pad = function(value) { return String(value).padStart(2, '0'); };
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        }

        function syncDateRangeInputs(startMs, endMs) {
            var startDate = new Date(startMs);
            var endDate = new Date(endMs);
            var startInput = document.getElementById('date-start');
            var endInput = document.getElementById('date-end');
            if (fpStart) fpStart.setDate(startDate, false);
            if (startInput) startInput.value = formatFlatpickrDate(startMs);
            if (fpEnd) fpEnd.setDate(endDate, false);
            if (endInput) endInput.value = formatFlatpickrDate(endMs);
            dateStartIso = startDate.toISOString();
            dateEndIso = endDate.toISOString();
            updateDateRangeControls();
        }

        function applyTimeframeZoom(evt) {
            if (dataTimeMin === null || dataTimeMax === null) return;

            var baseStart = dateStartIso ? new Date(dateStartIso).getTime() : dataTimeMin;
            var baseEnd = dateEndIso ? new Date(dateEndIso).getTime() : dataTimeMax;
            suppressHistogramAnimationOnce = true;
            var range = Math.max(1, baseEnd - baseStart);
            var pointerX = typeof evt.clientX === 'number' ? evt.clientX : window.innerWidth / 2;
            var focusRatio = window.innerWidth > 0 ? Math.min(0.98, Math.max(0.02, pointerX / window.innerWidth)) : 0.5;
            var focusTime = baseStart + (range * focusRatio);
            var zoomFactor = evt.deltaY > 0 ? 1.18 : 0.84;
            var nextRange = Math.max(60 * 1000, range * zoomFactor);
            var nextStart = focusTime - (nextRange * focusRatio);
            var nextEnd = nextStart + nextRange;

            if (nextStart < dataTimeMin) {
                nextEnd += dataTimeMin - nextStart;
                nextStart = dataTimeMin;
            }
            if (nextEnd > dataTimeMax) {
                nextStart -= nextEnd - dataTimeMax;
                nextEnd = dataTimeMax;
            }

            nextStart = Math.max(dataTimeMin, nextStart);
            nextEnd = Math.min(dataTimeMax, nextEnd);
            if (nextEnd <= nextStart) nextEnd = Math.min(dataTimeMax, nextStart + 60 * 1000);

            syncDateRangeInputs(Math.floor(nextStart), Math.ceil(nextEnd));
            applyFilters(true);
        }

        function handleWheelShortcut(evt) {
            if (!evt.ctrlKey) return;
            evt.preventDefault();
            evt.stopPropagation();
            applyTimeframeZoom(evt);
        }

        function initExplorer() {
            try {
                var itemsJson = javaBridge.getTimelineItemsJson();
                var groupsJson = javaBridge.getTimelineGroupsJson();
                var items = JSON.parse(itemsJson);
                var groups = JSON.parse(groupsJson);

                // Build color map from provided group colors (single source of truth)
                groups.forEach(function(g) {
                    if (g.color) typeColorMap[g.id] = g.color;
                });

                // Parse items into our event list
                allEvents = items.map(function(it) {
                    var label = it.label || it.content || it.id || '';
                    var type = it.group || 'Unknown';
                    var timestamp = typeof it.timestamp === 'number' ? it.timestamp : new Date(it.start).getTime();
                    return {
                        uri: it.id,
                        label: label,
                        type: type,
                        start: it.start,
                        timestamp: isNaN(timestamp) ? null : timestamp,
                        tooltip: it.title || '',
                        searchText: (label + ' ' + type + ' ' + (it.id || '')).toLowerCase()
                    };
                });

                var timestamps = allEvents.map(function(e) { return getEventTimestamp(e); }).filter(function(ts) { return ts !== null; });
                if (timestamps.length > 0) {
                    dataTimeMin = Math.min.apply(null, timestamps);
                    dataTimeMax = Math.max.apply(null, timestamps);
                }

                document.getElementById('stats').textContent = allEvents.length + ' events loaded';

                // Build type chips
                buildTypeChips(groups);

                updateDateRangeControls();

                // Initial render
                applyFilters();

                // Build histogram
                buildHistogram();

                document.addEventListener('wheel', handleWheelShortcut, { passive: false, capture: true });

                // Initialize resizer for detail panel (allows horizontal resizing)
                initResizer();

                javaBridge.log('Event Explorer initialized with ' + allEvents.length + ' events');
            } catch (e) {
                javaBridge.log('Error initializing explorer: ' + e.message);
                document.getElementById('table-scroll').innerHTML =
                    '<div class="empty-state p-8 text-slate-400"><i data-lucide="circle-alert" class="h-4 w-4"></i>Error: ' + e.message + '</div>';
            }
        }

        /*  Histogram  */

        function buildHistogram() {
            if (allEvents.length === 0) return;
            rebuildHistogram();
        }

        function getEffectiveUnit() {
            return currentBucketUnit === 'auto' ? autoBucketUnit : currentBucketUnit;
        }

        function setPeriod(unit) {
            currentBucketUnit = unit;
            document.querySelectorAll('.period-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.unit === unit);
            });
            updateAutoLabel();
            rebuildHistogram();
        }

        function updateAutoLabel() {
            var btn = document.querySelector('.period-btn[data-unit="auto"]');
            if (!btn) return;
            var resolved = autoBucketUnit.charAt(0).toUpperCase() + autoBucketUnit.slice(1);
            btn.textContent = currentBucketUnit === 'auto' ? 'Auto (' + resolved + ')' : 'Auto';
        }

        function setChartType(type) {
            currentChartType = type;
            document.querySelectorAll('.chart-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.chart === type);
            });
            rebuildHistogram();
        }

        function rebuildHistogram() {
            if (histogramChart) { histogramChart.destroy(); histogramChart = null; }
            chartEvents = filteredEvents.slice();
            updateAutoBucketUnit(chartEvents.length > 0 ? chartEvents : allEvents);
            if (chartEvents.length === 0) return;
            var unit = getEffectiveUnit();
            switch (currentChartType) {
                case 'bar':        buildBarChart(unit); break;
                case 'line':       buildLineChart(unit); break;
                case 'boxplot':    buildBoxPlotChart(unit); break;
                case 'violin':     buildViolinChart(unit); break;
                case 'area':       buildAreaChart(unit); break;
                case 'cumulative': buildCumulativeChart(unit); break;
                case 'pie':        buildPieChart(); break;
                case 'scatter':    buildScatterChart(unit); break;
                case 'heatmap':    buildHeatmapChart(unit); break;
                case 'radar':      buildRadarChart(unit); break;
                default:           buildBarChart(unit); break;
            }
        }

        // Centralized chart options helper. Pass an `overrides` object
        // to customize scales, plugins, onClick handlers, etc.
        function chartOptions(overrides) {
            var base = {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: suppressHistogramAnimationOnce ? 0 : 300 },
                interaction: { mode: 'nearest', intersect: false },
                plugins: {
                    legend: {
                        display: true, position: 'top', align: 'end',
                        labels: { color: 'hsl(0 0% 63%)', font: { size: 10 }, boxWidth: 10, boxHeight: 10, padding: 8, usePointStyle: true, pointStyle: 'circle' }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(20,20,30,0.95)', titleColor: '#fff', bodyColor: '#ccc',
                        borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 10,
                        callbacks: {
                            title: function(items) {
                                if (items.length > 0 && items[0].parsed && items[0].parsed.x) {
                                    return new Date(items[0].parsed.x).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                                }
                                return '';
                            }
                        }
                    }
                }
            };

            var options = overrides ? deepMerge(base, overrides) : base;
            suppressHistogramAnimationOnce = false;
            return options;
        }

        function deepMerge(a, b) {
            for (var k in b) {
                if (b[k] && typeof b[k] === 'object' && !Array.isArray(b[k])) {
                    a[k] = a[k] || {};
                    deepMerge(a[k], b[k]);
                } else {
                    a[k] = b[k];
                }
            }
            return a;
        }

        /*  Aggregation helpers  */

        function getBucketStart(dateStr, unit) {
            var d = new Date(dateStr);
            switch (unit) {
                case 'hour':  return new Date(d.getFullYear(), d.getMonth(), d.getDate(), d.getHours()).getTime();
                case 'day':   return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
                case 'week':
                    var day = d.getDay();
                    var diff = d.getDate() - day + (day === 0 ? -6 : 1);
                    return new Date(d.getFullYear(), d.getMonth(), diff).getTime();
                case 'month':   return new Date(d.getFullYear(), d.getMonth(), 1).getTime();
                case 'quarter': return new Date(d.getFullYear(), Math.floor(d.getMonth() / 3) * 3, 1).getTime();
                case 'year':    return new Date(d.getFullYear(), 0, 1).getTime();
                default:        return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
            }
        }

        function aggregateIntoBuckets(unit) {
            var byType = {};
            var allBucketKeys = new Set();
            chartEvents.forEach(function(e) {
                var bk = getBucketStart(e.start, unit);
                allBucketKeys.add(bk);
                if (!byType[e.type]) byType[e.type] = {};
                byType[e.type][bk] = (byType[e.type][bk] || 0) + 1;
            });
            var sorted = Array.from(allBucketKeys).sort(function(a, b) { return a - b; });
            return { bucketKeys: sorted, byType: byType };
        }

        function getSubUnit(unit) {
            switch (unit) {
                case 'year':    return 'month';
                case 'quarter': return 'week';
                case 'month':   return 'day';
                case 'week':    return 'day';
                case 'day':     return 'hour';
                default:        return 'day';
            }
        }

        function formatBucketLabel(ts, unit) {
            var d = new Date(ts);
            switch (unit) {
                case 'day':     return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                case 'week':    return 'W' + getWeekNumber(d) + ' ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                case 'month':   return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
                case 'quarter': return 'Q' + (Math.floor(d.getMonth() / 3) + 1) + ' ' + d.getFullYear();
                case 'year':    return '' + d.getFullYear();
                default:        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }
        }

        function getWeekNumber(d) {
            var dt = new Date(d.getFullYear(), d.getMonth(), d.getDate());
            dt.setDate(dt.getDate() + 4 - (dt.getDay() || 7));
            var yearStart = new Date(dt.getFullYear(), 0, 1);
            return Math.ceil((((dt - yearStart) / 86400000) + 1) / 7);
        }

        /*  Bar chart (stacked)  */

        function buildBarChart(unit) {
            var agg = aggregateIntoBuckets(unit);
            var types = Object.keys(agg.byType);
            var datasets = types.map(function(type) {
                var data = agg.bucketKeys.map(function(bk) {
                    return { x: new Date(bk).toISOString(), y: agg.byType[type][bk] || 0 };
                });
                var color = typeColorMap[type] || '#a6cee3';
                return {
                    label: type,
                    data: data,
                    backgroundColor: color + 'CC',
                    borderColor: color,
                    borderWidth: 1,
                    borderRadius: 2,
                    barPercentage: 0.9,
                    categoryPercentage: 0.9,
                    hidden: !activeTypes.has(type)
                };
            });
            var ctx = document.getElementById('histogram-canvas').getContext('2d');
            histogramChart = new Chart(ctx, {
                type: 'bar',
                data: { datasets: datasets },
                options: chartOptions({
                    scales: {
                        x: {
                            type: 'time', time: { unit: unit, round: unit }, stacked: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: 'hsl(0 0% 63%)', font: { size: 10 }, maxRotation: 0 },
                            border: { color: 'rgba(255,255,255,0.1)' }

        /*  Box plot chart  */

        function buildBoxPlotChart(unit) {
            var subUnit = getSubUnit(unit);
            // For each type, for each main bucket, collect sub-bucket counts
            var typeBucketSubs = {};
            var allMainBuckets = new Set();

            chartEvents.forEach(function(e) {
                var mainBk = getBucketStart(e.start, unit);
                var subBk = getBucketStart(e.start, subUnit);
                allMainBuckets.add(mainBk);
                if (!typeBucketSubs[e.type]) typeBucketSubs[e.type] = {};
                if (!typeBucketSubs[e.type][mainBk]) typeBucketSubs[e.type][mainBk] = {};
                typeBucketSubs[e.type][mainBk][subBk] = (typeBucketSubs[e.type][mainBk][subBk] || 0) + 1;
            });

            var sortedBuckets = Array.from(allMainBuckets).sort(function(a, b) { return a - b; });
            var labels = sortedBuckets.map(function(bk) { return formatBucketLabel(bk, unit); });

            var types = Object.keys(typeBucketSubs);
            var datasets = types.map(function(type) {
                var color = typeColorMap[type] || '#a6cee3';
                var data = sortedBuckets.map(function(bk) {
                    var subs = typeBucketSubs[type][bk];
                    if (!subs) return [0];
                    return Object.values(subs);
                });
                return {
                    label: type,
                    data: data,
                    backgroundColor: color + '44',
                    borderColor: color,
                    borderWidth: 1,
                    outlierBackgroundColor: color,
                    outlierRadius: 3,
                    itemRadius: 2,
                    itemBackgroundColor: color + '88',
                    medianColor: '#fff',
                    hidden: !activeTypes.has(type)
                };
            });

            var ctx = document.getElementById('histogram-canvas').getContext('2d');
            histogramChart = new Chart(ctx, {
                type: 'boxplot',
                data: { labels: labels, datasets: datasets },
                options: chartOptions({
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: 'hsl(0 0% 63%)', font: { size: 10 }, maxRotation: 45 },
                            border: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: 'hsl(0 0% 63%)', font: { size: 10 }, stepSize: 1, precision: 0 },
                            border: { color: 'rgba(255,255,255,0.1)' },
                            title: { display: true, text: 'Events per ' + subUnit, color: 'hsl(0 0% 63%)', font: { size: 10 } }
                        }
                    },
                    onClick: function(evt, elements) {
                        if (elements.length > 0) {
                            var idx = elements[0].index;
                            if (sortedBuckets[idx]) {
                                scrollToTime(new Date(sortedBuckets[idx]).toISOString());
                            }
                        }
                    }
                })
            });
        }

        /*  Cumulative line chart  */

        function buildCumulativeChart(unit) {

        /*  Violin chart  */

        function buildViolinChart(unit) {
            var subUnit = getSubUnit(unit);
            var typeBucketSubs = {};
            var allMainBuckets = new Set();
            chartEvents.forEach(function(e) {
                var mainBk = getBucketStart(e.start, unit);
                var subBk = getBucketStart(e.start, subUnit);
                allMainBuckets.add(mainBk);
                if (!typeBucketSubs[e.type]) typeBucketSubs[e.type] = {};
                if (!typeBucketSubs[e.type][mainBk]) typeBucketSubs[e.type][mainBk] = {};
                typeBucketSubs[e.type][mainBk][subBk] = (typeBucketSubs[e.type][mainBk][subBk] || 0) + 1;
            });
            var sortedBuckets = Array.from(allMainBuckets).sort(function(a, b) { return a - b; });
            var labels = sortedBuckets.map(function(bk) { return formatBucketLabel(bk, unit); });

        /*  Donut chart (type distribution)  */

        function buildPieChart() {
            var counts = {};
            chartEvents.forEach(function(e) {
                counts[e.type] = (counts[e.type] || 0) + 1;
            });
            var types = Object.keys(counts).filter(function(t) { return activeTypes.has(t); });
            var colors = types.map(function(t) { return typeColorMap[t] || '#a6cee3'; });
            var ctx = document.getElementById('histogram-canvas').getContext('2d');
            histogramChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: types,
                    datasets: [{
                        data: types.map(function(t) { return counts[t]; }),
                        backgroundColor: colors.map(function(c) { return c + 'CC'; }),
                        borderColor: colors,
                        borderWidth: 2,
                        hoverOffset: 8
                    }]
                },
                options: chartOptions({
                    cutout: '50%',
                    plugins: {
                        legend: { display: true, position: 'right' },
                        tooltip: {
                            callbacks: {
                                label: function(item) {
                                    var total = item.dataset.data.reduce(function(s, v) { return s + v; }, 0);
                                    var pct = total > 0 ? ((item.raw / total) * 100).toFixed(1) : 0;
                                    return item.label + ': ' + item.raw + ' (' + pct + '%)';
                                }
                            }
                        }
                    }
                })
            });
        }

        /*  Scatter chart (timeline strip)  */

        function buildScatterChart(unit) {
            var types = [];
            var typeSet = new Set();
            chartEvents.forEach(function(e) {
                if (!typeSet.has(e.type)) { typeSet.add(e.type); types.push(e.type); }
            });
            var dataByType = {};
            chartEvents.forEach(function(e) {
                if (!dataByType[e.type]) dataByType[e.type] = [];
                dataByType[e.type].push({
                    x: new Date(e.start).getTime(),
                    y: types.indexOf(e.type),
                    label: e.label,
                    uri: e.uri
                });
            });
            var datasets = types.map(function(type) {
                var color = typeColorMap[type] || '#a6cee3';
                return {
                    label: type,
                    data: dataByType[type] || [],
                    backgroundColor: color + '88',
                    borderColor: color,
                    borderWidth: 1,
                    pointRadius: 4,
                    pointHoverRadius: 7,
                    hidden: !activeTypes.has(type)
                };
            });
            var scatterTypes = types;
            var ctx = document.getElementById('histogram-canvas').getContext('2d');
            histogramChart = new Chart(ctx, {
                type: 'scatter',
                data: { datasets: datasets },
                options: chartOptions({
                    plugins: {
                        tooltip: {
                            callbacks: {
                                title: function(items) {
                                    if (items.length > 0) {
                                        return new Date(items[0].parsed.x).toLocaleDateString('en-US', {
                                            year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                                        });
                                    }
                                    return '';
                                },
                                label: function(item) {
                                    var raw = item.raw;
                                    return raw.label || scatterTypes[raw.y] || '';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: unit, round: unit },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: 'hsl(0 0% 63%)', font: { size: 10 }, maxRotation: 0 },
