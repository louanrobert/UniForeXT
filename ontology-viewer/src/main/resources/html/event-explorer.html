                            border: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            type: 'linear',
                            min: -0.5,
                            max: types.length - 0.5,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: {
                                color: 'hsl(0 0% 63%)', font: { size: 10 },
                                stepSize: 1,
                                callback: function(value) { return scatterTypes[value] || ''; }
                            },
                            border: { color: 'rgba(255,255,255,0.1)' }
                        }
                    },
                    onClick: function(evt, elements) {
                        if (elements.length > 0) {
                            var el = elements[0];
                            var point = histogramChart.data.datasets[el.datasetIndex].data[el.index];
                            if (point && point.uri) selectEvent(point.uri);
                        }
                    }
                }
            });
        }

        /* ── Heatmap ── */

        function getHeatmapConfig(unit) {
            switch (unit) {
                case 'year':
                    return {
                        rowCount: 12,
                        colCount: 31,
                        getRow: function(d) { return d.getMonth(); },
                        getCol: function(d) { return d.getDate() - 1; },
                        rowLabels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                        colLabel: function(v) { return '' + (v + 1); },
                        xTitle: 'Day of Month',
                        yTitle: 'Month',
                        tooltipTitle: function(row, col, rowLabels) { return rowLabels[row] + ', day ' + (col + 1); }
                    };
                case 'quarter':
                    return {
                        rowCount: 3,
                        colCount: 31,
                        getRow: function(d) { return d.getMonth() % 3; },
                        getCol: function(d) { return d.getDate() - 1; },
                        rowLabels: ['Month 1','Month 2','Month 3'],
                        colLabel: function(v) { return '' + (v + 1); },
                        xTitle: 'Day of Month',
                        yTitle: 'Month in Quarter',
                        tooltipTitle: function(row, col, rowLabels) { return rowLabels[row] + ', day ' + (col + 1); }
                    };
                case 'month':
                    return {
                        rowCount: 7,
                        colCount: 5,
                        getRow: function(d) { var dow = d.getDay(); return dow === 0 ? 6 : dow - 1; },
                        getCol: function(d) { return Math.floor((d.getDate() - 1) / 7); },
                        rowLabels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
                        colLabel: function(v) { return 'W' + (v + 1); },
                        xTitle: 'Week of Month',
                        yTitle: 'Day of Week',
                        tooltipTitle: function(row, col, rowLabels) { return rowLabels[row] + ', week ' + (col + 1); }
                    };
                case 'day':
                    return {
                        rowCount: 1,
                        colCount: 24,
                        getRow: function() { return 0; },
                        getCol: function(d) { return d.getHours(); },
                        rowLabels: ['Events'],
                        colLabel: function(v) { return v + ':00'; },
                        xTitle: 'Hour of Day',
                        yTitle: '',
                        tooltipTitle: function(row, col) { return col + ':00'; }
                    };
                default: // week
                    return {
                        rowCount: 7,
                        colCount: 24,
                        getRow: function(d) { var dow = d.getDay(); return dow === 0 ? 6 : dow - 1; },
                        getCol: function(d) { return d.getHours(); },
                        rowLabels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
                        colLabel: function(v) { return v + ':00'; },
                        xTitle: 'Hour of Day',
                        yTitle: 'Day of Week',
                        tooltipTitle: function(row, col, rowLabels) { return rowLabels[row] + ' at ' + col + ':00'; }
                    };
            }
        }

        function buildHeatmapChart(unit) {
            var cfg = getHeatmapConfig(unit);
            var matrix = {};
            chartEvents.forEach(function(e) {
                if (!activeTypes.has(e.type)) return;
                var d = new Date(e.start);
                var row = cfg.getRow(d);
                var col = cfg.getCol(d);
                var key = row + '-' + col;
                matrix[key] = (matrix[key] || 0) + 1;
            });
            var data = [];
            var maxVal = 0;
            for (var r = 0; r < cfg.rowCount; r++) {
                for (var c = 0; c < cfg.colCount; c++) {
                    var val = matrix[r + '-' + c] || 0;
                    if (val > maxVal) maxVal = val;
                    data.push({ x: c, y: r, v: val });
                }
            }
            var capturedMax = maxVal;
            var capturedCfg = cfg;
            var ctx = document.getElementById('histogram-canvas').getContext('2d');
            histogramChart = new Chart(ctx, {
                type: 'matrix',
                data: {
                    datasets: [{
                        label: 'Event Density',
                        data: data,
                        backgroundColor: function(context) {
                            var item = context.dataset.data[context.dataIndex];
                            if (!item || item.v === 0) return 'rgba(255,255,255,0.03)';
                            var alpha = capturedMax > 0 ? Math.min(0.15 + (item.v / capturedMax) * 0.85, 1) : 0.15;
                            return 'rgba(99, 102, 241, ' + alpha + ')';
                        },
                        borderColor: 'rgba(255,255,255,0.06)',
                        borderWidth: 1,
                        width: function(context) {
                            var area = context.chart.chartArea;
                            return area ? (area.width / capturedCfg.colCount - 2) : 10;
                        },
                        height: function(context) {
                            var area = context.chart.chartArea;
                            return area ? (area.height / capturedCfg.rowCount - 2) : 10;
                        }
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 300 },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(20,20,30,0.95)', titleColor: '#fff', bodyColor: '#ccc',
                            borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 10,
                            callbacks: {
                                title: function(items) {
                                    if (items.length > 0) {
                                        var raw = items[0].raw;
                                        return capturedCfg.tooltipTitle(raw.y, raw.x, capturedCfg.rowLabels);
                                    }
                                    return '';
                                },
                                label: function(item) {
                                    return item.raw.v + ' events';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear', position: 'top',
                            min: -0.5, max: capturedCfg.colCount - 0.5,
                            grid: { display: false },
                            ticks: {
                                color: 'hsl(0 0% 63%)', font: { size: 10 },
                                stepSize: 1,
                                callback: function(v) { return capturedCfg.colLabel(v); }
                            },
                            border: { color: 'rgba(255,255,255,0.1)' },
                            title: { display: true, text: capturedCfg.xTitle, color: 'hsl(0 0% 63%)', font: { size: 10 } }
                        },
                        y: {
                            type: 'linear',
                            min: -0.5, max: capturedCfg.rowCount - 0.5,
                            grid: { display: false },
                            offset: true,
                            ticks: {
                                color: 'hsl(0 0% 63%)', font: { size: 10 },
                                stepSize: 1,
                                callback: function(v) { return capturedCfg.rowLabels[v] || ''; }
                            },
                            border: { color: 'rgba(255,255,255,0.1)' },
                            title: { display: capturedCfg.yTitle !== '', text: capturedCfg.yTitle, color: 'hsl(0 0% 63%)', font: { size: 10 } }
                        }
                    }
                }
            });
        }

        /* ── Radar chart (cyclical profile) ── */

        function getRadarConfig(unit) {
            switch (unit) {
                case 'day':
                    return {
                        labels: ['0h','1h','2h','3h','4h','5h','6h','7h','8h','9h','10h','11h',
                                 '12h','13h','14h','15h','16h','17h','18h','19h','20h','21h','22h','23h'],
                        count: 24,
                        getIndex: function(d) { return d.getHours(); }
                    };
                case 'year':
                    return {
                        labels: ['January','February','March','April','May','June',
                                 'July','August','September','October','November','December'],
                        count: 12,
                        getIndex: function(d) { return d.getMonth(); }
                    };
                case 'quarter':
                    return {
                        labels: ['Month 1','Month 2','Month 3'],
                        count: 3,
                        getIndex: function(d) { return d.getMonth() % 3; }
                    };
                case 'month':
                    return {
                        labels: (function() { var a = []; for (var i = 1; i <= 31; i++) a.push('' + i); return a; })(),
                        count: 31,
                        getIndex: function(d) { return d.getDate() - 1; }
                    };
                default: // week
                    return {
                        labels: ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'],
                        count: 7,
                        getIndex: function(d) { var dow = d.getDay(); return dow === 0 ? 6 : dow - 1; }
                    };
            }
        }

        function buildRadarChart(unit) {
            var cfg = getRadarConfig(unit);
            var byType = {};
            chartEvents.forEach(function(e) {
                if (!byType[e.type]) {
                    byType[e.type] = [];
                    for (var i = 0; i < cfg.count; i++) byType[e.type].push(0);
                }
                var d = new Date(e.start);
                var idx = cfg.getIndex(d);
                if (idx >= 0 && idx < cfg.count) byType[e.type][idx]++;
            });
            var types = Object.keys(byType);
            var datasets = types.map(function(type) {
                var color = typeColorMap[type] || '#a6cee3';
                return {
                    label: type,
                    data: byType[type],
                    backgroundColor: color + '33',
                    borderColor: color,
                    borderWidth: 2,
                    pointBackgroundColor: color,
                    pointBorderColor: '#fff',
                    pointRadius: 3,
                    pointHoverRadius: 6,
                    hidden: !activeTypes.has(type)
                };
            });
            var ctx = document.getElementById('histogram-canvas').getContext('2d');
            histogramChart = new Chart(ctx, {
                type: 'radar',
                data: { labels: cfg.labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 300 },
                    plugins: {
                        legend: {
                            display: true, position: 'top', align: 'end',
                            labels: { color: 'hsl(0 0% 63%)', font: { size: 10 }, boxWidth: 10, boxHeight: 10, padding: 8, usePointStyle: true, pointStyle: 'circle' }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(20,20,30,0.95)', titleColor: '#fff', bodyColor: '#ccc',
                            borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 10
                        }
                    },
                    scales: {
                        r: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: 'hsl(0 0% 63%)', font: { size: 11 } },
                            ticks: { color: 'hsl(0 0% 63%)', font: { size: 9 }, backdropColor: 'transparent', stepSize: 1 }
                        }
                    }
                }
            });
        }

        function scrollToTime(isoDate) {
            var targetTs = new Date(isoDate).getTime();
            // Find the closest event row in filtered list
            var closestIdx = 0;
            var closestDiff = Infinity;
            for (var i = 0; i < filteredEvents.length; i++) {
                var diff = Math.abs(new Date(filteredEvents[i].start).getTime() - targetTs);
                if (diff < closestDiff) { closestDiff = diff; closestIdx = i; }
            }
            // Auto-select and scroll
            if (filteredEvents.length > 0) {
                selectEvent(filteredEvents[closestIdx].uri);
                var row = document.querySelector('tr[data-uri="' + CSS.escape(filteredEvents[closestIdx].uri) + '"]');
                if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        /* ── Type chips ── */

        function buildTypeChips(groups) {
            var container = document.getElementById('type-chips');
            container.innerHTML = '';
            var counts = {};
            allEvents.forEach(function(e) { counts[e.type] = (counts[e.type] || 0) + 1; });
            groups.forEach(function(g) {
                activeTypes.add(g.id);
                var color = typeColorMap[g.id] || '#a6cee3';
                var chip = document.createElement('span');
                chip.className = 'type-filter-chip active';
                chip.style.background = color + '33';
                chip.dataset.type = g.id;
                chip.dataset.color = color;
                chip.innerHTML = '<span class="chip-dot" style="background:' + color + '"></span>' +
                                 escapeHtml(g.content || g.id) +
                                 ' <span style="opacity:0.6; font-size:10px">(' + (counts[g.id] || 0) + ')</span>';
                chip.onclick = function() { toggleType(g.id); };
                container.appendChild(chip);
            });
        }

        function toggleType(type) {
            if (activeTypes.has(type)) activeTypes.delete(type);
            else activeTypes.add(type);
            refreshTypeChips();
            applyFilters();
        }

        function refreshTypeChips() {
            document.querySelectorAll('.type-filter-chip').forEach(function(c) {
                var type = c.dataset.type;
                var color = c.dataset.color;
                if (activeTypes.has(type)) {
                    c.className = 'type-filter-chip active';
                    c.style.background = color + '33';
                } else {
                    c.className = 'type-filter-chip inactive';
                    c.style.background = '';
                }
            });
        }

        /* ── Filter & Sort ── */

        function parseFlatpickrDate(dateStr) {
            // Convert "Y-m-d H:i" to ISO format
            if (!dateStr) return null;
            var match = dateStr.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
            if (!match) return null;
            return new Date(match[1], parseInt(match[2]) - 1, match[3], match[4], match[5]).toISOString();
        }

        function applyFilters() {
            var query = (document.getElementById('search-input').value || '').toLowerCase();

            // Get date inputs (flatpickr format: "Y-m-d H:i")
            var dateStartInput = document.getElementById('date-start').value;
            var dateEndInput = document.getElementById('date-end').value;
            dateStartIso = parseFlatpickrDate(dateStartInput);
            dateEndIso = parseFlatpickrDate(dateEndInput);

            // Update clear button state
            var clearBtn = document.getElementById('clear-dates-btn');
            if (clearBtn) clearBtn.disabled = !dateStartInput && !dateEndInput;

            filteredEvents = allEvents.filter(function(e) {
                if (!activeTypes.has(e.type)) return false;
                if (query.length > 0) {
                    if (e.searchText.indexOf(query) < 0) return false;
                }

                // Name includes: event must match at least one
                if (nameIncludes.length > 0) {
                    var matchesAny = false;
                    for (var i = 0; i < nameIncludes.length; i++) {
                        var q = nameIncludes[i].text.toLowerCase();
                        if (e.searchText.indexOf(q) >= 0) { matchesAny = true; break; }
                    }
                    if (!matchesAny) return false;
                }

                // Name excludes: event must not match any
                for (var j = 0; j < nameExcludes.length; j++) {
                    var eq = nameExcludes[j].text.toLowerCase();
                    if (e.searchText.indexOf(eq) >= 0) return false;
                }

                // Date range filter
                var ts = getEventTimestamp(e);
                if (ts !== null) {
                    if (dateStartIso && ts < new Date(dateStartIso).getTime()) return false;
                    if (dateEndIso && ts > new Date(dateEndIso).getTime()) return false;
                }

                return true;
            });

            // Sort
            filteredEvents.sort(function(a, b) {
                var va = sortField === 'start' ? (a.timestamp || 0) : (a[sortField] || '');
                var vb = sortField === 'start' ? (b.timestamp || 0) : (b[sortField] || '');
                var cmp = (va < vb) ? -1 : (va > vb) ? 1 : 0;
                return sortAsc ? cmp : -cmp;
            });

            eventPageIndex = 0;
            renderTable();
            updatePagination();
            updateMatchCount();
            rebuildHistogram();
        }

        function sortBy(field) {
            if (sortField === field) { sortAsc = !sortAsc; }
            else { sortField = field; sortAsc = true; }
            // Update header indicators
            document.querySelectorAll('thead th').forEach(function(th) { th.classList.remove('sorted'); });
            var thId = 'th-' + field;
            var th = document.getElementById(thId);
            if (th) {
                th.classList.add('sorted');
                th.querySelector('.sort-arrow').innerHTML = sortAsc ? '<i data-lucide="chevron-up" style="width:12px;height:12px"></i>' : '<i data-lucide="chevron-down" style="width:12px;height:12px"></i>';
                lucide.createIcons({nodes: [th]});
            }
            applyFilters();
        }

        function updateMatchCount() {
            document.getElementById('match-count').textContent =
                filteredEvents.length + ' / ' + allEvents.length + ' events';
        }

        function getPageStart() {
            return eventPageIndex * eventPageSize;
        }

        function getPageEnd() {
            return Math.min(filteredEvents.length, getPageStart() + eventPageSize);
        }

        function updatePagination() {
            var pageInfo = document.getElementById('page-info');
            var prevBtn = document.getElementById('page-prev');
            var nextBtn = document.getElementById('page-next');
            var total = filteredEvents.length;
            var totalPages = Math.max(1, Math.ceil(total / eventPageSize));
            if (eventPageIndex >= totalPages) eventPageIndex = totalPages - 1;
            var start = total === 0 ? 0 : getPageStart() + 1;
            var end = getPageEnd();
            pageInfo.textContent = total === 0 ? 'No rows' : 'Showing ' + start + '-' + end + ' of ' + total + ' rows';
            prevBtn.disabled = eventPageIndex <= 0;
            nextBtn.disabled = eventPageIndex >= totalPages - 1;
        }

        function prevPage() {
            if (eventPageIndex <= 0) return;
            eventPageIndex--;
            renderTable();
            updatePagination();
        }

        function nextPage() {
            var totalPages = Math.max(1, Math.ceil(filteredEvents.length / eventPageSize));
            if (eventPageIndex >= totalPages - 1) return;
            eventPageIndex++;
            renderTable();
            updatePagination();
        }

        /* ── Table rendering ── */

        function renderTable() {
            var tbody = document.getElementById('event-tbody');
            var html = '';
            var start = getPageStart();
            var end = getPageEnd();
            var pageItems = filteredEvents.slice(start, end);
            pageItems.forEach(function(e) {
                var color = typeColorMap[e.type] || '#a6cee3';
                var isSelected = e.uri === selectedUri;
                var dateStr = formatDate(e.start);
                html += '<tr data-uri="' + escAttr(e.uri) + '" class="' + (isSelected ? 'selected' : '') + '" ' +
                        'onclick="selectEvent(' + escJs(e.uri) + ')" ' +
                        'ondblclick="openGraphFor(' + escJs(e.uri) + ')" ' +
                        'oncontextmenu="showRowContextMenu(event, ' + escJs(e.uri) + ', ' + escJs(e.label) + ', ' + escJs(e.type) + ')">';
                html += '<td title="' + escAttr(e.label) + '">' + escapeHtml(e.label) + '</td>';
                html += '<td><span class="type-badge" style="background:' + color + '">' + escapeHtml(e.type) + '</span></td>';
                html += '<td>' + escapeHtml(dateStr) + '</td>';
                html += '</tr>';
            });
            if (filteredEvents.length === 0) {
                html = '<tr><td colspan="3"><div class="empty-state"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>No events match filters</div></td></tr>';
            }
            tbody.innerHTML = html;
        }

        function formatDate(isoStr) {
            try {
                var d = new Date(isoStr);
                return d.toLocaleString('en-US', {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                });
            } catch (e) { return isoStr; }
        }

        /* ── Event selection & detail panel ── */

        function selectEvent(uri) {
            selectedUri = uri;
            // Highlight row
            document.querySelectorAll('tbody tr').forEach(function(tr) {
                tr.classList.toggle('selected', tr.dataset.uri === uri);
            });
            // Load detail
            loadDetail(uri);
        }

        function loadDetail(uri) {
            try {
                var detailJson = javaBridge.getIndividualDetailsJson(uri);
                var detail = JSON.parse(detailJson);

                document.getElementById('detail-empty').style.display = 'none';
                var filled = document.getElementById('detail-filled');
                filled.style.display = 'flex';
                document.getElementById('detail-panel').classList.remove('empty');

                // Header
                document.getElementById('detail-title').textContent = detail.label || 'Unknown';
                var typeEl = document.getElementById('detail-type');
                typeEl.textContent = detail.type || 'Unknown';
                typeEl.style.background = typeColorMap[detail.type] || '#a6cee3';
                document.getElementById('detail-uri').textContent = uri;

                // Properties
                var contentEl = document.getElementById('detail-content');
                var html = '';

                // Literal properties
                if (detail.literals && detail.literals.length > 0) {
                    html += '<div class="detail-section">';
                    html += '<div class="detail-section-title">Properties</div>';
                    detail.literals.forEach(function(prop) {
                        html += '<div class="prop-row">';
                        html += '<div class="prop-key" title="' + escAttr(prop.predicate) + '">' + escapeHtml(prop.predicate) + '</div>';
                        html += '<div class="prop-value">' + escapeHtml(prop.value) + '</div>';
                        html += '</div>';
                    });
                    html += '</div>';
                }

                // Outgoing relations
                if (detail.outgoing && detail.outgoing.length > 0) {
                    html += '<div class="detail-section">';
                    html += '<div class="detail-section-title">Outgoing Relations</div>';
                    detail.outgoing.forEach(function(rel) {
                        html += '<div class="prop-row">';
                        html += '<div class="prop-key" title="' + escAttr(rel.predicate) + '">' + escapeHtml(rel.predicate) + '</div>';
                        html += '<div class="prop-value"><a href="#" onclick="selectEvent(' + escJs(rel.targetUri) + '); return false;">' + escapeHtml(rel.targetLabel) + '</a></div>';
                        html += '</div>';
                    });
                    html += '</div>';
                }

                // Incoming relations
                if (detail.incoming && detail.incoming.length > 0) {
                    html += '<div class="detail-section">';
                    html += '<div class="detail-section-title">Incoming Relations</div>';
                    detail.incoming.forEach(function(rel) {
                        html += '<div class="prop-row">';
                        html += '<div class="prop-key" title="' + escAttr(rel.predicate) + '">' + escapeHtml(rel.predicate) + '</div>';
                        html += '<div class="prop-value"><a href="#" onclick="selectEvent(' + escJs(rel.sourceUri) + '); return false;">' + escapeHtml(rel.sourceLabel) + '</a></div>';
                        html += '</div>';
                    });
                    html += '</div>';
                }

                if (!html) {
                    html = '<div class="empty-state"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg></span>No properties found</div>';
                }

                contentEl.innerHTML = html;
            } catch (e) {
                javaBridge.log('Error loading detail: ' + e.message);
            }
        }

        function openGraph() {
            if (selectedUri) javaBridge.openGraphForIndividual(selectedUri);
        }

        function openGraphFor(uri) {
            javaBridge.openGraphForIndividual(uri);
        }

        /* ── Utilities ── */

        var _escDiv = document.createElement('div');
        function escapeHtml(text) {
            _escDiv.textContent = text;
            return _escDiv.innerHTML;
        }

        function escAttr(text) {
            return (text || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function escJs(s) {
            var bs = String.fromCharCode(92);
            return "'" + s.split(bs).join(bs + bs).split("'").join(bs + "'") + "'";
        }

        /* ── Context menu ── */

        function showRowContextMenu(evt, uri, label, type) {
            evt.preventDefault();
            evt.stopPropagation();
            var menu = document.getElementById('context-menu');
            var shortName = label.length > 30 ? label.substring(0, 27) + '...' : label;

            var html = '<div class="ctx-header">Event: ' + escapeHtml(shortName) + '</div>';
            html += '<div class="ctx-item" onclick="ctxIncludeName(' + escJs(label) + ')">';
            html += '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Include \"' + escapeHtml(shortName) + '\"</div>';
            html += '<div class="ctx-item" onclick="ctxExcludeName(' + escJs(label) + ')">';
            html += '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg> Exclude \"' + escapeHtml(shortName) + '\"</div>';
            html += '<div class="ctx-separator"></div>';

            var groupLabel = type;
            html += '<div class="ctx-header">Type: ' + escapeHtml(groupLabel) + '</div>';
            html += '<div class="ctx-item" onclick="ctxShowOnly(' + escJs(type) + ')">';
            html += '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Show only ' + escapeHtml(groupLabel) + '</div>';
            html += '<div class="ctx-item" onclick="ctxExcludeType(' + escJs(type) + ')">';
            html += '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg> Exclude ' + escapeHtml(groupLabel) + '</div>';

            html += '<div class="ctx-separator"></div>';
            html += '<div class="ctx-item" onclick="openGraphFor(' + escJs(uri) + ')">';
            html += '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51 15.42 17.49"/><path d="M15.41 6.51 8.59 10.49"/></svg> Open Graph</div>';

            menu.innerHTML = html;
            menu.style.display = 'block';
            menu.style.left = evt.clientX + 'px';
            menu.style.top = evt.clientY + 'px';
            // Adjust if overflowing
            var rect = menu.getBoundingClientRect();
            if (rect.right > window.innerWidth) menu.style.left = (evt.clientX - rect.width) + 'px';
            if (rect.bottom > window.innerHeight) menu.style.top = (evt.clientY - rect.height) + 'px';
        }

        function hideContextMenu() {
            document.getElementById('context-menu').style.display = 'none';
        }

        document.addEventListener('click', function() { hideContextMenu(); });
        document.addEventListener('contextmenu', function(e) {
            // Only allow our custom context menu on table rows
            if (!e.target.closest('#event-tbody')) hideContextMenu();
        });

        /* ── Include / Exclude name actions ── */

        function ctxIncludeName(name) {
            hideContextMenu();
            for (var i = 0; i < nameIncludes.length; i++) {
                if (nameIncludes[i].text === name) return;
            }
            nameIncludes.push({ text: name });
            renderFilterTags();
            applyFilters();
        }

        function ctxExcludeName(name) {
            hideContextMenu();
            for (var i = 0; i < nameExcludes.length; i++) {
                if (nameExcludes[i].text === name) return;
            }
            nameExcludes.push({ text: name });
            renderFilterTags();
            applyFilters();
        }

        function ctxShowOnly(type) {
            hideContextMenu();
            activeTypes.clear();
            activeTypes.add(type);
            refreshTypeChips();
            applyFilters();
        }

        function ctxExcludeType(type) {
            hideContextMenu();
            activeTypes.delete(type);
            refreshTypeChips();
            applyFilters();
        }

        function removeInclude(idx) {
            nameIncludes.splice(idx, 1);
            renderFilterTags();
            applyFilters();
        }

        function removeExclude(idx) {
            nameExcludes.splice(idx, 1);
            renderFilterTags();
            applyFilters();
        }

        function renderFilterTags() {
            var container = document.getElementById('filter-tags');
            var html = '';
            nameIncludes.forEach(function(f, i) {
                var short = f.text.length > 20 ? f.text.substring(0, 17) + '...' : f.text;
                html += '<span class="filter-tag include" title="Include: ' + escAttr(f.text) + '">';
                html += '<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> ' + escapeHtml(short);
                html += '<span class="tag-remove" onclick="removeInclude(' + i + ')">&times;</span></span>';
            });
            nameExcludes.forEach(function(f, i) {
                var short = f.text.length > 20 ? f.text.substring(0, 17) + '...' : f.text;
                html += '<span class="filter-tag exclude" title="Exclude: ' + escAttr(f.text) + '">';
                html += '<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg> ' + escapeHtml(short);
                html += '<span class="tag-remove" onclick="removeExclude(' + i + ')">&times;</span></span>';
            });
            container.innerHTML = html;
        }

        /* ── Select All / None / Clear ── */

        function selectAllTypes() {
            allEvents.forEach(function(e) { activeTypes.add(e.type); });
            refreshTypeChips();
            applyFilters();
        }

        function selectNoTypes() {
            activeTypes.clear();
            refreshTypeChips();
            applyFilters();
        }

        function clearAllFilters() {
            document.getElementById('search-input').value = '';
            nameIncludes = [];
            nameExcludes = [];
            eventPageIndex = 0;
            renderFilterTags();
            selectAllTypes();
        }

        function clearDateRange() {
            if (fpStart) fpStart.clear();
            if (fpEnd) fpEnd.clear();
            dateStartIso = null;
            dateEndIso = null;
            applyFilters();
        }
    </script>
    <script>lucide.createIcons();</script>
