<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(var(--border))',
                        input: 'hsl(var(--input))',
                        ring: 'hsl(var(--ring))',
                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                        primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
                        secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
                        destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
                        muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
                        accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
                        popover: { DEFAULT: 'hsl(var(--popover))', foreground: 'hsl(var(--popover-foreground))' },
                        card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
                    },
                    borderRadius: {
                        lg: 'var(--radius)',
                        md: 'calc(var(--radius) - 2px)',
                        sm: 'calc(var(--radius) - 4px)',
                    },
                },
            },
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://unpkg.com/@sgratzl/chartjs-chart-boxplot@4"></script>
    <script src="https://unpkg.com/chartjs-chart-matrix@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            font-family: Inter, sans-serif;
            font-feature-settings: 'liga' 1, 'calt' 1;
            --background: 240 10% 3.9%;
            --foreground: 0 0% 98%;
            --card: 240 10% 3.9%;
            --card-foreground: 0 0% 98%;
            --popover: 240 10% 3.9%;
            --popover-foreground: 0 0% 98%;
            --primary: 0 0% 98%;
            --primary-foreground: 240 5.9% 10%;
            --secondary: 240 3.7% 15.9%;
            --secondary-foreground: 0 0% 98%;
            --muted: 240 3.7% 15.9%;
            --muted-foreground: 240 5% 64.9%;
            --accent: 240 3.7% 15.9%;
            --accent-foreground: 0 0% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 0 0% 98%;
            --border: 240 3.7% 15.9%;
            --input: 240 3.7% 15.9%;
            --ring: 240 4.9% 83.9%;
            --radius: 0.5rem;
        }
        @supports (font-variation-settings: normal) { :root { font-family: InterVariable, sans-serif; } }
    </style>
    <style>
        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; margin: 0; padding: 0; }
        input, textarea, #detail-panel { user-select: text; -webkit-user-select: text; }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: hsl(var(--background));
            color: hsl(var(--foreground));
        }

        /* Header */
        #header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            border-bottom: 1px solid hsl(var(--border) / 0.15);
            background: hsl(var(--card));
            flex-shrink: 0;
        }
        #header h1 { font-size: 16px; font-weight: 600; flex-grow: 1; }
        #stats { font-size: 11px; color: hsl(var(--muted-foreground)); }
        #back-btn {
            background: none;
            border: 1px solid hsl(var(--border) / 0.3);
            color: hsl(var(--foreground));
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        #back-btn:hover { background: hsl(var(--accent)); }

        /* Histogram area */
        #histogram-area {
            height: 240px;
            min-height: 180px;
            flex-shrink: 0;
            padding: 10px 20px 8px 20px;
            border-bottom: 1px solid hsl(var(--border) / 0.15);
            background: hsl(var(--card));
            position: relative;
            display: flex;
            flex-direction: column;
        }
        #histogram-chart-wrap { flex: 1; min-height: 0; position: relative; }
        #histogram-canvas { width: 100% !important; height: 100% !important; }

        /* Histogram controls */
        #histogram-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-bottom: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .control-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: hsl(var(--muted-foreground));
            margin-right: 4px;
        }
        .ctrl-btn {
            background: hsl(var(--background));
            border: 1px solid hsl(var(--border) / 0.2);
            color: hsl(var(--muted-foreground));
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .ctrl-btn:hover {
            background: hsl(var(--accent));
            color: hsl(var(--foreground));
        }
        .ctrl-btn.active {
            background: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border-color: hsl(var(--primary));
        }
        .ctrl-btn svg { width: 14px; height: 14px; }

        /* Main content: table + detail */
        #content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Table area */
        #table-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* Filter bar */
        #filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            border-bottom: 1px solid hsl(var(--border) / 0.15);
            background: hsl(var(--card));
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        #search-input {
            width: 220px;
            background: hsl(var(--background));
            border: 1px solid hsl(var(--border) / 0.3);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            color: hsl(var(--foreground));
            outline: none;
        }
        #search-input:focus { border-color: hsl(var(--ring)); }
        #search-input::placeholder { color: hsl(var(--muted-foreground)); }
        .type-filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        .type-filter-chip.active { color: #fff; }
        .type-filter-chip.inactive {
            color: hsl(var(--muted-foreground));
            background: hsl(var(--muted)) !important;
            border-color: hsl(var(--border) / 0.15);
            opacity: 0.5;
        }
        .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        #match-count { font-size: 11px; color: hsl(var(--muted-foreground)); margin-left: auto; }

        /* Scrollable table */
        #table-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        thead {
            position: sticky;
            top: 0;
            z-index: 2;
        }
        thead th {
            background: hsl(var(--secondary));
            color: hsl(var(--secondary-foreground));
            text-align: left;
            padding: 8px 12px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
            cursor: pointer;
            border-bottom: 2px solid hsl(var(--border) / 0.3);
        }
        thead th:hover { background: hsl(var(--accent)); }
        thead th .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.5; }
        thead th.sorted .sort-arrow { opacity: 1; }
        tbody tr {
            border-bottom: 1px solid hsl(var(--border) / 0.08);
            cursor: pointer;
            transition: background 0.1s;
        }
        tbody tr:hover { background: hsl(var(--accent)); }
        tbody tr.selected { background: hsl(var(--ring) / 0.15); }
        tbody td {
            padding: 7px 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }
        .type-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 600;
            color: #fff;
        }

        /* Detail panel */
        #detail-panel {
            width: 360px;
            min-width: 300px;
            border-left: 1px solid hsl(var(--border) / 0.15);
            background: hsl(var(--card));
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.2s;
        }
        #detail-panel.empty {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #detail-header {
            padding: 16px 20px;
            border-bottom: 1px solid hsl(var(--border) / 0.15);
            flex-shrink: 0;
        }
        #detail-header h2 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            word-break: break-word;
        }
        #detail-type {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        #detail-uri {
            font-size: 10px;
            color: hsl(var(--muted-foreground));
            word-break: break-all;
            line-height: 1.4;
        }
        #detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }
        .detail-section {
            margin-bottom: 16px;
        }
        .detail-section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: hsl(var(--muted-foreground));
            margin-bottom: 8px;
        }
        .prop-row {
            display: flex;
            gap: 8px;
            padding: 5px 0;
            border-bottom: 1px solid hsl(var(--border) / 0.06);
            font-size: 12px;
            line-height: 1.4;
        }
        .prop-key {
            flex-shrink: 0;
            width: 120px;
            font-weight: 500;
            color: hsl(var(--muted-foreground));
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .prop-value {
            flex: 1;
            word-break: break-word;
            color: hsl(var(--foreground));
        }
        .prop-value a {
            color: hsl(var(--ring));
            text-decoration: none;
        }
        .prop-value a:hover { text-decoration: underline; }

        #detail-actions {
            padding: 12px 20px;
            border-top: 1px solid hsl(var(--border) / 0.15);
            flex-shrink: 0;
            display: flex;
            gap: 8px;
        }
        #detail-actions button {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid hsl(var(--border) / 0.3);
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            transition: background 0.15s;
        }
        #detail-actions button:hover { background: hsl(var(--accent)); }

        .empty-state {
            text-align: center;
            color: hsl(var(--muted-foreground));
            font-size: 13px;
            padding: 40px 20px;
        }
        .empty-state .icon { font-size: 32px; margin-bottom: 8px; display: block; }

        /* Context menu */
        #context-menu {
            position: fixed;
            display: none;
            min-width: 210px;
            z-index: 500;
            background: hsl(var(--popover));
            color: hsl(var(--popover-foreground));
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid hsl(var(--border) / 0.15);
            padding: 4px 0;
            font-size: 12px;
        }
        .ctx-header {
            padding: 4px 16px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: hsl(var(--muted-foreground));
            font-weight: 600;
        }
        .ctx-item {
            padding: 6px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.1s;
        }
        .ctx-item:hover { background: hsl(var(--accent)); }
        .ctx-separator { height: 1px; background: hsl(var(--border) / 0.15); margin: 4px 0; }

        /* Filter tags */
        .filter-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
            cursor: default;
        }
        .filter-tag.include {
            background: hsl(142 71% 45% / 0.15);
            color: hsl(142 71% 45%);
            border: 1px solid hsl(142 71% 45% / 0.25);
        }
        .filter-tag.exclude {
            background: hsl(var(--destructive) / 0.15);
            color: hsl(var(--destructive));
            border: 1px solid hsl(var(--destructive) / 0.25);
        }
        .filter-tag .tag-remove { cursor: pointer; opacity: 0.7; font-size: 12px; margin-left: 2px; }
        .filter-tag .tag-remove:hover { opacity: 1; }

        /* Filter action buttons */
        .filter-action-btn {
            background: hsl(var(--background));
            border: 1px solid hsl(var(--border) / 0.2);
            color: hsl(var(--muted-foreground));
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-action-btn:hover {
            background: hsl(var(--accent));
            color: hsl(var(--foreground));
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: hsl(var(--background)); }
        ::-webkit-scrollbar-thumb { background: hsl(var(--muted)); border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: hsl(var(--accent)); }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header">
        <button id="back-btn" onclick="javaBridge.navigateBack()" style="display:flex;align-items:center;gap:6px"><i data-lucide="arrow-left" style="width:14px;height:14px"></i> Back</button>
        <h1 style="display:flex;align-items:center;gap:8px"><i data-lucide="bar-chart-3" style="width:18px;height:18px"></i> Event Explorer</h1>
        <span id="stats"></span>
    </div>

    <!-- Histogram -->
    <div id="histogram-area">
        <div id="histogram-controls">
            <div class="control-group">
                <span class="control-label">Period:</span>
                <button class="ctrl-btn period-btn active" data-unit="auto" onclick="setPeriod('auto')">Auto</button>
                <button class="ctrl-btn period-btn" data-unit="day" onclick="setPeriod('day')">Day</button>
                <button class="ctrl-btn period-btn" data-unit="week" onclick="setPeriod('week')">Week</button>
                <button class="ctrl-btn period-btn" data-unit="month" onclick="setPeriod('month')">Month</button>
                <button class="ctrl-btn period-btn" data-unit="quarter" onclick="setPeriod('quarter')">Quarter</button>
                <button class="ctrl-btn period-btn" data-unit="year" onclick="setPeriod('year')">Year</button>
            </div>
            <div class="control-group" style="margin-left:auto">
                <span class="control-label">View:</span>
                <button class="ctrl-btn chart-btn active" data-chart="bar" onclick="setChartType('bar')" title="Stacked bars"><i data-lucide="bar-chart-3" style="width:14px;height:14px"></i> Bars</button>
                <button class="ctrl-btn chart-btn" data-chart="line" onclick="setChartType('line')" title="Line chart"><i data-lucide="trending-up" style="width:14px;height:14px"></i> Lines</button>
                <button class="ctrl-btn chart-btn" data-chart="area" onclick="setChartType('area')" title="Stacked area"><i data-lucide="layers" style="width:14px;height:14px"></i> Area</button>
                <button class="ctrl-btn chart-btn" data-chart="cumulative" onclick="setChartType('cumulative')" title="Cumulative line"><i data-lucide="arrow-up-right" style="width:14px;height:14px"></i> Cumul.</button>
                <button class="ctrl-btn chart-btn" data-chart="boxplot" onclick="setChartType('boxplot')" title="Box plot"><i data-lucide="box-select" style="width:14px;height:14px"></i> Box</button>
                <button class="ctrl-btn chart-btn" data-chart="violin" onclick="setChartType('violin')" title="Violin plot"><i data-lucide="activity" style="width:14px;height:14px"></i> Violin</button>
                <button class="ctrl-btn chart-btn" data-chart="pie" onclick="setChartType('pie')" title="Type distribution"><i data-lucide="pie-chart" style="width:14px;height:14px"></i> Donut</button>
                <button class="ctrl-btn chart-btn" data-chart="scatter" onclick="setChartType('scatter')" title="Timeline scatter"><i data-lucide="circle-dot" style="width:14px;height:14px"></i> Scatter</button>
                <button class="ctrl-btn chart-btn" data-chart="heatmap" onclick="setChartType('heatmap')" title="Day × Hour heatmap"><i data-lucide="grid-3x3" style="width:14px;height:14px"></i> Heat</button>
                <button class="ctrl-btn chart-btn" data-chart="radar" onclick="setChartType('radar')" title="Day-of-week radar"><i data-lucide="radar" style="width:14px;height:14px"></i> Radar</button>
            </div>
        </div>
        <div id="histogram-chart-wrap">
            <canvas id="histogram-canvas"></canvas>
        </div>
    </div>

    <!-- Context menu -->
    <div id="context-menu"></div>

    <!-- Content: table + detail -->
    <div id="content">
        <div id="table-area">
            <div id="filter-bar">
                <span style="font-size:10px; text-transform:uppercase; color:hsl(var(--muted-foreground)); flex-shrink:0;">Filter:</span>
                <input type="text" id="search-input" placeholder="Search events..." oninput="applyFilters()">
                <div id="type-chips" style="display:flex; gap:6px; flex-wrap:wrap;"></div>
                <span id="match-count"></span>
                <div id="filter-tags" style="display:flex; gap:6px; flex-wrap:wrap;"></div>
                <div style="margin-left:auto; display:flex; gap:4px; flex-shrink:0;">
                    <button class="filter-action-btn" onclick="selectAllTypes()">All</button>
                    <button class="filter-action-btn" onclick="selectNoTypes()">None</button>
                    <button class="filter-action-btn" onclick="clearAllFilters()">Clear</button>
                </div>
            </div>
            <div id="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortBy('label')" id="th-label">Name <span class="sort-arrow"><i data-lucide="chevron-up" style="width:12px;height:12px"></i></span></th>
                            <th onclick="sortBy('type')" id="th-type">Type <span class="sort-arrow"><i data-lucide="chevron-up" style="width:12px;height:12px"></i></span></th>
                            <th onclick="sortBy('start')" id="th-start">Timestamp <span class="sort-arrow"><i data-lucide="chevron-up" style="width:12px;height:12px"></i></span></th>
                        </tr>
                    </thead>
                    <tbody id="event-tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- Detail panel -->
        <div id="detail-panel" class="empty">
            <div class="empty-state" id="detail-empty">
                <span class="icon"><i data-lucide="mouse-pointer-click" style="width:32px;height:32px;margin:0 auto"></i></span>
                Select an event to view its details
            </div>
            <div id="detail-filled" style="display:none; flex-direction:column; height:100%;">
                <div id="detail-header">
                    <span id="detail-type"></span>
                    <h2 id="detail-title"></h2>
                    <div id="detail-uri"></div>
                </div>
                <div id="detail-content"></div>
                <div id="detail-actions">
                    <button onclick="openGraph()" style="display:flex;align-items:center;gap:6px"><i data-lucide="share-2" style="width:14px;height:14px"></i> Open Graph</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        var allEvents = [];
        var filteredEvents = [];
        var activeTypes = new Set();
        var typeColorMap = {};
        var selectedUri = null;
        var sortField = 'start';
        var sortAsc = true;
        var histogramChart = null;
        var currentBucketUnit = 'auto';
        var currentChartType = 'bar';
        var autoBucketUnit = 'day';

        var nameIncludes = [];  // [{text:'...'}] — event must match at least one
        var nameExcludes = [];  // [{text:'...'}] — event must not match any

        function initExplorer() {
            try {
                var itemsJson = javaBridge.getTimelineItemsJson();
                var groupsJson = javaBridge.getTimelineGroupsJson();
                var items = JSON.parse(itemsJson);
                var groups = JSON.parse(groupsJson);

                // Build color map from provided group colors (single source of truth)
                groups.forEach(function(g) {
                    if (g.color) typeColorMap[g.id] = g.color;
                });

                // Parse items into our event list
                allEvents = items.map(function(it) {
                    // Extract plain text from content (might have HTML)
                    var tmp = document.createElement('div');
                    tmp.innerHTML = it.content || '';
                    var label = tmp.textContent || tmp.innerText || '';
                    return {
                        uri: it.id,
                        label: label,
                        type: it.group || 'Unknown',
                        start: it.start,
                        tooltip: it.title || ''
                    };
                });

                document.getElementById('stats').textContent = allEvents.length + ' events loaded';

                // Build type chips
                buildTypeChips(groups);

                // Initial render
                applyFilters();

                // Build histogram
                buildHistogram();

                javaBridge.log('Event Explorer initialized with ' + allEvents.length + ' events');
            } catch (e) {
                javaBridge.log('Error initializing explorer: ' + e.message);
                document.getElementById('table-scroll').innerHTML =
                    '<div class="empty-state" style="padding:60px"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></span>Error: ' + e.message + '</div>';
            }
        }

        /* ── Histogram ── */

        function buildHistogram() {
            if (allEvents.length === 0) return;
            // Compute auto bucket unit from time range
            var timestamps = allEvents.map(function(e) { return new Date(e.start).getTime(); });
            var minT = Math.min.apply(null, timestamps);
            var maxT = Math.max.apply(null, timestamps);
            var range = maxT - minT;
            var msDay = 86400000, msMonth = msDay * 30, msYear = msDay * 365;
            if (range > msYear * 10) autoBucketUnit = 'year';
            else if (range > msYear * 2) autoBucketUnit = 'quarter';
            else if (range > msMonth * 6) autoBucketUnit = 'month';
            else if (range > msDay * 30) autoBucketUnit = 'week';
            else autoBucketUnit = 'day';
            updateAutoLabel();
            rebuildHistogram();
        }

        function getEffectiveUnit() {
            return currentBucketUnit === 'auto' ? autoBucketUnit : currentBucketUnit;
        }

        function setPeriod(unit) {
            currentBucketUnit = unit;
            document.querySelectorAll('.period-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.unit === unit);
            });
            updateAutoLabel();
            rebuildHistogram();
        }

        function updateAutoLabel() {
            var btn = document.querySelector('.period-btn[data-unit="auto"]');
            if (!btn) return;
            var resolved = autoBucketUnit.charAt(0).toUpperCase() + autoBucketUnit.slice(1);
            btn.textContent = currentBucketUnit === 'auto' ? 'Auto (' + resolved + ')' : 'Auto';
        }

        function setChartType(type) {
            currentChartType = type;
            document.querySelectorAll('.chart-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.chart === type);
            });
            rebuildHistogram();
        }

        function rebuildHistogram() {
            if (histogramChart) { histogramChart.destroy(); histogramChart = null; }
            if (allEvents.length === 0) return;
            var unit = getEffectiveUnit();
            switch (currentChartType) {
                case 'bar':        buildBarChart(unit); break;
                case 'line':       buildLineChart(unit); break;
                case 'boxplot':    buildBoxPlotChart(unit); break;
                case 'violin':     buildViolinChart(unit); break;
                case 'area':       buildAreaChart(unit); break;
                case 'cumulative': buildCumulativeChart(unit); break;
                case 'pie':        buildPieChart(); break;
                case 'scatter':    buildScatterChart(unit); break;
                case 'heatmap':    buildHeatmapChart(unit); break;
                case 'radar':      buildRadarChart(unit); break;
                default:           buildBarChart(unit); break;
            }
        }

        /* ── Aggregation helpers ── */

        function getBucketStart(dateStr, unit) {
            var d = new Date(dateStr);
            switch (unit) {
                case 'hour':  return new Date(d.getFullYear(), d.getMonth(), d.getDate(), d.getHours()).getTime();
                case 'day':   return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
                case 'week':
                    var day = d.getDay();
                    var diff = d.getDate() - day + (day === 0 ? -6 : 1);
                    return new Date(d.getFullYear(), d.getMonth(), diff).getTime();
                case 'month':   return new Date(d.getFullYear(), d.getMonth(), 1).getTime();
                case 'quarter': return new Date(d.getFullYear(), Math.floor(d.getMonth() / 3) * 3, 1).getTime();
                case 'year':    return new Date(d.getFullYear(), 0, 1).getTime();
                default:        return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
            }
        }

        function aggregateIntoBuckets(unit) {
            var byType = {};
            var allBucketKeys = new Set();
            allEvents.forEach(function(e) {
                var bk = getBucketStart(e.start, unit);
                allBucketKeys.add(bk);
                if (!byType[e.type]) byType[e.type] = {};
                byType[e.type][bk] = (byType[e.type][bk] || 0) + 1;
            });
            var sorted = Array.from(allBucketKeys).sort(function(a, b) { return a - b; });
            return { bucketKeys: sorted, byType: byType };
        }

        function getSubUnit(unit) {
            switch (unit) {
                case 'year':    return 'month';
                case 'quarter': return 'week';
                case 'month':   return 'day';
                case 'week':    return 'day';
                case 'day':     return 'hour';
                default:        return 'day';
            }
        }

        function formatBucketLabel(ts, unit) {
            var d = new Date(ts);
            switch (unit) {
                case 'day':     return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                case 'week':    return 'W' + getWeekNumber(d) + ' ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                case 'month':   return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
                case 'quarter': return 'Q' + (Math.floor(d.getMonth() / 3) + 1) + ' ' + d.getFullYear();
                case 'year':    return '' + d.getFullYear();
                default:        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }
        }

        function getWeekNumber(d) {
            var dt = new Date(d.getFullYear(), d.getMonth(), d.getDate());
            dt.setDate(dt.getDate() + 4 - (dt.getDay() || 7));
            var yearStart = new Date(dt.getFullYear(), 0, 1);
            return Math.ceil((((dt - yearStart) / 86400000) + 1) / 7);
        }

                                    var total = item.dataset.data.reduce(function(s, v) { return s + v; }, 0);
                                    var pct = total > 0 ? ((item.raw / total) * 100).toFixed(1) : 0;
                                    return item.label + ': ' + item.raw + ' (' + pct + '%)';
                                }
                            }
                        }
                    }
                }
            });
        }

        /* ── Scatter chart (timeline strip) ── */

        function buildScatterChart(unit) {
            var types = [];
            var typeSet = new Set();
            allEvents.forEach(function(e) {
                if (!typeSet.has(e.type)) { typeSet.add(e.type); types.push(e.type); }
            });
            var dataByType = {};
            allEvents.forEach(function(e) {
                if (!dataByType[e.type]) dataByType[e.type] = [];
                dataByType[e.type].push({
                    x: new Date(e.start).getTime(),
                    y: types.indexOf(e.type),
                    label: e.label,
                    uri: e.uri
                });
            });
            var datasets = types.map(function(type) {
                var color = typeColorMap[type] || '#a6cee3';
                return {
                    label: type,
                    data: dataByType[type] || [],
                    backgroundColor: color + '88',
                    borderColor: color,
                    borderWidth: 1,
                    pointRadius: 4,
                    pointHoverRadius: 7,
                    hidden: !activeTypes.has(type)
                };
            });
            var scatterTypes = types;
            var ctx = document.getElementById('histogram-canvas').getContext('2d');
            histogramChart = new Chart(ctx, {
                type: 'scatter',
                data: { datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 300 },
                    plugins: {
                        legend: {
                            display: true, position: 'top', align: 'end',
                            labels: { color: 'hsl(0 0% 63%)', font: { size: 10 }, boxWidth: 10, boxHeight: 10, padding: 8, usePointStyle: true, pointStyle: 'circle' }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(20,20,30,0.95)', titleColor: '#fff', bodyColor: '#ccc',
                            borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 10,
                            callbacks: {
                                title: function(items) {
                                    if (items.length > 0) {
                                        return new Date(items[0].parsed.x).toLocaleDateString('en-US', {
                                            year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                                        });
                                    }
                                    return '';
                                },
                                label: function(item) {
                                    var raw = item.raw;
                                    return raw.label || scatterTypes[raw.y] || '';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: unit, round: unit },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: 'hsl(0 0% 63%)', font: { size: 10 }, maxRotation: 0 },
                            border: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            type: 'linear',
                            min: -0.5,
                            max: types.length - 0.5,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: {
                                color: 'hsl(0 0% 63%)', font: { size: 10 },
                                stepSize: 1,
                                callback: function(value) { return scatterTypes[value] || ''; }
                            },
                            border: { color: 'rgba(255,255,255,0.1)' }
                        }
                    },
                    onClick: function(evt, elements) {
                        if (elements.length > 0) {
                            var el = elements[0];
                            var point = histogramChart.data.datasets[el.datasetIndex].data[el.index];
                            if (point && point.uri) selectEvent(point.uri);
                        }
                    }
                }
            });
        }

        /* ── Heatmap ── */

        function getHeatmapConfig(unit) {
            switch (unit) {
                case 'year':
                    return {
                        rowCount: 12,
                        colCount: 31,
                        getRow: function(d) { return d.getMonth(); },
                        getCol: function(d) { return d.getDate() - 1; },
                        rowLabels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                        colLabel: function(v) { return '' + (v + 1); },
                        xTitle: 'Day of Month',
                        yTitle: 'Month',
                        tooltipTitle: function(row, col, rowLabels) { return rowLabels[row] + ', day ' + (col + 1); }
                    };
                case 'quarter':
                    return {
                        rowCount: 3,
                        colCount: 31,
                        getRow: function(d) { return d.getMonth() % 3; },
                        getCol: function(d) { return d.getDate() - 1; },
                        rowLabels: ['Month 1','Month 2','Month 3'],
                        colLabel: function(v) { return '' + (v + 1); },
                        xTitle: 'Day of Month',
                        yTitle: 'Month in Quarter',
                        tooltipTitle: function(row, col, rowLabels) { return rowLabels[row] + ', day ' + (col + 1); }
                    };
                case 'month':
                    return {
                        rowCount: 7,
                        colCount: 5,
                        getRow: function(d) { var dow = d.getDay(); return dow === 0 ? 6 : dow - 1; },
                        getCol: function(d) { return Math.floor((d.getDate() - 1) / 7); },
                        rowLabels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
                        colLabel: function(v) { return 'W' + (v + 1); },
                        xTitle: 'Week of Month',
                        yTitle: 'Day of Week',
                        tooltipTitle: function(row, col, rowLabels) { return rowLabels[row] + ', week ' + (col + 1); }
                    };
                case 'day':
                    return {
                        rowCount: 1,
                        colCount: 24,
                        getRow: function() { return 0; },
                        getCol: function(d) { return d.getHours(); },
                        rowLabels: ['Events'],
                        colLabel: function(v) { return v + ':00'; },
                        xTitle: 'Hour of Day',
                        yTitle: '',
                        tooltipTitle: function(row, col) { return col + ':00'; }
                    };
                default: // week
                    return {
                        rowCount: 7,
                        colCount: 24,
                        getRow: function(d) { var dow = d.getDay(); return dow === 0 ? 6 : dow - 1; },
                        getCol: function(d) { return d.getHours(); },
                        rowLabels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
                        colLabel: function(v) { return v + ':00'; },
                        xTitle: 'Hour of Day',
                        yTitle: 'Day of Week',
                        tooltipTitle: function(row, col, rowLabels) { return rowLabels[row] + ' at ' + col + ':00'; }
                    };
            }
        }

        function buildHeatmapChart(unit) {
            var cfg = getHeatmapConfig(unit);
            var matrix = {};
            allEvents.forEach(function(e) {
                if (!activeTypes.has(e.type)) return;
                var d = new Date(e.start);
                var row = cfg.getRow(d);
                var col = cfg.getCol(d);
                var key = row + '-' + col;
                matrix[key] = (matrix[key] || 0) + 1;
            });
            var data = [];
            var maxVal = 0;
            for (var r = 0; r < cfg.rowCount; r++) {
                for (var c = 0; c < cfg.colCount; c++) {
                    var val = matrix[r + '-' + c] || 0;
                    if (val > maxVal) maxVal = val;
                    data.push({ x: c, y: r, v: val });
                }
            }
            var capturedMax = maxVal;
            var capturedCfg = cfg;
            var ctx = document.getElementById('histogram-canvas').getContext('2d');
            histogramChart = new Chart(ctx, {
                type: 'matrix',
                data: {
                    datasets: [{
                        label: 'Event Density',
                        data: data,
                        backgroundColor: function(context) {
                            var item = context.dataset.data[context.dataIndex];
                            if (!item || item.v === 0) return 'rgba(255,255,255,0.03)';
                            var alpha = capturedMax > 0 ? Math.min(0.15 + (item.v / capturedMax) * 0.85, 1) : 0.15;
                            return 'rgba(99, 102, 241, ' + alpha + ')';
                        },
                        borderColor: 'rgba(255,255,255,0.06)',
                        borderWidth: 1,
                        width: function(context) {
                            var area = context.chart.chartArea;
                            return area ? (area.width / capturedCfg.colCount - 2) : 10;
                        },
                        height: function(context) {
                            var area = context.chart.chartArea;
                            return area ? (area.height / capturedCfg.rowCount - 2) : 10;
                        }
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 300 },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(20,20,30,0.95)', titleColor: '#fff', bodyColor: '#ccc',
                            borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 10,
                            callbacks: {
                                title: function(items) {
                                    if (items.length > 0) {
                                        var raw = items[0].raw;
                                        return capturedCfg.tooltipTitle(raw.y, raw.x, capturedCfg.rowLabels);
                                    }
                                    return '';
                                },
                                label: function(item) {
                                    return item.raw.v + ' events';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear', position: 'top',
                            min: -0.5, max: capturedCfg.colCount - 0.5,
                            grid: { display: false },
                            ticks: {
                                color: 'hsl(0 0% 63%)', font: { size: 10 },
                                stepSize: 1,
                                callback: function(v) { return capturedCfg.colLabel(v); }
                            },
                            border: { color: 'rgba(255,255,255,0.1)' },
                            title: { display: true, text: capturedCfg.xTitle, color: 'hsl(0 0% 63%)', font: { size: 10 } }
                        },
                        y: {
                            type: 'linear',
                            min: -0.5, max: capturedCfg.rowCount - 0.5,
                            grid: { display: false },
                            offset: true,
                            ticks: {
                                color: 'hsl(0 0% 63%)', font: { size: 10 },
                                stepSize: 1,
                                callback: function(v) { return capturedCfg.rowLabels[v] || ''; }
                            },
                            border: { color: 'rgba(255,255,255,0.1)' },
                            title: { display: capturedCfg.yTitle !== '', text: capturedCfg.yTitle, color: 'hsl(0 0% 63%)', font: { size: 10 } }
                        }
                    }
                }
            });
        }

        /* ── Radar chart (cyclical profile) ── */

        function getRadarConfig(unit) {
            switch (unit) {
                case 'day':
                    return {
                        labels: ['0h','1h','2h','3h','4h','5h','6h','7h','8h','9h','10h','11h',
                                 '12h','13h','14h','15h','16h','17h','18h','19h','20h','21h','22h','23h'],
                        count: 24,
                        getIndex: function(d) { return d.getHours(); }
                    };
                case 'year':
                    return {
                        labels: ['January','February','March','April','May','June',
                                 'July','August','September','October','November','December'],
                        count: 12,
                        getIndex: function(d) { return d.getMonth(); }
                    };
                case 'quarter':
                    return {
                        labels: ['Month 1','Month 2','Month 3'],
                        count: 3,
                        getIndex: function(d) { return d.getMonth() % 3; }
                    };
                case 'month':
                    return {
                        labels: (function() { var a = []; for (var i = 1; i <= 31; i++) a.push('' + i); return a; })(),
                        count: 31,
                        getIndex: function(d) { return d.getDate() - 1; }
                    };
                default: // week
                    return {
                        labels: ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'],
                        count: 7,
                        getIndex: function(d) { var dow = d.getDay(); return dow === 0 ? 6 : dow - 1; }
                    };
            }
        }

        function buildRadarChart(unit) {
            var cfg = getRadarConfig(unit);
            var byType = {};
            allEvents.forEach(function(e) {
                if (!byType[e.type]) {
                    byType[e.type] = [];
                    for (var i = 0; i < cfg.count; i++) byType[e.type].push(0);
                }
                var d = new Date(e.start);
                var idx = cfg.getIndex(d);
                if (idx >= 0 && idx < cfg.count) byType[e.type][idx]++;
            });
            var types = Object.keys(byType);
            var datasets = types.map(function(type) {
                var color = typeColorMap[type] || '#a6cee3';
                return {
                    label: type,
                    data: byType[type],
                    backgroundColor: color + '33',
                    borderColor: color,
                    borderWidth: 2,
                    pointBackgroundColor: color,
                    pointBorderColor: '#fff',
                    pointRadius: 3,
                    pointHoverRadius: 6,
                    hidden: !activeTypes.has(type)
                };
            });
            var ctx = document.getElementById('histogram-canvas').getContext('2d');
            histogramChart = new Chart(ctx, {
                type: 'radar',
                data: { labels: cfg.labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 300 },
                    plugins: {
                        legend: {
                            display: true, position: 'top', align: 'end',
                            labels: { color: 'hsl(0 0% 63%)', font: { size: 10 }, boxWidth: 10, boxHeight: 10, padding: 8, usePointStyle: true, pointStyle: 'circle' }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(20,20,30,0.95)', titleColor: '#fff', bodyColor: '#ccc',
                            borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 10
                        }
                    },
                    scales: {
                        r: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: 'hsl(0 0% 63%)', font: { size: 11 } },
                            ticks: { color: 'hsl(0 0% 63%)', font: { size: 9 }, backdropColor: 'transparent', stepSize: 1 }
                        }
                    }
                }
            });
        }

        function scrollToTime(isoDate) {
            var targetTs = new Date(isoDate).getTime();
            // Find the closest event row in filtered list
            var closestIdx = 0;
            var closestDiff = Infinity;
            for (var i = 0; i < filteredEvents.length; i++) {
                var diff = Math.abs(new Date(filteredEvents[i].start).getTime() - targetTs);
                if (diff < closestDiff) { closestDiff = diff; closestIdx = i; }
            }
            // Auto-select and scroll
            if (filteredEvents.length > 0) {
                selectEvent(filteredEvents[closestIdx].uri);
                var row = document.querySelector('tr[data-uri="' + CSS.escape(filteredEvents[closestIdx].uri) + '"]');
                if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        /* ── Type chips ── */

        function buildTypeChips(groups) {
            var container = document.getElementById('type-chips');
            container.innerHTML = '';
            var counts = {};
            allEvents.forEach(function(e) { counts[e.type] = (counts[e.type] || 0) + 1; });
            groups.forEach(function(g) {
                activeTypes.add(g.id);
                var color = typeColorMap[g.id] || '#a6cee3';
                var chip = document.createElement('span');
                chip.className = 'type-filter-chip active';
                chip.style.background = color + '33';
                chip.dataset.type = g.id;
                chip.dataset.color = color;
                chip.innerHTML = '<span class="chip-dot" style="background:' + color + '"></span>' +
                                 escapeHtml(g.content || g.id) +
                                 ' <span style="opacity:0.6; font-size:10px">(' + (counts[g.id] || 0) + ')</span>';
                chip.onclick = function() { toggleType(g.id); };
                container.appendChild(chip);
            });
        }

        function toggleType(type) {
            if (activeTypes.has(type)) activeTypes.delete(type);
            else activeTypes.add(type);
            refreshTypeChips();
            applyFilters();
        }

        function refreshTypeChips() {
            document.querySelectorAll('.type-filter-chip').forEach(function(c) {
                var type = c.dataset.type;
                var color = c.dataset.color;
                if (activeTypes.has(type)) {
                    c.className = 'type-filter-chip active';
                    c.style.background = color + '33';
                } else {
                    c.className = 'type-filter-chip inactive';
                    c.style.background = '';
                }
            });
        }

        /* ── Filter & Sort ── */

        function applyFilters() {
            var query = (document.getElementById('search-input').value || '').toLowerCase();

            filteredEvents = allEvents.filter(function(e) {
                if (!activeTypes.has(e.type)) return false;
                if (query.length > 0) {
                    if (e.label.toLowerCase().indexOf(query) < 0 &&
                        e.uri.toLowerCase().indexOf(query) < 0 &&
                        e.type.toLowerCase().indexOf(query) < 0) return false;
                }

                // Name includes: event must match at least one
                if (nameIncludes.length > 0) {
                    var matchesAny = false;
                    for (var i = 0; i < nameIncludes.length; i++) {
                        var q = nameIncludes[i].text.toLowerCase();
                        if (e.label.toLowerCase().indexOf(q) >= 0 || e.uri.toLowerCase().indexOf(q) >= 0) { matchesAny = true; break; }
                    }
                    if (!matchesAny) return false;
                }

                // Name excludes: event must not match any
                for (var j = 0; j < nameExcludes.length; j++) {
                    var eq = nameExcludes[j].text.toLowerCase();
                    if (e.label.toLowerCase().indexOf(eq) >= 0 || e.uri.toLowerCase().indexOf(eq) >= 0) return false;
                }

                return true;
            });

            // Sort
            filteredEvents.sort(function(a, b) {
                var va = a[sortField] || '';
                var vb = b[sortField] || '';
                var cmp = (va < vb) ? -1 : (va > vb) ? 1 : 0;
                return sortAsc ? cmp : -cmp;
            });

            renderTable();
            updateMatchCount();
            updateHistogramVisibility();
        }

        function sortBy(field) {
            if (sortField === field) { sortAsc = !sortAsc; }
            else { sortField = field; sortAsc = true; }
            // Update header indicators
            document.querySelectorAll('thead th').forEach(function(th) { th.classList.remove('sorted'); });
            var thId = 'th-' + field;
            var th = document.getElementById(thId);
            if (th) {
                th.classList.add('sorted');
                th.querySelector('.sort-arrow').innerHTML = sortAsc ? '<i data-lucide="chevron-up" style="width:12px;height:12px"></i>' : '<i data-lucide="chevron-down" style="width:12px;height:12px"></i>';
                lucide.createIcons({nodes: [th]});
            }
            applyFilters();
        }

        function updateMatchCount() {
            document.getElementById('match-count').textContent =
                filteredEvents.length + ' / ' + allEvents.length + ' events';
        }

        function updateHistogramVisibility() {
            if (!histogramChart) return;
            // Pie and heatmap must be fully rebuilt when type filters change
            if (currentChartType === 'pie' || currentChartType === 'heatmap') {
                rebuildHistogram();
                return;
            }
            // Show/hide datasets based on active types
            histogramChart.data.datasets.forEach(function(ds) {
                ds.hidden = !activeTypes.has(ds.label);
            });
            histogramChart.update('none');
        }

        /* ── Table rendering ── */

        function renderTable() {
            var tbody = document.getElementById('event-tbody');
            var html = '';
            filteredEvents.forEach(function(e) {
                var color = typeColorMap[e.type] || '#a6cee3';
                var isSelected = e.uri === selectedUri;
                var dateStr = formatDate(e.start);
                html += '<tr data-uri="' + escAttr(e.uri) + '" class="' + (isSelected ? 'selected' : '') + '" ' +
                        'onclick="selectEvent(' + escJs(e.uri) + ')" ' +
                        'ondblclick="openGraphFor(' + escJs(e.uri) + ')" ' +
                        'oncontextmenu="showRowContextMenu(event, ' + escJs(e.uri) + ', ' + escJs(e.label) + ', ' + escJs(e.type) + ')">';
                html += '<td title="' + escAttr(e.label) + '">' + escapeHtml(e.label) + '</td>';
                html += '<td><span class="type-badge" style="background:' + color + '">' + escapeHtml(e.type) + '</span></td>';
                html += '<td>' + escapeHtml(dateStr) + '</td>';
                html += '</tr>';
            });
            if (filteredEvents.length === 0) {
                html = '<tr><td colspan="3"><div class="empty-state"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>No events match filters</div></td></tr>';
            }
            tbody.innerHTML = html;
        }

        function formatDate(isoStr) {
            try {
                var d = new Date(isoStr);
                return d.toLocaleString('en-US', {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                });
            } catch (e) { return isoStr; }
        }

        /* ── Event selection & detail panel ── */

        function selectEvent(uri) {
            selectedUri = uri;
            // Highlight row
            document.querySelectorAll('tbody tr').forEach(function(tr) {
                tr.classList.toggle('selected', tr.dataset.uri === uri);
            });
            // Load detail
            loadDetail(uri);
        }

        function loadDetail(uri) {
            try {
                var detailJson = javaBridge.getIndividualDetailsJson(uri);
                var detail = JSON.parse(detailJson);

                document.getElementById('detail-empty').style.display = 'none';
                var filled = document.getElementById('detail-filled');
                filled.style.display = 'flex';
                document.getElementById('detail-panel').classList.remove('empty');

                // Header
                document.getElementById('detail-title').textContent = detail.label || 'Unknown';
                var typeEl = document.getElementById('detail-type');
                typeEl.textContent = detail.type || 'Unknown';
                typeEl.style.background = typeColorMap[detail.type] || '#a6cee3';
                document.getElementById('detail-uri').textContent = uri;

                // Properties
                var contentEl = document.getElementById('detail-content');
                var html = '';

                // Literal properties
                if (detail.literals && detail.literals.length > 0) {
                    html += '<div class="detail-section">';
                    html += '<div class="detail-section-title">Properties</div>';
                    detail.literals.forEach(function(prop) {
                        html += '<div class="prop-row">';
                        html += '<div class="prop-key" title="' + escAttr(prop.predicate) + '">' + escapeHtml(prop.predicate) + '</div>';
                        html += '<div class="prop-value">' + escapeHtml(prop.value) + '</div>';
                        html += '</div>';
                    });
                    html += '</div>';
                }

                // Outgoing relations
                if (detail.outgoing && detail.outgoing.length > 0) {
                    html += '<div class="detail-section">';
                    html += '<div class="detail-section-title">Outgoing Relations</div>';
                    detail.outgoing.forEach(function(rel) {
                        html += '<div class="prop-row">';
                        html += '<div class="prop-key" title="' + escAttr(rel.predicate) + '">' + escapeHtml(rel.predicate) + '</div>';
                        html += '<div class="prop-value"><a href="#" onclick="selectEvent(' + escJs(rel.targetUri) + '); return false;">' + escapeHtml(rel.targetLabel) + '</a></div>';
                        html += '</div>';
                    });
                    html += '</div>';
                }

                // Incoming relations
                if (detail.incoming && detail.incoming.length > 0) {
                    html += '<div class="detail-section">';
                    html += '<div class="detail-section-title">Incoming Relations</div>';
                    detail.incoming.forEach(function(rel) {
                        html += '<div class="prop-row">';
                        html += '<div class="prop-key" title="' + escAttr(rel.predicate) + '">' + escapeHtml(rel.predicate) + '</div>';
                        html += '<div class="prop-value"><a href="#" onclick="selectEvent(' + escJs(rel.sourceUri) + '); return false;">' + escapeHtml(rel.sourceLabel) + '</a></div>';
                        html += '</div>';
                    });
                    html += '</div>';
                }

                if (!html) {
                    html = '<div class="empty-state"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg></span>No properties found</div>';
                }

                contentEl.innerHTML = html;
            } catch (e) {
                javaBridge.log('Error loading detail: ' + e.message);
            }
        }

        function openGraph() {
            if (selectedUri) javaBridge.openGraphForIndividual(selectedUri);
        }

        function openGraphFor(uri) {
            javaBridge.openGraphForIndividual(uri);
        }

        /* ── Utilities ── */

        var _escDiv = document.createElement('div');
        function escapeHtml(text) {
            _escDiv.textContent = text;
            return _escDiv.innerHTML;
        }

        function escAttr(text) {
            return (text || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function escJs(s) {
            var bs = String.fromCharCode(92);
            return "'" + s.split(bs).join(bs + bs).split("'").join(bs + "'") + "'";
        }

        /* ── Context menu ── */

        function showRowContextMenu(evt, uri, label, type) {
            evt.preventDefault();
            evt.stopPropagation();
            var menu = document.getElementById('context-menu');
            var shortName = label.length > 30 ? label.substring(0, 27) + '...' : label;

            var html = '<div class="ctx-header">Event: ' + escapeHtml(shortName) + '</div>';
            html += '<div class="ctx-item" onclick="ctxIncludeName(' + escJs(label) + ')">';
            html += '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Include \"' + escapeHtml(shortName) + '\"</div>';
            html += '<div class="ctx-item" onclick="ctxExcludeName(' + escJs(label) + ')">';
            html += '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg> Exclude \"' + escapeHtml(shortName) + '\"</div>';
            html += '<div class="ctx-separator"></div>';

            var groupLabel = type;
            html += '<div class="ctx-header">Type: ' + escapeHtml(groupLabel) + '</div>';
            html += '<div class="ctx-item" onclick="ctxShowOnly(' + escJs(type) + ')">';
            html += '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Show only ' + escapeHtml(groupLabel) + '</div>';
            html += '<div class="ctx-item" onclick="ctxExcludeType(' + escJs(type) + ')">';
            html += '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg> Exclude ' + escapeHtml(groupLabel) + '</div>';

            html += '<div class="ctx-separator"></div>';
            html += '<div class="ctx-item" onclick="openGraphFor(' + escJs(uri) + ')">';
            html += '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51 15.42 17.49"/><path d="M15.41 6.51 8.59 10.49"/></svg> Open Graph</div>';

            menu.innerHTML = html;
            menu.style.display = 'block';
            menu.style.left = evt.clientX + 'px';
            menu.style.top = evt.clientY + 'px';
            // Adjust if overflowing
            var rect = menu.getBoundingClientRect();
            if (rect.right > window.innerWidth) menu.style.left = (evt.clientX - rect.width) + 'px';
            if (rect.bottom > window.innerHeight) menu.style.top = (evt.clientY - rect.height) + 'px';
        }

        function hideContextMenu() {
            document.getElementById('context-menu').style.display = 'none';
        }

        document.addEventListener('click', function() { hideContextMenu(); });
        document.addEventListener('contextmenu', function(e) {
            // Only allow our custom context menu on table rows
            if (!e.target.closest('#event-tbody')) hideContextMenu();
        });

        /* ── Include / Exclude name actions ── */

        function ctxIncludeName(name) {
            hideContextMenu();
            for (var i = 0; i < nameIncludes.length; i++) {
                if (nameIncludes[i].text === name) return;
            }
            nameIncludes.push({ text: name });
            renderFilterTags();
            applyFilters();
        }

        function ctxExcludeName(name) {
            hideContextMenu();
            for (var i = 0; i < nameExcludes.length; i++) {
                if (nameExcludes[i].text === name) return;
            }
            nameExcludes.push({ text: name });
            renderFilterTags();
            applyFilters();
        }

        function ctxShowOnly(type) {
            hideContextMenu();
            activeTypes.clear();
            activeTypes.add(type);
            refreshTypeChips();
            applyFilters();
        }

        function ctxExcludeType(type) {
            hideContextMenu();
            activeTypes.delete(type);
            refreshTypeChips();
            applyFilters();
        }

        function removeInclude(idx) {
            nameIncludes.splice(idx, 1);
            renderFilterTags();
            applyFilters();
        }

        function removeExclude(idx) {
            nameExcludes.splice(idx, 1);
            renderFilterTags();
            applyFilters();
        }

        function renderFilterTags() {
            var container = document.getElementById('filter-tags');
            var html = '';
            nameIncludes.forEach(function(f, i) {
                var short = f.text.length > 20 ? f.text.substring(0, 17) + '...' : f.text;
                html += '<span class="filter-tag include" title="Include: ' + escAttr(f.text) + '">';
                html += '<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> ' + escapeHtml(short);
                html += '<span class="tag-remove" onclick="removeInclude(' + i + ')">&times;</span></span>';
            });
            nameExcludes.forEach(function(f, i) {
                var short = f.text.length > 20 ? f.text.substring(0, 17) + '...' : f.text;
                html += '<span class="filter-tag exclude" title="Exclude: ' + escAttr(f.text) + '">';
                html += '<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg> ' + escapeHtml(short);
                html += '<span class="tag-remove" onclick="removeExclude(' + i + ')">&times;</span></span>';
            });
            container.innerHTML = html;
        }

        /* ── Select All / None / Clear ── */

        function selectAllTypes() {
            allEvents.forEach(function(e) { activeTypes.add(e.type); });
            refreshTypeChips();
            applyFilters();
        }

        function selectNoTypes() {
            activeTypes.clear();
            refreshTypeChips();
            applyFilters();
        }

        function clearAllFilters() {
            document.getElementById('search-input').value = '';
            nameIncludes = [];
            nameExcludes = [];
            renderFilterTags();
            selectAllTypes();
        }
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
