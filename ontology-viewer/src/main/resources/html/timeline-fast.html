<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Timeline</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
</head>
<body class="antialiased bg-slate-950 text-slate-100 font-inter h-screen flex flex-col overflow-hidden">
<div class="app flex-1 flex flex-col min-h-0">

    <!-- Topbar -->
    <div class="topbar flex items-center gap-2.5 px-3 py-2 bg-slate-900/70 backdrop-blur border-b border-white/10">
        <button class="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-slate-800 border border-white/10 text-sm font-medium text-slate-100" onclick="javaBridge.navigateBack()">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M7.5 2L3.5 6L7.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back
        </button>

        <div class="topbar-sep w-px h-4 bg-white/10 mx-1"></div>

        <button class="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-slate-800 border border-white/10 text-sm font-medium text-slate-100" onclick="zoomBy(0.75)" title="Zoom in (scroll wheel also works)">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M5 3.5V6.5M3.5 5H6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M7.5 7.5L10.5 10.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Zoom in
        </button>

        <button class="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-slate-800 border border-white/10 text-sm font-medium text-slate-100" onclick="zoomBy(1.35)" title="Zoom out">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M3.5 5H6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M7.5 7.5L10.5 10.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Zoom out
        </button>

        <button class="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-slate-800 border border-white/10 text-sm font-medium text-slate-100" onclick="resetView()">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6a4 4 0 1 1 1 2.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M2 4v2h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Reset
        </button>

        <button class="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-slate-800 border border-white/10 text-sm font-medium text-slate-100" id="clear-filters-btn" onclick="clearAllFilters()" style="display: none;">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 3h8M3 3v6.5a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1V3M5 5v4M7 5v4M4 3V2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Clear Filters
        </button>

        <div class="topbar-sep w-px h-4 bg-white/10 mx-1"></div>
        <span class="topbar-title text-sm font-semibold ml-1">Historical Timeline</span>

        <div class="topbar-meta ml-auto flex items-center gap-3 text-xs text-slate-400">
            <span id="stats">Loading…</span>
            <span id="view-meta"></span>
        </div>
    </div>

    <!-- Main canvas -->
    <div class="canvas-wrap flex-1 overflow-y-auto overflow-x-hidden relative bg-slate-950 pb-12" id="canvas-wrap">
        <canvas id="timeline-canvas"></canvas>
    </div>

    <!-- Minimap -->
    <div class="minimap-shell fixed left-0 right-0 bottom-0 h-11 bg-slate-900/80 border-t border-white/10 z-50 pointer-events-auto" id="minimap-shell">
        <span class="minimap-label absolute left-2 top-1/2 -translate-y-1/2 text-xs font-semibold uppercase text-slate-400 pointer-events-none z-10">Overview</span>
        <canvas id="minimap-canvas" class="w-full h-full"></canvas>
        <div id="minimap-focus" class="absolute top-0 bottom-0 pointer-events-none" style="border:1.5px solid rgba(78,161,255,1); background: rgba(78,161,255,0.15);"></div>
    </div>

</div>

<div id="tooltip" class="fixed z-50 hidden pointer-events-none rounded-md p-2 max-w-xs text-sm text-slate-100 bg-slate-900/80 border border-white/10 shadow-lg"></div>

<script>
    /* ── State ─────────────────────────────────────────────────────── */
    var events      = [];
    var groups      = [];
    var groupOrder  = [];
    var groupLabelMap  = {};
    var groupColorMap  = {};
    var groupIndexMap  = {};

    var rangeMin = 0, rangeMax = 0;
    var viewStart = 0, viewEnd = 0;

    /* ── Layout constants ──────────────────────────────────────────── */
    var AXIS_H          = 36;
    var ROW_H           = 26;
    var ROW_GAP         = 10;
    var GROUP_LABEL_W   = 130;   /* reserved left column for category labels */
    var RIGHT_PAD       = 14;
    var STACK_LANE_H    = 22;
    var MAX_STACK_LANES = 4;
    var CLUSTER_PX_W    = 18;    /* bucket width in pixels for clustering */
    var MIN_VIEW_MS     = 1000 * 60 * 10;  /* 10 minutes */

    var MAX_STACKED_ROW_H = ROW_H + (Math.max(MAX_STACK_LANES, 6) - 1) * 22 + ROW_GAP;

    /* ── DOM refs ──────────────────────────────────────────────────── */
    var canvas   = document.getElementById('timeline-canvas');
    var wrap     = document.getElementById('canvas-wrap');
    var ctx      = canvas.getContext('2d');

    var minimap        = document.getElementById('minimap-canvas');
    var minimapCtx     = minimap.getContext('2d');
    var minimapFocus   = document.getElementById('minimap-focus');
    var tooltip        = document.getElementById('tooltip');

    /* ── Runtime ───────────────────────────────────────────────────── */
    var renderQueued = false;
    var hitBoxes     = [];
    var isDraggingTimeline  = false;
    var dragStartX          = 0;
    var dragStartViewStart  = 0;
    var dragStartViewEnd    = 0;
    var isDraggingMinimap   = false;
    var timelineDpr = window.devicePixelRatio || 1;
    var minimapDpr  = window.devicePixelRatio || 1;

    /* ── Filter State ──────────────────────────────────────────────── */
    var filterState = {
        visibleCategories: new Set(),  /* category IDs to show */
        excludedNodeIds: new Set(),    /* individual event URIs to hide */
        excludedLabels: new Set(),     /* event labels/names to hide all matching */
        searchQuery: ''                /* substring to match in label/category/uri */
    };

    /* ── Filter helpers ────────────────────────────────────────────── */
    function initFilterState() {
        filterState.visibleCategories.clear();
        filterState.excludedNodeIds.clear();
        filterState.excludedLabels.clear();
        filterState.searchQuery = '';
        for (var i = 0; i < groupOrder.length; i++) {
            filterState.visibleCategories.add(groupOrder[i]);
        }
    }

    function matchesSearchQuery(text) {
        if (!filterState.searchQuery) return true;
        return text.toLowerCase().indexOf(filterState.searchQuery.toLowerCase()) !== -1;
    }

    function isEventVisible(event) {
        /* Check if category is visible */
        if (!filterState.visibleCategories.has(event.group)) return false;
        /* Check if this specific event is excluded */
        if (filterState.excludedNodeIds.has(event.uri)) return false;
        /* Check if all events with this label are excluded */
        if (filterState.excludedLabels.has(event.label)) return false;
        /* Check search query */
        var searchText = event.label + ' ' + event.group + ' ' + event.uri;
        if (!matchesSearchQuery(searchText)) return false;
        return true;
    }

    function toggleCategory(groupId) {
        if (filterState.visibleCategories.has(groupId)) {
            filterState.visibleCategories.delete(groupId);
        } else {
            filterState.visibleCategories.add(groupId);
        }
        queueRender();
    }

    function showOnlyCategory(groupId) {
        filterState.visibleCategories.clear();
        filterState.visibleCategories.add(groupId);
        queueRender();
    }

    function showAllCategories() {
        filterState.visibleCategories.clear();
        for (var i = 0; i < groupOrder.length; i++) {
            filterState.visibleCategories.add(groupOrder[i]);
        }
        queueRender();
    }

    function excludeNodeId(uri) {
        filterState.excludedNodeIds.add(uri);
        queueRender();
    }

    function excludeNodeLabel(label) {
        filterState.excludedLabels.add(label);
        queueRender();
    }

    function setSearchQuery(query) {
        filterState.searchQuery = query;
        updateSearchStatus();
        updateFilterListPanel();
        queueRender();
    }

    function clearAllFilters() {
        initFilterState();
        var searchBox = document.getElementById('search-box');
        if (searchBox) searchBox.value = '';
        updateSearchStatus();
        updateFilterListPanel();
        queueRender();
    }

    /* ── Init ──────────────────────────────────────────────────────── */
    function initTimelineFast() {
        try {
            var rawItems  = JSON.parse(javaBridge.getTimelineItemsJson()  || '[]');
            var rawGroups = JSON.parse(javaBridge.getTimelineGroupsJson() || '[]');

            groups = rawGroups;
            for (var i = 0; i < groups.length; i++) {
                var g = groups[i];
                groupOrder.push(g.id);
                groupLabelMap[g.id] = g.content || g.id;
                groupColorMap[g.id] = g.color || stableColor(g.id);
            }

            events = [];
            for (var j = 0; j < rawItems.length; j++) {
                var it = rawItems[j];
                var id    = it.id || ('evt_' + j);
                var label = it.label || it.content || id;
                var group = it.group || 'Unknown';
                if (!groupLabelMap[group]) {
                    groupOrder.push(group);
                    groupLabelMap[group] = group;
                    groupColorMap[group] = stableColor(group);
                }
                var ts = parseTimestamp(it);
                if (!isFinite(ts)) continue;
                events.push({ id: id, uri: it.uri || id, label: label, group: group, ts: ts });
            }

            events.sort(function(a, b) { return a.ts - b.ts; });

            groupIndexMap = {};
            for (var k = 0; k < groupOrder.length; k++) {
                groupIndexMap[groupOrder[k]] = k;
            }

            if (events.length === 0) {
                rangeMin = Date.now() - 1000 * 60 * 60 * 24 * 30;
                rangeMax = Date.now();
            } else {
                rangeMin = events[0].ts;
                rangeMax = events[events.length - 1].ts;
            }

            var pad = Math.max((rangeMax - rangeMin) * 0.08, 1000 * 60 * 60 * 24);
            rangeMin -= pad;
            rangeMax += pad;

            var full = rangeMax - rangeMin;
            viewStart = rangeMin;
            viewEnd   = rangeMin + Math.max(full * 0.16, 1000 * 60 * 60 * 24 * 30);
            if (viewEnd > rangeMax) viewEnd = rangeMax;

            initFilterState();
            createSearchUI();
            updateStats();
            resizeAll();
            drawMinimap();
            bindInteractions();
            queueRender();

        } catch (err) {
            javaBridge.log('timeline-fast init error: ' + err.message);
            document.getElementById('stats').textContent = 'Failed to initialize timeline';
        }
    }

    /* ── Helpers ───────────────────────────────────────────────────── */
    function parseTimestamp(item) {
        if (typeof item.timestamp === 'number' && isFinite(item.timestamp)) return item.timestamp;
        if (typeof item.start    === 'number' && isFinite(item.start))     return item.start;
        if (typeof item.start    === 'string') {
            var t = Date.parse(item.start);
            if (isFinite(t)) return t;
        }
        return NaN;
    }

    function updateStats() {
        document.getElementById('stats').textContent =
            events.length + ' events · ' + groupOrder.length + ' categories';
    }

    function stableColor(text) {
        var hash = 0;
        for (var i = 0; i < text.length; i++) {
            hash = ((hash << 5) - hash) + text.charCodeAt(i);
            hash |= 0;
        }
        var hue = Math.abs(hash) % 360;
        return 'hsl(' + hue + ' 65% 58%)';
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function pad2(v) { return v < 10 ? '0' + v : String(v); }

    var _escNode = document.createElement('span');
    function escHtml(s) {
        _escNode.textContent = s == null ? '' : String(s);
        return _escNode.innerHTML;
    }

    /* ── Resize ────────────────────────────────────────────────────── */
    function resizeAll() {
        timelineDpr = window.devicePixelRatio || 1;
        minimapDpr  = window.devicePixelRatio || 1;

        var cw = wrap.clientWidth;
        var fullH = Math.max(wrap.clientHeight,
            AXIS_H + Math.max(1, groupOrder.length) * MAX_STACKED_ROW_H + 16);

        canvas.width       = Math.max(1, Math.floor(cw * timelineDpr));
        canvas.height      = Math.max(1, Math.floor(fullH * timelineDpr));
        canvas.style.width  = cw + 'px';
        canvas.style.height = fullH + 'px';

        var mw = document.getElementById('minimap-shell').clientWidth;
        var mh = document.getElementById('minimap-shell').clientHeight;
        minimap.width       = Math.max(1, Math.floor(mw * minimapDpr));
        minimap.height      = Math.max(1, Math.floor(mh * minimapDpr));
    }

    /* ── Interactions ──────────────────────────────────────────────── */
    function bindInteractions() {
        window.addEventListener('resize', function() {
            resizeAll(); drawMinimap(); queueRender();
        });

        wrap.addEventListener('scroll', queueRender);

        canvas.addEventListener('wheel', function(e) {
            e.preventDefault();
            var rect   = canvas.getBoundingClientRect();
            var ratio  = clamp((e.clientX - rect.left - GROUP_LABEL_W) /
                               Math.max(1, rect.width - GROUP_LABEL_W - RIGHT_PAD), 0, 1);
            var center = viewStart + ratio * (viewEnd - viewStart);
            zoomAround(center, e.deltaY < 0 ? 0.84 : 1.19);
        }, { passive: false });

        canvas.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            isDraggingTimeline = true;
            dragStartX         = e.clientX;
            dragStartViewStart = viewStart;
            dragStartViewEnd   = viewEnd;
            canvas.classList.add('dragging');
        });

        window.addEventListener('mousemove', function(e) {
            if (isDraggingTimeline) {
                var rect       = canvas.getBoundingClientRect();
                var usable     = Math.max(1, rect.width - GROUP_LABEL_W - RIGHT_PAD);
                var msPerPixel = (dragStartViewEnd - dragStartViewStart) / usable;
                var shift      = (e.clientX - dragStartX) * msPerPixel;
                setViewWindow(dragStartViewStart - shift, dragStartViewEnd - shift);
                return;
            }
            var hb = hitTest(e.clientX, e.clientY);
            if (!hb) { tooltip.style.display = 'none'; return; }
            showTooltip(e.clientX, e.clientY, hb);
        });

        window.addEventListener('mouseup', function() {
            isDraggingTimeline = false;
            canvas.classList.remove('dragging');
            isDraggingMinimap  = false;
        });

        canvas.addEventListener('mouseleave', function() {
            tooltip.style.display = 'none';
        });

        canvas.addEventListener('dblclick', function(e) {
            var hb = hitTest(e.clientX, e.clientY);
            if (!hb) return;
            if (hb.kind === 'event') {
                javaBridge.openGraphForIndividual(hb.item.uri);
                return;
            }
            if (hb.kind === 'cluster') {
                var span = Math.max(hb.maxTs - hb.minTs, MIN_VIEW_MS * 3);
                var pad  = span * 0.45;
                setViewWindow(hb.minTs - pad, hb.maxTs + pad);
            }
        });

        canvas.addEventListener('mousedown', function(e) {
            if (e.button !== 2) return;  /* Right mouse button = 2 */
            e.preventDefault();
            e.stopPropagation();
            try {
                /* Check if right-clicking on a category label */
                var categoryId = hitTestCategoryLabel(e.clientX, e.clientY);
                if (categoryId) {
                    showCategoryContextMenu(e, categoryId);
                    return;
                }
                /* Otherwise check for event hit */
                var hb = hitTest(e.clientX, e.clientY);
                if (hb) {
                    showEventContextMenu(e, hb);
                }
            } catch (err) {
                javaBridge.log('Context menu error: ' + err.message);
            }
        }, true);

        minimap.addEventListener('mousedown', function(e) {
            isDraggingMinimap = true;
            navFromMinimap(e.clientX);
        });
        window.addEventListener('mousemove', function(e) {
            if (isDraggingMinimap) navFromMinimap(e.clientX);
        });
    }

    function navFromMinimap(clientX) {
        var rect   = minimap.getBoundingClientRect();
        var pct    = clamp((clientX - rect.left) / Math.max(1, rect.width), 0, 1);
        var center = rangeMin + pct * (rangeMax - rangeMin);
        var half   = (viewEnd - viewStart) / 2;
        setViewWindow(center - half, center + half);
    }

    function setViewWindow(s, e) {
        var full = rangeMax - rangeMin;
        var size = e - s;
        if (size < MIN_VIEW_MS) {
            var mid = (s + e) / 2;
            s = mid - MIN_VIEW_MS / 2;
            e = mid + MIN_VIEW_MS / 2;
            size = MIN_VIEW_MS;
        }
        if (size > full) { s = rangeMin; e = rangeMax; }
        else {
            if (s < rangeMin) { e += rangeMin - s; s = rangeMin; }
            if (e > rangeMax) { s -= e - rangeMax; e = rangeMax; }
        }
        viewStart = s;
        viewEnd   = e;
        queueRender();
    }

    function zoomAround(center, factor) {
        setViewWindow(center - (center - viewStart) * factor,
                      center + (viewEnd - center)   * factor);
    }

    function zoomBy(factor) { zoomAround((viewStart + viewEnd) / 2, factor); }

    function resetView() {
        var full = rangeMax - rangeMin;
        viewStart = rangeMin;
        viewEnd   = rangeMin + Math.max(full * 0.16, 1000 * 60 * 60 * 24 * 30);
        if (viewEnd > rangeMax) viewEnd = rangeMax;
        queueRender();
    }

    /* ── Render loop ───────────────────────────────────────────────── */
    function queueRender() {
        if (renderQueued) return;
        renderQueued = true;
        requestAnimationFrame(function() {
            renderQueued = false;
            renderTimeline();
            updateMinimapFocus();
            updateFilterStatusBar();
            updateFilterListPanel();
        });
    }

    function renderTimeline() {
        var w          = canvas.width / timelineDpr;
        var scrollTop  = wrap.scrollTop;
        var vpTop      = scrollTop;
        var vpBottom   = scrollTop + wrap.clientHeight;
        var layout     = buildRowLayouts(w);

        /* Auto-grow canvas height if content is taller */
        if (Math.abs(canvas.height / timelineDpr - layout.totalHeight) > 1) {
            canvas.height      = Math.max(1, Math.floor(layout.totalHeight * timelineDpr));
            canvas.style.height = layout.totalHeight + 'px';
        }

        var h = canvas.height / timelineDpr;

        ctx.setTransform(timelineDpr, 0, 0, timelineDpr, 0, 0);
        ctx.clearRect(0, 0, w, h);

        /* Background */
        ctx.fillStyle = '#0c1520';
        ctx.fillRect(0, 0, w, h);

        /* Axis + grid */
        drawAxis(w, h);

        /* Row bands + category labels */
        drawRows(w, h, layout.rows, vpTop, vpBottom);

        hitBoxes = [];

        for (var r = 0; r < layout.rows.length; r++) {
            var row = layout.rows[r];
            if (row.top > vpBottom + row.height || row.top + row.height < vpTop - row.height) continue;
            if (row.mode === 'stack') {
                for (var n = 0; n < row.nodes.length; n++) drawEventNode(row.nodes[n]);
            } else {
                for (var c = 0; c < row.clusters.length; c++) drawClusterNode(row.clusters[c]);
            }
        }

        /* Vertical separator between label column and data area */
        ctx.strokeStyle = 'rgba(255,255,255,0.07)';
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.moveTo(GROUP_LABEL_W + 0.5, AXIS_H);
        ctx.lineTo(GROUP_LABEL_W + 0.5, h);
        ctx.stroke();

        /* Show "No events" message if needed */
        if (layout.rows.length === 0) {
            ctx.fillStyle = 'rgba(220, 170, 60, 0.5)';
            ctx.font = '13px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            var msg = 'No events match current filters';
            ctx.fillText(msg, w / 2, AXIS_H + 60);
            ctx.fillStyle = 'rgba(220, 170, 60, 0.3)';
            ctx.font = '11px Inter, sans-serif';
            ctx.fillText('Try adjusting your search or category filters', w / 2, AXIS_H + 80);
        }

        updateViewMeta(layout.visibleStartIdx, layout.visibleEndIdx, layout.drawnCount);
    }

    /* ── Layout builder ────────────────────────────────────────────── */
    function buildRowLayouts(width) {
        var dataW      = Math.max(1, width - GROUP_LABEL_W - RIGHT_PAD);
        var viewRange  = Math.max(1, viewEnd - viewStart);
        var startIdx   = lowerBound(events, viewStart);
        var endIdx     = upperBound(events, viewEnd);
        var byGroup    = {};
        var rows       = [];
        var top        = AXIS_H;

        ctx.font = '11px Inter, sans-serif';

        for (var i = startIdx; i < endIdx; i++) {
            var ev = events[i];
            if (groupIndexMap[ev.group] == null) continue;
            /* Apply filters */
            if (!isEventVisible(ev)) continue;
            if (!byGroup[ev.group]) byGroup[ev.group] = [];
            byGroup[ev.group].push({
                item: ev,
                x: GROUP_LABEL_W + ((ev.ts - viewStart) / viewRange) * dataW,
                boxW: measureNodeWidth(ev.label)
            });
        }

        for (var gi = 0; gi < groupOrder.length; gi++) {
            var gid     = groupOrder[gi];
            var visible = byGroup[gid] || [];
            
            /* Skip empty groups */
            if (visible.length === 0) continue;
            
            var row     = {
                group: gid, groupIdx: gi,
                top: top, height: ROW_H,
                mode: 'cluster', nodes: [], clusters: []
            };

            if (visible.length > 0 && visible.length <= MAX_STACK_LANES) {
                var packed = packStackedNodes(gid, gi, top, visible);
                row.mode   = 'stack';
                row.nodes  = packed.nodes;
                row.height = computeStackedH(packed.laneCount);
            } else if (visible.length > MAX_STACK_LANES) {
                var cl      = buildClusters(gid, gi, top, visible, width);
                row.clusters = cl.buckets;
                row.height   = computeStackedH(cl.laneCount);
            }

            rows.push(row);
            top += row.height + ROW_GAP;
        }

        return {
            rows: rows,
            totalHeight: top + 12,
            visibleStartIdx: startIdx,
            visibleEndIdx:   endIdx,
            drawnCount: countNodes(rows)
        };
    }

    function packStackedNodes(groupId, groupIdx, rowTop, visible) {
        var sorted = visible.slice().sort(function(a, b) { return a.item.ts - b.item.ts; });
        var lanes  = [];
        var nodes  = [];
        var baseY  = rowTop + 7;
        var minX   = GROUP_LABEL_W + 8;

        for (var i = 0; i < sorted.length; i++) {
            var entry  = sorted[i];
            var boxW   = entry.boxW;
            var x      = Math.max(minX, entry.x - boxW / 2);
            var laneIdx = -1;

            for (var lane = 0; lane < lanes.length; lane++) {
                if (x >= lanes[lane] + 6) { laneIdx = lane; break; }
            }
            if (laneIdx === -1) { laneIdx = lanes.length; lanes.push(x + boxW); }
            else { lanes[laneIdx] = x + boxW; }

            nodes.push({
                kind: 'event',
                x: x, y: baseY + laneIdx * STACK_LANE_H,
                w: boxW, h: 18,
                item: entry.item, group: groupId, groupIdx: groupIdx
            });
        }
        return { nodes: nodes, laneCount: Math.max(1, lanes.length) };
    }

    function computeStackedH(laneCount) {
        return Math.max(ROW_H, 12 + laneCount * STACK_LANE_H);
    }

    /* Cluster PIXEL_WIDTH used for bucketing — separate from lane gap */
    var CLUSTER_NODE_W  = 66;   /* rendered pill width */
    var CLUSTER_NODE_H  = 18;
    var CLUSTER_LANE_H  = 22;   /* vertical step between cluster lanes */
    var CLUSTER_GAP     = 6;    /* min horizontal gap between cluster pills */
    var MAX_CLUSTER_LANES = 6;  /* hard cap — denser than this merges into bigger buckets */

    function buildClusters(groupId, groupIdx, rowTop, visible, width) {
        var dataW     = Math.max(1, width - GROUP_LABEL_W - RIGHT_PAD);
        var viewRange = Math.max(1, viewEnd - viewStart);

        /* ── Step 1: bucket by pixel column ──────────────────────────── */
        var bucketMap = new Map();
        for (var i = 0; i < visible.length; i++) {
            var entry = visible[i];
            var ev    = entry.item;
            var gx    = GROUP_LABEL_W + ((ev.ts - viewStart) / viewRange) * dataW;
            var key   = groupIdx + '|' + Math.floor(gx / CLUSTER_PX_W);
            var b     = bucketMap.get(key);
            if (!b) {
                b = { kind: 'cluster', group: groupId, groupIdx: groupIdx,
                      x: gx, count: 0, minTs: ev.ts, maxTs: ev.ts };
                bucketMap.set(key, b);
            }
            b.count++;
            if (ev.ts < b.minTs) b.minTs = ev.ts;
            if (ev.ts > b.maxTs) b.maxTs = ev.ts;
        }

        var buckets = Array.from(bucketMap.values());
        buckets.sort(function(a, b) { return a.x - b.x; });

        /* ── Step 2: lane-pack the buckets (greedy left-to-right) ────── */
        var lanes   = [];   /* lanes[i] = rightmost right-edge of last pill in lane i */
        var baseY   = rowTop + 7;

        for (var bi = 0; bi < buckets.length; bi++) {
            var bk    = buckets[bi];
            var left  = bk.x - CLUSTER_NODE_W / 2;
            var right = left + CLUSTER_NODE_W;
            var laneIdx = -1;

            for (var li = 0; li < lanes.length; li++) {
                if (left >= lanes[li] + CLUSTER_GAP) { laneIdx = li; break; }
            }

            /* Hit the lane cap — merge into the last lane (least bad choice) */
            if (laneIdx === -1 && lanes.length >= MAX_CLUSTER_LANES) {
                laneIdx = MAX_CLUSTER_LANES - 1;
            }

            if (laneIdx === -1) { laneIdx = lanes.length; lanes.push(right); }
            else { lanes[laneIdx] = Math.max(lanes[laneIdx] || 0, right); }

            bk.laneIdx = laneIdx;
            bk.y       = baseY + laneIdx * CLUSTER_LANE_H + CLUSTER_NODE_H / 2;
        }

        return { buckets: buckets, laneCount: Math.min(MAX_CLUSTER_LANES, Math.max(1, lanes.length)) };
    }

    function countNodes(rows) {
        var n = 0;
        for (var i = 0; i < rows.length; i++) {
            n += rows[i].mode === 'stack' ? rows[i].nodes.length : rows[i].clusters.length;
        }
        return n;
    }

    function measureNodeWidth(label) {
        ctx.font = '11px Inter, sans-serif';
        return Math.max(44, Math.min(180, ctx.measureText(label).width + 16));
    }

    /* ── Draw: axis ────────────────────────────────────────────────── */
    /*
     * pickTickPair returns { major, minor }.
     * Major ticks: labelled + full-height grid line.
     * Minor ticks: short notch only, no label, no grid line.
     * Each pair keeps minor as a clean subdivision of major.
     */
    function pickTickPair(rangeMs) {
        var M = 1000*60, H = 1000*60*60, D = H*24;
        var pairs = [
            [2*M,       M/2    ],   /* 2 min   / 30 s  */
            [5*M,       M      ],   /* 5 min   / 1 min */
            [10*M,      2*M    ],   /* 10 min  / 2 min */
            [30*M,      10*M   ],   /* 30 min  / 10 min */
            [H,         10*M   ],   /* 1 hr    / 10 min */
            [6*H,       30*M   ],   /* 6 hr    / 30 min */
            [D,         H      ],   /* 1 day   / 1 hr  */
            [7*D,       D      ],
            [30*D,      7*D    ],
            [90*D,      30*D   ],
            [365*D,     30*D   ],
            [2*365*D,   365*D  ],
            [5*365*D,   365*D  ],
            [10*365*D,  2*365*D]
        ];
        var target = Math.max(1, rangeMs / 8);
        for (var i = 0; i < pairs.length; i++) {
            if (pairs[i][0] >= target) return { major: pairs[i][0], minor: pairs[i][1] };
        }
        return { major: pairs[pairs.length-1][0], minor: pairs[pairs.length-1][1] };
    }

    function drawAxis(width, totalH) {
        ctx.fillStyle = '#0a1320';
        ctx.fillRect(0, 0, width, AXIS_H);

        ctx.strokeStyle = 'rgba(255,255,255,0.09)';
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.moveTo(0, AXIS_H - 0.5);
        ctx.lineTo(width, AXIS_H - 0.5);
        ctx.stroke();

        var pair  = pickTickPair(viewEnd - viewStart);
        var major = pair.major;
        var minor = pair.minor;

        ctx.font         = '11px Inter, sans-serif';
        ctx.textBaseline = 'top';

        /* ── Minor ticks: short notch only ── */
        var firstMinor = Math.floor(viewStart / minor) * minor;
        ctx.strokeStyle = 'rgba(255,255,255,0.20)';
        ctx.lineWidth   = 1;
        for (var t = firstMinor; t <= viewEnd; t += minor) {
            if (Math.round(((t % major) + major) % major) < minor * 0.01) continue; /* skip major positions */
            var x = mapTsToX(t, width);
            if (x < GROUP_LABEL_W + 2 || x > width - RIGHT_PAD) continue;
            ctx.beginPath();
            ctx.moveTo(x + 0.5, AXIS_H - 7);
            ctx.lineTo(x + 0.5, AXIS_H - 1);
            ctx.stroke();
        }

        /* ── Major ticks: grid line + notch + label ── */
        var firstMajor    = Math.floor(viewStart / major) * major;
        var lastLabelRight = -Infinity;

        for (var t = firstMajor; t <= viewEnd; t += major) {
            var x = mapTsToX(t, width);
            if (x < GROUP_LABEL_W + 2 || x > width - RIGHT_PAD) continue;

            /* Full-height grid line */
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth   = 1;
            ctx.beginPath();
            ctx.moveTo(x + 0.5, AXIS_H);
            ctx.lineTo(x + 0.5, totalH);
            ctx.stroke();

            /* Longer notch */
            ctx.strokeStyle = 'rgba(255,255,255,0.38)';
            ctx.lineWidth   = 1;
            ctx.beginPath();
            ctx.moveTo(x + 0.5, AXIS_H - 14);
            ctx.lineTo(x + 0.5, AXIS_H - 1);
            ctx.stroke();

            /* Label — suppress if it would collide with previous one */
            var txt  = formatTick(t, major);
            var txtW = ctx.measureText(txt).width;
            if (x > lastLabelRight + 6 && x + txtW + 6 < width - RIGHT_PAD) {
                ctx.fillStyle = '#7da8c8';
                ctx.fillText(txt, x + 4, 5);
                lastLabelRight = x + txtW + 4;
            }
        }

        /* ── "Now" dashed marker ── */
        var now = Date.now();
        if (now >= viewStart && now <= viewEnd) {
            var nx = mapTsToX(now, width);
            ctx.strokeStyle = 'rgba(72,210,130,0.85)';
            ctx.lineWidth   = 1.5;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(nx + 0.5, AXIS_H);
            ctx.lineTo(nx + 0.5, totalH);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(72,210,130,0.9)';
            ctx.font      = '10px Inter, sans-serif';
            ctx.fillText('now', nx + 3, 5);
        }
    }

    /* ── Draw: row bands + category labels ─────────────────────────── */
    function drawRows(width, height, rows) {
        categoryLabels = [];  /* Reset category labels */
        for (var gi = 0; gi < rows.length; gi++) {
            var row = rows[gi];

            /* Zebra band */
            ctx.fillStyle = gi % 2 === 0 ? 'rgba(255,255,255,0.022)' : 'rgba(255,255,255,0.010)';
            ctx.fillRect(0, row.top, width, row.height);

            /* Row separator */
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth   = 1;
            ctx.beginPath();
            ctx.moveTo(0, row.top + 0.5);
            ctx.lineTo(width, row.top + 0.5);
            ctx.stroke();

            /* Category label — left column, vertically centered in row */
            var labelX = 10;
            var labelY = row.top + row.height / 2;
            var labelText = groupLabelMap[row.group] || row.group;
            var color     = groupColorMap[row.group] || '#6dafff';

            /* Record label position for hit detection */
            recordCategoryLabel(row.group, 0, row.top, GROUP_LABEL_W, row.height);

            /* Color swatch dot */
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.85;
            ctx.beginPath();
            ctx.arc(labelX + 4, labelY, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            ctx.fillStyle    = '#9ab8d0';
            ctx.font         = '11px Inter, sans-serif';
            ctx.textBaseline = 'middle';
            ctx.fillText(fitText(labelText, GROUP_LABEL_W - 22), labelX + 12, labelY);
        }
    }

    /* ── Draw: event node ──────────────────────────────────────────── */
    function drawEventNode(b) {
        var color = groupColorMap[b.item.group] || '#73b7ff';
        var x = b.x, y = b.y, w = b.w, h = b.h;

        roundedRect(ctx, x, y, w, h, 5);
        ctx.fillStyle   = color;
        ctx.globalAlpha = 0.18;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = color;
        ctx.lineWidth   = 1;
        ctx.stroke();

        ctx.fillStyle    = '#ddeeff';
        ctx.font         = '10px Inter, sans-serif';
        ctx.textBaseline = 'middle';
        ctx.fillText(fitText(b.item.label, w - 10), x + 5, y + h / 2);

        hitBoxes.push({ kind: 'event', x: x, y: y, w: w, h: h, item: b.item });
    }

    /* ── Draw: cluster node ────────────────────────────────────────── */
    function drawClusterNode(b) {
        var bw = CLUSTER_NODE_W, bh = CLUSTER_NODE_H;
        var x  = b.x - bw / 2;
        var y  = b.y - bh / 2;

        roundedRect(ctx, x, y, bw, bh, 8);
        ctx.fillStyle   = 'rgba(220,170,60,0.22)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(220,170,60,0.9)';
        ctx.lineWidth   = 1;
        ctx.stroke();

        ctx.fillStyle    = '#ffd98a';
        ctx.font         = '11px Inter, sans-serif';
        ctx.textBaseline = 'middle';
        ctx.fillText(b.count + ' events', x + 8, y + bh / 2);

        hitBoxes.push({ kind: 'cluster', x: x, y: y, w: bw, h: bh,
                        group: b.group, count: b.count, minTs: b.minTs, maxTs: b.maxTs });
    }

    /* ── Minimap ───────────────────────────────────────────────────── */
    function drawMinimap() {
        var w = minimap.width  / minimapDpr;
        var h = minimap.height / minimapDpr;

        minimapCtx.setTransform(minimapDpr, 0, 0, minimapDpr, 0, 0);
        minimapCtx.clearRect(0, 0, w, h);
        minimapCtx.fillStyle = '#0c1520';
        minimapCtx.fillRect(0, 0, w, h);

        var range = Math.max(1, rangeMax - rangeMin);
        for (var i = 0; i < events.length; i++) {
            var ev = events[i];
            /* Only show filtered events in minimap */
            if (!isEventVisible(ev)) continue;
            var x  = ((ev.ts - rangeMin) / range) * w;
            minimapCtx.fillStyle  = groupColorMap[ev.group] || '#5da8ff';
            minimapCtx.globalAlpha = 0.65;
            minimapCtx.fillRect(x, 5, 1.5, h - 10);
        }
        minimapCtx.globalAlpha = 1;
        updateMinimapFocus();
    }

    function updateMinimapFocus() {
        var shellW = document.getElementById('minimap-shell').clientWidth;
        var range  = Math.max(1, rangeMax - rangeMin);
        var left   = ((viewStart - rangeMin) / range) * shellW;
        var right  = ((viewEnd   - rangeMin) / range) * shellW;
        minimapFocus.style.left  = clamp(left,  0, shellW) + 'px';
        minimapFocus.style.width = Math.max(6, clamp(right - left, 0, shellW)) + 'px';
    }

    /* ── Hit testing ───────────────────────────────────────────────── */
    function hitTest(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        var x    = clientX - rect.left;
        var y    = clientY - rect.top;
        for (var i = hitBoxes.length - 1; i >= 0; i--) {
            var hb = hitBoxes[i];
            if (x >= hb.x && x <= hb.x + hb.w && y >= hb.y && y <= hb.y + hb.h) return hb;
        }
        return null;
    }

    /* ── Tooltip ───────────────────────────────────────────────────── */
    function showTooltip(x, y, hb) {
        var html;
        if (hb.kind === 'event') {
            html = '<strong>' + escHtml(hb.item.label) + '</strong>'
                 + '<div class="tt-row"><b>Category:</b> ' + escHtml(groupLabelMap[hb.item.group] || hb.item.group) + '</div>'
                 + '<div class="tt-row"><b>Time:</b> ' + new Date(hb.item.ts).toLocaleString() + '</div>';
        } else {
            html = '<strong>' + hb.count + ' events</strong>'
                 + '<div class="tt-row"><b>Category:</b> ' + escHtml(groupLabelMap[hb.group] || hb.group) + '</div>'
                 + '<div class="tt-row"><b>From:</b> ' + new Date(hb.minTs).toLocaleDateString() + '</div>'
                 + '<div class="tt-row"><b>To:</b> ' + new Date(hb.maxTs).toLocaleDateString() + '</div>'
                 + '<div class="tt-row" style="margin-top:4px;color:#5a8099">Double-click to zoom in</div>';
        }
        tooltip.innerHTML      = html;
        tooltip.style.left     = (x + 14) + 'px';
        tooltip.style.top      = (y + 14) + 'px';
        tooltip.style.display  = 'block';
    }

    /* ── View meta ─────────────────────────────────────────────────── */
    function updateViewMeta(s, e, nodes) {
        var days = ((viewEnd - viewStart) / (1000 * 60 * 60 * 24)).toFixed(1);
        document.getElementById('view-meta').textContent =
            (e - s) + ' visible · ' + nodes + ' nodes · ' + days + ' d span';
    }

    /* ── Coordinate mapping ────────────────────────────────────────── */
    function mapTsToX(ts, width) {
        var dataW = Math.max(1, width - GROUP_LABEL_W - RIGHT_PAD);
        return GROUP_LABEL_W + ((ts - viewStart) / Math.max(1, viewEnd - viewStart)) * dataW;
    }

    /* ── Binary search ─────────────────────────────────────────────── */
    function lowerBound(arr, value) {
        var lo = 0, hi = arr.length;
        while (lo < hi) { var mid = (lo + hi) >> 1; if (arr[mid].ts < value) lo = mid + 1; else hi = mid; }
        return lo;
    }
    function upperBound(arr, value) {
        var lo = 0, hi = arr.length;
        while (lo < hi) { var mid = (lo + hi) >> 1; if (arr[mid].ts <= value) lo = mid + 1; else hi = mid; }
        return lo;
    }

    /* ── Tick logic ────────────────────────────────────────────────── */
    function formatTick(ms, step) {
        var d = new Date(ms);
        if (step < 1000*60*60) {
            /* minute-level: show date + HH:MM */
            return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate())
                 + ' ' + pad2(d.getUTCHours()) + ':' + pad2(d.getUTCMinutes());
        }
        if (step < 1000*60*60*24) {
            return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate())
                 + ' ' + pad2(d.getUTCHours()) + ':00';
        }
        if (step < 1000*60*60*24*365) {
            return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate());
        }
        return String(d.getUTCFullYear());
    }

    /* ── Canvas utilities ──────────────────────────────────────────── */
    function roundedRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y,   x + w, y + h, r);
        ctx.arcTo(x + w, y+h, x,     y + h, r);
        ctx.arcTo(x,     y+h, x,     y,     r);
        ctx.arcTo(x,     y,   x + w, y,     r);
        ctx.closePath();
    }

    function fitText(text, maxW) {
        ctx.font = '10px Inter, sans-serif';
        if (ctx.measureText(text).width <= maxW) return text;
        var t = text;
        while (t.length > 1 && ctx.measureText(t + '…').width > maxW) t = t.slice(0, -1);
        return t + '…';
    }

    /* ── Filter UI Creation ────────────────────────────────────────── */
    function createSearchUI() {
        /* Create search box in topbar */
        var stats = document.getElementById('stats');
        var searchContainer = document.createElement('div');
        searchContainer.className = 'flex items-center gap-2 ml-auto mr-3';
        
        var searchBox = document.createElement('input');
        searchBox.id = 'search-box';
        searchBox.type = 'text';
        searchBox.placeholder = 'Search…';
        searchBox.className = 'px-2 py-1 text-sm bg-slate-900/70 border border-white/10 rounded text-slate-100 w-32 outline-none';
        searchBox.oninput = function() {
            setSearchQuery(this.value);
        };
        
        var searchStatus = document.createElement('span');
        searchStatus.id = 'search-status';
        searchStatus.className = 'text-xs text-slate-400 whitespace-nowrap';
        
        searchContainer.appendChild(searchBox);
        searchContainer.appendChild(searchStatus);
        
        stats.parentNode.insertBefore(searchContainer, stats);
        
        /* Create filter list panel */
        var filterListPanel = document.createElement('div');
        filterListPanel.id = 'filter-list-panel';
        filterListPanel.className = 'fixed top-12 left-0 right-0 max-h-32 bg-slate-900/80 border-b border-white/10 p-2 overflow-y-auto z-40 text-sm text-slate-100 hidden flex-row flex-wrap gap-2';
        document.body.appendChild(filterListPanel);
    }

    /* ── Category label tracking for context menu ───────────────────── */
    var categoryLabels = [];  /* {groupId, x, y, w, h} for each category label */

    function recordCategoryLabel(groupId, x, y, w, h) {
        categoryLabels.push({groupId: groupId, x: x, y: y, w: w, h: h});
    }

    function hitTestCategoryLabel(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        var x = clientX - rect.left;
        var y = clientY - rect.top;
        for (var i = 0; i < categoryLabels.length; i++) {
            var label = categoryLabels[i];
            if (x >= label.x && x <= label.x + label.w && 
                y >= label.y && y <= label.y + label.h) {
                return label.groupId;
            }
        }
        return null;
    }

    function updateSearchStatus() {
        var status = document.getElementById('search-status');
        if (!status) return;
        
        if (!filterState.searchQuery) {
            status.textContent = '';
            return;
        }
        
        var count = 0;
        for (var i = 0; i < events.length; i++) {
            if (isEventVisible(events[i])) count++;
        }
        status.textContent = count + ' match' + (count !== 1 ? 'es' : '');
    }

    function updateFilterListPanel() {
        var panel = document.getElementById('filter-list-panel');
        var canvasWrap = document.getElementById('canvas-wrap');
        if (!panel || !canvasWrap) return;
        
        panel.innerHTML = '';
        
        var hiddenCats = [];
        for (var i = 0; i < groupOrder.length; i++) {
            if (!filterState.visibleCategories.has(groupOrder[i])) {
                hiddenCats.push(groupOrder[i]);
            }
        }
        
        var hasFilters = hiddenCats.length > 0 || filterState.excludedNodeIds.size > 0 || 
                        filterState.excludedLabels.size > 0 || filterState.searchQuery;
        
        if (!hasFilters) {
            panel.style.display = 'none';
            canvasWrap.style.paddingTop = '0';
            return;
        }
        
        panel.style.display = 'flex';
        canvasWrap.style.paddingTop = '126px';  /* 48px topbar + ~120px filter panel + 8px gap */
        
        /* Add hidden categories */
        for (var i = 0; i < hiddenCats.length; i++) {
            var catId = hiddenCats[i];
            var label = groupLabelMap[catId] || catId;
            addFilterTag(panel, 'Category: ' + label, function(id) {
                return function() { toggleCategory(id); };
            }(catId));
        }
        
        /* Add search filter */
        if (filterState.searchQuery) {
            addFilterTag(panel, 'Search: "' + filterState.searchQuery + '"', function() {
                document.getElementById('search-box').value = '';
                setSearchQuery('');
            });
        }
        
        /* Add excluded events */
        filterState.excludedNodeIds.forEach(function(uri) {
            var label = uri;
            for (var i = 0; i < events.length; i++) {
                if (events[i].uri === uri) {
                    label = events[i].label;
                    break;
                }
            }
            addFilterTag(panel, 'Event: ' + fitText(label, 100), function(u) {
                return function() { 
                    filterState.excludedNodeIds.delete(u);
                    queueRender();
                };
            }(uri));
        });
        
        /* Add excluded labels */
        filterState.excludedLabels.forEach(function(label) {
            addFilterTag(panel, 'Excluded: ' + fitText(label, 100), function(l) {
                return function() { 
                    filterState.excludedLabels.delete(l);
                    queueRender();
                };
            }(label));
        });
    }

    function addFilterTag(container, text, onRemove) {
        var tag = document.createElement('div');
        tag.className = 'flex items-center gap-2 px-2 py-1 rounded border text-sm text-slate-300 bg-sky-500/10 border-sky-300/10 max-w-xs';
        
        var textSpan = document.createElement('span');
        textSpan.textContent = text;
        textSpan.className = 'overflow-hidden truncate max-w-[170px]';
        textSpan.title = text;
        
        var removeBtn = document.createElement('button');
        removeBtn.innerHTML = '×';
        removeBtn.className = 'bg-none border-0 text-slate-400 cursor-pointer text-lg leading-none p-0';
        removeBtn.onmouseover = function() { this.style.color = '#4ea1ff'; };
        removeBtn.onmouseout = function() { this.style.color = '#4a6278'; };
        removeBtn.onclick = function(e) {
            e.stopPropagation();
            onRemove();
        };
        
        tag.appendChild(textSpan);
        tag.appendChild(removeBtn);
        container.appendChild(tag);
    }

    function updateFilterStatusBar() {
        var hiddenCats = groupOrder.length - filterState.visibleCategories.size;
        var excluded = filterState.excludedNodeIds.size + filterState.excludedLabels.size;
        var isFiltered = hiddenCats > 0 || excluded > 0 || filterState.searchQuery;
        
        /* Show/hide clear filters button */
        var clearBtn = document.getElementById('clear-filters-btn');
        if (clearBtn) clearBtn.style.display = isFiltered ? 'inline-flex' : 'none';
        
        var meta = document.getElementById('view-meta');
        var filterInfo = '';
        if (isFiltered) {
            var parts = [];
            if (hiddenCats > 0) parts.push(hiddenCats + ' cat' + (hiddenCats !== 1 ? 's' : '') + ' hidden');
            if (excluded > 0) parts.push(excluded + ' event' + (excluded !== 1 ? 's' : '') + ' excluded');
            if (filterState.searchQuery) parts.push('search active');
            filterInfo = ' — ' + parts.join(', ');
        }
        
        meta.innerHTML = meta.innerHTML.split(' —')[0] + filterInfo;
    }

    /* ── Context Menu System ───────────────────────────────────────── */
    var currentContextMenu = null;

    function showContextMenu(x, y, items) {
        /* Close existing menu */
        if (currentContextMenu) currentContextMenu.remove();
        
        var menu = document.createElement('div');
        menu.style.cssText = `position: fixed; left: ${x}px; top: ${y}px; z-index: 100; min-width: 160px; overflow: hidden; border-radius: 6px;`;
        menu.className = 'bg-slate-900/90 border border-white/10 shadow-lg';
        
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var btn = document.createElement('div');
            btn.textContent = item.label;
            btn.className = 'px-3 py-2 text-sm text-left w-full';
            btn.style.color = item.dangerous ? 'rgba(255,100,100,0.9)' : '#dce8f4';
            btn.onmouseover = function() { this.style.background = 'rgba(255,255,255,0.04)'; };
            btn.onmouseout = function() { this.style.background = 'transparent'; };
            btn.onclick = function(cb) {
                return function() {
                    cb();
                    menu.remove();
                    currentContextMenu = null;
                };
            }(item.callback);
            
            if (i === items.length - 1) btn.style.borderBottom = 'none';
            menu.appendChild(btn);
        }
        
        document.body.appendChild(menu);
        currentContextMenu = menu;
        
        /* Constrain to viewport */
        var rect = menu.getBoundingClientRect();
        if (rect.right > window.innerWidth) {
            menu.style.left = (window.innerWidth - rect.width - 4) + 'px';
        }
        if (rect.bottom > window.innerHeight) {
            menu.style.top = (window.innerHeight - rect.height - 4) + 'px';
        }
        
        /* Close on outside click or escape */
        function closeMenu(e) {
            if (e && menu.contains(e.target)) return;
            menu.remove();
            currentContextMenu = null;
            document.removeEventListener('click', closeMenu);
            document.removeEventListener('keydown', closeOnEscape);
        }
        function closeOnEscape(e) {
            if (e.key === 'Escape') closeMenu();
        }
        document.addEventListener('click', closeMenu);
        document.addEventListener('keydown', closeOnEscape);
    }

    function showCategoryContextMenu(e, groupId) {
        var label = groupLabelMap[groupId];
        showContextMenu(e.clientX, e.clientY, [
            { label: 'Hide This Category', callback: function() { toggleCategory(groupId); } },
            { label: 'Show Only This', callback: function() { showOnlyCategory(groupId); } },
            { label: 'Show All Categories', callback: function() { showAllCategories(); } }
        ]);
    }

    function showEventContextMenu(e, hitBox) {
        var items = [];
        if (hitBox.kind === 'event') {
            items.push({ 
                label: 'Hide This Event', 
                callback: function() { excludeNodeId(hitBox.item.uri); },
                dangerous: true
            });
            items.push({ 
                label: 'Hide All "' + fitText(hitBox.item.label, 80) + '"', 
                callback: function() { excludeNodeLabel(hitBox.item.label); },
                dangerous: true
            });
            items.push({ label: 'Open in Graph', callback: function() { javaBridge.openGraphForIndividual(hitBox.item.uri); } });
        } else if (hitBox.kind === 'cluster') {
            items.push({ 
                label: 'Zoom to Cluster', 
                callback: function() { 
                    var span = Math.max(hitBox.maxTs - hitBox.minTs, MIN_VIEW_MS * 3);
                    var pad  = span * 0.45;
                    setViewWindow(hitBox.minTs - pad, hitBox.maxTs + pad);
                }
            });
        }
        items.push({ label: 'Clear All Filters', callback: function() { clearAllFilters(); } });
        
        showContextMenu(e.clientX, e.clientY, items);
    }
</script>
