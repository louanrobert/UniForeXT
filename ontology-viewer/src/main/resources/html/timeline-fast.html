<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Timeline</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
        :root {
            color-scheme: dark;

            --bg:               #0b0f14;
            --panel:            #111820;
            --panel-elevated:   #162030;
            --panel-glass:      rgba(17, 24, 32, 0.88);

            --text:             #dce8f4;
            --text-dim:         #7a96b2;
            --text-hint:        #4a6278;

            --border:           rgba(255,255,255,0.07);
            --border-strong:    rgba(255,255,255,0.13);

            --accent:           #4ea1ff;
            --accent-soft:      rgba(78,161,255,0.15);
            --accent-glow:      rgba(78,161,255,0.08);

            --row-even:         rgba(255,255,255,0.025);
            --row-odd:          rgba(255,255,255,0.012);

            --now-line:         rgba(72,210,130,0.85);

            --shadow-sm:        0 2px 8px rgba(0,0,0,0.28);
            --shadow:           0 4px 18px rgba(0,0,0,0.38);

            --radius:           10px;
            --radius-sm:        6px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ── App shell ──────────────────────────────── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* ── Topbar ─────────────────────────────────── */
        .topbar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--panel-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            user-select: none;
        }

        .topbar-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: var(--text);
            margin-left: 6px;
            flex-shrink: 0;
        }

        .topbar-sep {
            width: 1px;
            height: 16px;
            background: var(--border-strong);
            margin: 0 4px;
            flex-shrink: 0;
        }

        .topbar-meta {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 11px;
            color: var(--text-hint);
            flex-shrink: 0;
        }

        .topbar-meta span { white-space: nowrap; }

        /* ── Buttons ────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: var(--panel-elevated);
            color: var(--text);
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.12s, border-color 0.12s, transform 0.1s;
            flex-shrink: 0;
        }

        .btn:hover {
            background: #1d2d41;
            border-color: rgba(255,255,255,0.2);
        }

        .btn:active {
            transform: scale(0.97);
            background: #111820;
        }

        .btn svg { flex-shrink: 0; }

        /* ── Canvas area ────────────────────────────── */
        .canvas-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            background: var(--bg);
        }

        .canvas-wrap::-webkit-scrollbar            { width: 6px; }
        .canvas-wrap::-webkit-scrollbar-track      { background: transparent; }
        .canvas-wrap::-webkit-scrollbar-thumb      { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .canvas-wrap::-webkit-scrollbar-thumb:hover{ background: rgba(255,255,255,0.2); }

        #timeline-canvas {
            display: block;
            width: 100%;
            cursor: grab;
        }

        #timeline-canvas.dragging { cursor: grabbing; }

        /* ── Minimap ────────────────────────────────── */
        .minimap-shell {
            flex-shrink: 0;
            position: relative;
            height: 44px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            user-select: none;
        }

        .minimap-label {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-hint);
            pointer-events: none;
            z-index: 2;
        }

        #minimap-canvas {
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        #minimap-focus {
            position: absolute;
            top: 0;
            bottom: 0;
            border: 1.5px solid var(--accent);
            background: var(--accent-soft);
            pointer-events: none;
            transition: left 0.06s, width 0.06s;
        }

        /* ── Tooltip ────────────────────────────────── */
        #tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            display: none;

            background: rgba(10, 16, 24, 0.96);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            padding: 8px 11px;
            max-width: 300px;

            font-size: 12px;
            line-height: 1.55;
            color: var(--text);
            box-shadow: var(--shadow);
        }

        #tooltip strong {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 3px;
        }

        #tooltip .tt-row {
            color: var(--text-dim);
            font-size: 11px;
        }

        #tooltip .tt-row b {
            color: var(--text);
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="app">

    <!-- Topbar -->
    <div class="topbar">
        <button class="btn" onclick="javaBridge.navigateBack()">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M7.5 2L3.5 6L7.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back
        </button>

        <div class="topbar-sep"></div>

        <button class="btn" onclick="zoomBy(0.75)" title="Zoom in (scroll wheel also works)">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M5 3.5V6.5M3.5 5H6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M7.5 7.5L10.5 10.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Zoom in
        </button>

        <button class="btn" onclick="zoomBy(1.35)" title="Zoom out">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M3.5 5H6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M7.5 7.5L10.5 10.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Zoom out
        </button>

        <button class="btn" onclick="resetView()">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6a4 4 0 1 1 1 2.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M2 4v2h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Reset
        </button>

        <div class="topbar-sep"></div>
        <span class="topbar-title">Historical Timeline</span>

        <div class="topbar-meta">
            <span id="stats">Loading…</span>
            <span id="view-meta"></span>
        </div>
    </div>

    <!-- Main canvas -->
    <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="timeline-canvas"></canvas>
    </div>

    <!-- Minimap -->
    <div class="minimap-shell" id="minimap-shell">
        <span class="minimap-label">Overview</span>
        <canvas id="minimap-canvas"></canvas>
        <div id="minimap-focus"></div>
    </div>

</div>

<div id="tooltip"></div>

<script>
    /* ── State ─────────────────────────────────────────────────────── */
    var events      = [];
    var groups      = [];
    var groupOrder  = [];
    var groupLabelMap  = {};
    var groupColorMap  = {};
    var groupIndexMap  = {};

    var rangeMin = 0, rangeMax = 0;
    var viewStart = 0, viewEnd = 0;

    /* ── Layout constants ──────────────────────────────────────────── */
    var AXIS_H          = 36;
    var ROW_H           = 26;
    var ROW_GAP         = 10;
    var GROUP_LABEL_W   = 130;   /* reserved left column for category labels */
    var RIGHT_PAD       = 14;
    var STACK_LANE_H    = 22;
    var MAX_STACK_LANES = 4;
    var CLUSTER_PX_W    = 18;    /* bucket width in pixels for clustering */
    var MIN_VIEW_MS     = 1000 * 60 * 10;  /* 10 minutes */

    var MAX_STACKED_ROW_H = ROW_H + (Math.max(MAX_STACK_LANES, 6) - 1) * 22 + ROW_GAP;

    /* ── DOM refs ──────────────────────────────────────────────────── */
    var canvas   = document.getElementById('timeline-canvas');
    var wrap     = document.getElementById('canvas-wrap');
    var ctx      = canvas.getContext('2d');

    var minimap        = document.getElementById('minimap-canvas');
    var minimapCtx     = minimap.getContext('2d');
    var minimapFocus   = document.getElementById('minimap-focus');
    var tooltip        = document.getElementById('tooltip');

    /* ── Runtime ───────────────────────────────────────────────────── */
    var renderQueued = false;
    var hitBoxes     = [];
    var isDraggingTimeline  = false;
    var dragStartX          = 0;
    var dragStartViewStart  = 0;
    var dragStartViewEnd    = 0;
    var isDraggingMinimap   = false;
    var timelineDpr = window.devicePixelRatio || 1;
    var minimapDpr  = window.devicePixelRatio || 1;

    /* ── Init ──────────────────────────────────────────────────────── */
    function initTimelineFast() {
        try {
            var rawItems  = JSON.parse(javaBridge.getTimelineItemsJson()  || '[]');
            var rawGroups = JSON.parse(javaBridge.getTimelineGroupsJson() || '[]');

            groups = rawGroups;
            for (var i = 0; i < groups.length; i++) {
                var g = groups[i];
                groupOrder.push(g.id);
                groupLabelMap[g.id] = g.content || g.id;
                groupColorMap[g.id] = g.color || stableColor(g.id);
            }

            events = [];
            for (var j = 0; j < rawItems.length; j++) {
                var it = rawItems[j];
                var id    = it.id || ('evt_' + j);
                var label = it.label || it.content || id;
                var group = it.group || 'Unknown';
                if (!groupLabelMap[group]) {
                    groupOrder.push(group);
                    groupLabelMap[group] = group;
                    groupColorMap[group] = stableColor(group);
                }
                var ts = parseTimestamp(it);
                if (!isFinite(ts)) continue;
                events.push({ id: id, uri: it.uri || id, label: label, group: group, ts: ts });
            }

            events.sort(function(a, b) { return a.ts - b.ts; });

            groupIndexMap = {};
            for (var k = 0; k < groupOrder.length; k++) {
                groupIndexMap[groupOrder[k]] = k;
            }

            if (events.length === 0) {
                rangeMin = Date.now() - 1000 * 60 * 60 * 24 * 30;
                rangeMax = Date.now();
            } else {
                rangeMin = events[0].ts;
                rangeMax = events[events.length - 1].ts;
            }

            var pad = Math.max((rangeMax - rangeMin) * 0.08, 1000 * 60 * 60 * 24);
            rangeMin -= pad;
            rangeMax += pad;

            var full = rangeMax - rangeMin;
            viewStart = rangeMin;
            viewEnd   = rangeMin + Math.max(full * 0.16, 1000 * 60 * 60 * 24 * 30);
            if (viewEnd > rangeMax) viewEnd = rangeMax;

            updateStats();
            resizeAll();
            drawMinimap();
            bindInteractions();
            queueRender();

        } catch (err) {
            javaBridge.log('timeline-fast init error: ' + err.message);
            document.getElementById('stats').textContent = 'Failed to initialize timeline';
        }
    }

    /* ── Helpers ───────────────────────────────────────────────────── */
    function parseTimestamp(item) {
        if (typeof item.timestamp === 'number' && isFinite(item.timestamp)) return item.timestamp;
        if (typeof item.start    === 'number' && isFinite(item.start))     return item.start;
        if (typeof item.start    === 'string') {
            var t = Date.parse(item.start);
            if (isFinite(t)) return t;
        }
        return NaN;
    }

    function updateStats() {
        document.getElementById('stats').textContent =
            events.length + ' events · ' + groupOrder.length + ' categories';
    }

    function stableColor(text) {
        var hash = 0;
        for (var i = 0; i < text.length; i++) {
            hash = ((hash << 5) - hash) + text.charCodeAt(i);
            hash |= 0;
        }
        var hue = Math.abs(hash) % 360;
        return 'hsl(' + hue + ' 65% 58%)';
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function pad2(v) { return v < 10 ? '0' + v : String(v); }

    var _escNode = document.createElement('span');
    function escHtml(s) {
        _escNode.textContent = s == null ? '' : String(s);
        return _escNode.innerHTML;
    }

    /* ── Resize ────────────────────────────────────────────────────── */
    function resizeAll() {
        timelineDpr = window.devicePixelRatio || 1;
        minimapDpr  = window.devicePixelRatio || 1;

        var cw = wrap.clientWidth;
        var fullH = Math.max(wrap.clientHeight,
            AXIS_H + Math.max(1, groupOrder.length) * MAX_STACKED_ROW_H + 16);

        canvas.width       = Math.max(1, Math.floor(cw * timelineDpr));
        canvas.height      = Math.max(1, Math.floor(fullH * timelineDpr));
        canvas.style.width  = cw + 'px';
        canvas.style.height = fullH + 'px';

        var mw = document.getElementById('minimap-shell').clientWidth;
        var mh = document.getElementById('minimap-shell').clientHeight;
        minimap.width       = Math.max(1, Math.floor(mw * minimapDpr));
        minimap.height      = Math.max(1, Math.floor(mh * minimapDpr));
    }

    /* ── Interactions ──────────────────────────────────────────────── */
    function bindInteractions() {
        window.addEventListener('resize', function() {
            resizeAll(); drawMinimap(); queueRender();
        });

        wrap.addEventListener('scroll', queueRender);

        canvas.addEventListener('wheel', function(e) {
            e.preventDefault();
            var rect   = canvas.getBoundingClientRect();
            var ratio  = clamp((e.clientX - rect.left - GROUP_LABEL_W) /
                               Math.max(1, rect.width - GROUP_LABEL_W - RIGHT_PAD), 0, 1);
            var center = viewStart + ratio * (viewEnd - viewStart);
            zoomAround(center, e.deltaY < 0 ? 0.84 : 1.19);
        }, { passive: false });

        canvas.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            isDraggingTimeline = true;
            dragStartX         = e.clientX;
            dragStartViewStart = viewStart;
            dragStartViewEnd   = viewEnd;
            canvas.classList.add('dragging');
        });

        window.addEventListener('mousemove', function(e) {
            if (isDraggingTimeline) {
                var rect       = canvas.getBoundingClientRect();
                var usable     = Math.max(1, rect.width - GROUP_LABEL_W - RIGHT_PAD);
                var msPerPixel = (dragStartViewEnd - dragStartViewStart) / usable;
                var shift      = (e.clientX - dragStartX) * msPerPixel;
                setViewWindow(dragStartViewStart - shift, dragStartViewEnd - shift);
                return;
            }
            var hb = hitTest(e.clientX, e.clientY);
            if (!hb) { tooltip.style.display = 'none'; return; }
            showTooltip(e.clientX, e.clientY, hb);
        });

        window.addEventListener('mouseup', function() {
            isDraggingTimeline = false;
            canvas.classList.remove('dragging');
            isDraggingMinimap  = false;
        });

        canvas.addEventListener('mouseleave', function() {
            tooltip.style.display = 'none';
        });

        canvas.addEventListener('dblclick', function(e) {
            var hb = hitTest(e.clientX, e.clientY);
            if (!hb) return;
            if (hb.kind === 'event') {
                javaBridge.openGraphForIndividual(hb.item.uri);
                return;
            }
            if (hb.kind === 'cluster') {
                var span = Math.max(hb.maxTs - hb.minTs, MIN_VIEW_MS * 3);
                var pad  = span * 0.45;
                setViewWindow(hb.minTs - pad, hb.maxTs + pad);
            }
        });

        minimap.addEventListener('mousedown', function(e) {
            isDraggingMinimap = true;
            navFromMinimap(e.clientX);
        });
        window.addEventListener('mousemove', function(e) {
            if (isDraggingMinimap) navFromMinimap(e.clientX);
        });
    }

    function navFromMinimap(clientX) {
        var rect   = minimap.getBoundingClientRect();
        var pct    = clamp((clientX - rect.left) / Math.max(1, rect.width), 0, 1);
        var center = rangeMin + pct * (rangeMax - rangeMin);
        var half   = (viewEnd - viewStart) / 2;
        setViewWindow(center - half, center + half);
    }

    function setViewWindow(s, e) {
        var full = rangeMax - rangeMin;
        var size = e - s;
        if (size < MIN_VIEW_MS) {
            var mid = (s + e) / 2;
            s = mid - MIN_VIEW_MS / 2;
            e = mid + MIN_VIEW_MS / 2;
            size = MIN_VIEW_MS;
        }
        if (size > full) { s = rangeMin; e = rangeMax; }
        else {
            if (s < rangeMin) { e += rangeMin - s; s = rangeMin; }
            if (e > rangeMax) { s -= e - rangeMax; e = rangeMax; }
        }
        viewStart = s;
        viewEnd   = e;
        queueRender();
    }

    function zoomAround(center, factor) {
        setViewWindow(center - (center - viewStart) * factor,
                      center + (viewEnd - center)   * factor);
    }

    function zoomBy(factor) { zoomAround((viewStart + viewEnd) / 2, factor); }

    function resetView() {
        var full = rangeMax - rangeMin;
        viewStart = rangeMin;
        viewEnd   = rangeMin + Math.max(full * 0.16, 1000 * 60 * 60 * 24 * 30);
        if (viewEnd > rangeMax) viewEnd = rangeMax;
        queueRender();
    }

    /* ── Render loop ───────────────────────────────────────────────── */
    function queueRender() {
        if (renderQueued) return;
        renderQueued = true;
        requestAnimationFrame(function() {
            renderQueued = false;
            renderTimeline();
            updateMinimapFocus();
        });
    }

    function renderTimeline() {
        var w          = canvas.width / timelineDpr;
        var scrollTop  = wrap.scrollTop;
        var vpTop      = scrollTop;
        var vpBottom   = scrollTop + wrap.clientHeight;
        var layout     = buildRowLayouts(w);

        /* Auto-grow canvas height if content is taller */
        if (Math.abs(canvas.height / timelineDpr - layout.totalHeight) > 1) {
            canvas.height      = Math.max(1, Math.floor(layout.totalHeight * timelineDpr));
            canvas.style.height = layout.totalHeight + 'px';
        }

        var h = canvas.height / timelineDpr;

        ctx.setTransform(timelineDpr, 0, 0, timelineDpr, 0, 0);
        ctx.clearRect(0, 0, w, h);

        /* Background */
        ctx.fillStyle = '#0c1520';
        ctx.fillRect(0, 0, w, h);

        /* Axis + grid */
        drawAxis(w, h);

        /* Row bands + category labels */
        drawRows(w, h, layout.rows, vpTop, vpBottom);

        /* Clip event nodes to data area (right of the label column) */
        ctx.save();
        ctx.beginPath();
        ctx.rect(GROUP_LABEL_W, AXIS_H, w - GROUP_LABEL_W - RIGHT_PAD, h - AXIS_H);
        ctx.clip();

        hitBoxes = [];

        for (var r = 0; r < layout.rows.length; r++) {
            var row = layout.rows[r];
            if (row.top > vpBottom + row.height || row.top + row.height < vpTop - row.height) continue;
            if (row.mode === 'stack') {
                for (var n = 0; n < row.nodes.length; n++) drawEventNode(row.nodes[n]);
            } else {
                for (var c = 0; c < row.clusters.length; c++) drawClusterNode(row.clusters[c]);
            }
        }

        ctx.restore();

        /* Vertical separator between label column and data area */
        ctx.strokeStyle = 'rgba(255,255,255,0.07)';
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.moveTo(GROUP_LABEL_W + 0.5, AXIS_H);
        ctx.lineTo(GROUP_LABEL_W + 0.5, h);
        ctx.stroke();

        updateViewMeta(layout.visibleStartIdx, layout.visibleEndIdx, layout.drawnCount);
    }

    /* ── Layout builder ────────────────────────────────────────────── */
    function buildRowLayouts(width) {
        var dataW      = Math.max(1, width - GROUP_LABEL_W - RIGHT_PAD);
        var viewRange  = Math.max(1, viewEnd - viewStart);
        var startIdx   = lowerBound(events, viewStart);
        var endIdx     = upperBound(events, viewEnd);
        var byGroup    = {};
        var rows       = [];
        var top        = AXIS_H;

        ctx.font = '11px Inter, sans-serif';

        for (var i = startIdx; i < endIdx; i++) {
            var ev = events[i];
            if (groupIndexMap[ev.group] == null) continue;
            if (!byGroup[ev.group]) byGroup[ev.group] = [];
            byGroup[ev.group].push({
                item: ev,
                x: GROUP_LABEL_W + ((ev.ts - viewStart) / viewRange) * dataW,
                boxW: measureNodeWidth(ev.label)
            });
        }

        for (var gi = 0; gi < groupOrder.length; gi++) {
            var gid     = groupOrder[gi];
            var visible = byGroup[gid] || [];
            var row     = {
                group: gid, groupIdx: gi,
                top: top, height: ROW_H,
                mode: 'cluster', nodes: [], clusters: []
            };

            if (visible.length > 0 && visible.length <= MAX_STACK_LANES) {
                var packed = packStackedNodes(gid, gi, top, visible);
                row.mode   = 'stack';
                row.nodes  = packed.nodes;
                row.height = computeStackedH(packed.laneCount);
            } else if (visible.length > MAX_STACK_LANES) {
                var cl      = buildClusters(gid, gi, top, visible, width);
                row.clusters = cl.buckets;
                row.height   = computeStackedH(cl.laneCount);
            }

            rows.push(row);
            top += row.height + ROW_GAP;
        }

        return {
            rows: rows,
            totalHeight: top + 12,
            visibleStartIdx: startIdx,
            visibleEndIdx:   endIdx,
            drawnCount: countNodes(rows)
        };
    }

    function packStackedNodes(groupId, groupIdx, rowTop, visible) {
        var sorted = visible.slice().sort(function(a, b) { return a.item.ts - b.item.ts; });
        var lanes  = [];
        var nodes  = [];
        var baseY  = rowTop + 7;
        var minX   = GROUP_LABEL_W + 8;

        for (var i = 0; i < sorted.length; i++) {
            var entry  = sorted[i];
            var boxW   = entry.boxW;
            var x      = Math.max(minX, entry.x - boxW / 2);
            var laneIdx = -1;

            for (var lane = 0; lane < lanes.length; lane++) {
                if (x >= lanes[lane] + 6) { laneIdx = lane; break; }
            }
            if (laneIdx === -1) { laneIdx = lanes.length; lanes.push(x + boxW); }
            else { lanes[laneIdx] = x + boxW; }

            nodes.push({
                kind: 'event',
                x: x, y: baseY + laneIdx * STACK_LANE_H,
                w: boxW, h: 18,
                item: entry.item, group: groupId, groupIdx: groupIdx
            });
        }
        return { nodes: nodes, laneCount: Math.max(1, lanes.length) };
    }

    function computeStackedH(laneCount) {
        return Math.max(ROW_H, 12 + laneCount * STACK_LANE_H);
    }

    /* Cluster PIXEL_WIDTH used for bucketing — separate from lane gap */
    var CLUSTER_NODE_W  = 66;   /* rendered pill width */
    var CLUSTER_NODE_H  = 18;
    var CLUSTER_LANE_H  = 22;   /* vertical step between cluster lanes */
    var CLUSTER_GAP     = 6;    /* min horizontal gap between cluster pills */
    var MAX_CLUSTER_LANES = 6;  /* hard cap — denser than this merges into bigger buckets */

    function buildClusters(groupId, groupIdx, rowTop, visible, width) {
        var dataW     = Math.max(1, width - GROUP_LABEL_W - RIGHT_PAD);
        var viewRange = Math.max(1, viewEnd - viewStart);

        /* ── Step 1: bucket by pixel column ──────────────────────────── */
        var bucketMap = new Map();
        for (var i = 0; i < visible.length; i++) {
            var entry = visible[i];
            var ev    = entry.item;
            var gx    = GROUP_LABEL_W + ((ev.ts - viewStart) / viewRange) * dataW;
            var key   = groupIdx + '|' + Math.floor(gx / CLUSTER_PX_W);
            var b     = bucketMap.get(key);
            if (!b) {
                b = { kind: 'cluster', group: groupId, groupIdx: groupIdx,
                      x: gx, count: 0, minTs: ev.ts, maxTs: ev.ts };
                bucketMap.set(key, b);
            }
            b.count++;
            if (ev.ts < b.minTs) b.minTs = ev.ts;
            if (ev.ts > b.maxTs) b.maxTs = ev.ts;
        }

        var buckets = Array.from(bucketMap.values());
        buckets.sort(function(a, b) { return a.x - b.x; });

        /* ── Step 2: lane-pack the buckets (greedy left-to-right) ────── */
        var lanes   = [];   /* lanes[i] = rightmost right-edge of last pill in lane i */
        var baseY   = rowTop + 7;

        for (var bi = 0; bi < buckets.length; bi++) {
            var bk    = buckets[bi];
            var left  = bk.x - CLUSTER_NODE_W / 2;
            var right = left + CLUSTER_NODE_W;
            var laneIdx = -1;

            for (var li = 0; li < lanes.length; li++) {
                if (left >= lanes[li] + CLUSTER_GAP) { laneIdx = li; break; }
            }

            /* Hit the lane cap — merge into the last lane (least bad choice) */
            if (laneIdx === -1 && lanes.length >= MAX_CLUSTER_LANES) {
                laneIdx = MAX_CLUSTER_LANES - 1;
            }

            if (laneIdx === -1) { laneIdx = lanes.length; lanes.push(right); }
            else { lanes[laneIdx] = Math.max(lanes[laneIdx] || 0, right); }

            bk.laneIdx = laneIdx;
            bk.y       = baseY + laneIdx * CLUSTER_LANE_H + CLUSTER_NODE_H / 2;
        }

        return { buckets: buckets, laneCount: Math.min(MAX_CLUSTER_LANES, Math.max(1, lanes.length)) };
    }

    function countNodes(rows) {
        var n = 0;
        for (var i = 0; i < rows.length; i++) {
            n += rows[i].mode === 'stack' ? rows[i].nodes.length : rows[i].clusters.length;
        }
        return n;
    }

    function measureNodeWidth(label) {
        ctx.font = '11px Inter, sans-serif';
        return Math.max(44, Math.min(180, ctx.measureText(label).width + 16));
    }

    /* ── Draw: axis ────────────────────────────────────────────────── */
    /*
     * pickTickPair returns { major, minor }.
     * Major ticks: labelled + full-height grid line.
     * Minor ticks: short notch only, no label, no grid line.
     * Each pair keeps minor as a clean subdivision of major.
     */
    function pickTickPair(rangeMs) {
        var M = 1000*60, H = 1000*60*60, D = H*24;
        var pairs = [
            [2*M,       M/2    ],   /* 2 min   / 30 s  */
            [5*M,       M      ],   /* 5 min   / 1 min */
            [10*M,      2*M    ],   /* 10 min  / 2 min */
            [30*M,      10*M   ],   /* 30 min  / 10 min */
            [H,         10*M   ],   /* 1 hr    / 10 min */
            [6*H,       30*M   ],   /* 6 hr    / 30 min */
            [D,         H      ],   /* 1 day   / 1 hr  */
            [7*D,       D      ],
            [30*D,      7*D    ],
            [90*D,      30*D   ],
            [365*D,     30*D   ],
            [2*365*D,   365*D  ],
            [5*365*D,   365*D  ],
            [10*365*D,  2*365*D]
        ];
        var target = Math.max(1, rangeMs / 8);
        for (var i = 0; i < pairs.length; i++) {
            if (pairs[i][0] >= target) return { major: pairs[i][0], minor: pairs[i][1] };
        }
        return { major: pairs[pairs.length-1][0], minor: pairs[pairs.length-1][1] };
    }

    function drawAxis(width, totalH) {
        ctx.fillStyle = '#0a1320';
        ctx.fillRect(0, 0, width, AXIS_H);

        ctx.strokeStyle = 'rgba(255,255,255,0.09)';
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.moveTo(0, AXIS_H - 0.5);
        ctx.lineTo(width, AXIS_H - 0.5);
        ctx.stroke();

        var pair  = pickTickPair(viewEnd - viewStart);
        var major = pair.major;
        var minor = pair.minor;

        ctx.font         = '11px Inter, sans-serif';
        ctx.textBaseline = 'top';

        /* ── Minor ticks: short notch only ── */
        var firstMinor = Math.floor(viewStart / minor) * minor;
        ctx.strokeStyle = 'rgba(255,255,255,0.20)';
        ctx.lineWidth   = 1;
        for (var t = firstMinor; t <= viewEnd; t += minor) {
            if (Math.round(((t % major) + major) % major) < minor * 0.01) continue; /* skip major positions */
            var x = mapTsToX(t, width);
            if (x < GROUP_LABEL_W + 2 || x > width - RIGHT_PAD) continue;
            ctx.beginPath();
            ctx.moveTo(x + 0.5, AXIS_H - 7);
            ctx.lineTo(x + 0.5, AXIS_H - 1);
            ctx.stroke();
        }

        /* ── Major ticks: grid line + notch + label ── */
        var firstMajor    = Math.floor(viewStart / major) * major;
        var lastLabelRight = -Infinity;

        for (var t = firstMajor; t <= viewEnd; t += major) {
            var x = mapTsToX(t, width);
            if (x < GROUP_LABEL_W + 2 || x > width - RIGHT_PAD) continue;

            /* Full-height grid line */
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth   = 1;
            ctx.beginPath();
            ctx.moveTo(x + 0.5, AXIS_H);
            ctx.lineTo(x + 0.5, totalH);
            ctx.stroke();

            /* Longer notch */
            ctx.strokeStyle = 'rgba(255,255,255,0.38)';
            ctx.lineWidth   = 1;
            ctx.beginPath();
            ctx.moveTo(x + 0.5, AXIS_H - 14);
            ctx.lineTo(x + 0.5, AXIS_H - 1);
            ctx.stroke();

            /* Label — suppress if it would collide with previous one */
            var txt  = formatTick(t, major);
            var txtW = ctx.measureText(txt).width;
            if (x > lastLabelRight + 6 && x + txtW + 6 < width - RIGHT_PAD) {
                ctx.fillStyle = '#7da8c8';
                ctx.fillText(txt, x + 4, 5);
                lastLabelRight = x + txtW + 4;
            }
        }

        /* ── "Now" dashed marker ── */
        var now = Date.now();
        if (now >= viewStart && now <= viewEnd) {
            var nx = mapTsToX(now, width);
            ctx.strokeStyle = 'rgba(72,210,130,0.85)';
            ctx.lineWidth   = 1.5;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(nx + 0.5, AXIS_H);
            ctx.lineTo(nx + 0.5, totalH);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(72,210,130,0.9)';
            ctx.font      = '10px Inter, sans-serif';
            ctx.fillText('now', nx + 3, 5);
        }
    }

    /* ── Draw: row bands + category labels ─────────────────────────── */
    function drawRows(width, height, rows) {
        for (var gi = 0; gi < rows.length; gi++) {
            var row = rows[gi];

            /* Zebra band */
            ctx.fillStyle = gi % 2 === 0 ? 'rgba(255,255,255,0.022)' : 'rgba(255,255,255,0.010)';
            ctx.fillRect(0, row.top, width, row.height);

            /* Row separator */
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth   = 1;
            ctx.beginPath();
            ctx.moveTo(0, row.top + 0.5);
            ctx.lineTo(width, row.top + 0.5);
            ctx.stroke();

            /* Category label — left column, vertically centered in row */
            var labelX = 10;
            var labelY = row.top + row.height / 2;
            var labelText = groupLabelMap[row.group] || row.group;
            var color     = groupColorMap[row.group] || '#6dafff';

            /* Color swatch dot */
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.85;
            ctx.beginPath();
            ctx.arc(labelX + 4, labelY, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            /* Label text — clip to label column width */
            ctx.save();
            ctx.beginPath();
            ctx.rect(0, row.top, GROUP_LABEL_W - 6, row.height);
            ctx.clip();

            ctx.fillStyle    = '#9ab8d0';
            ctx.font         = '11px Inter, sans-serif';
            ctx.textBaseline = 'middle';
            ctx.fillText(labelText, labelX + 12, labelY);
            ctx.restore();
        }
    }

    /* ── Draw: event node ──────────────────────────────────────────── */
    function drawEventNode(b) {
        var color = groupColorMap[b.item.group] || '#73b7ff';
        var x = b.x, y = b.y, w = b.w, h = b.h;

        roundedRect(ctx, x, y, w, h, 5);
        ctx.fillStyle   = color;
        ctx.globalAlpha = 0.18;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = color;
        ctx.lineWidth   = 1;
        ctx.stroke();

        ctx.fillStyle    = '#ddeeff';
        ctx.font         = '10px Inter, sans-serif';
        ctx.textBaseline = 'middle';
        ctx.fillText(fitText(b.item.label, w - 10), x + 5, y + h / 2);

        hitBoxes.push({ kind: 'event', x: x, y: y, w: w, h: h, item: b.item });
    }

    /* ── Draw: cluster node ────────────────────────────────────────── */
    function drawClusterNode(b) {
        var bw = CLUSTER_NODE_W, bh = CLUSTER_NODE_H;
        var x  = b.x - bw / 2;
        var y  = b.y - bh / 2;

        roundedRect(ctx, x, y, bw, bh, 8);
        ctx.fillStyle   = 'rgba(220,170,60,0.22)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(220,170,60,0.9)';
        ctx.lineWidth   = 1;
        ctx.stroke();

        ctx.fillStyle    = '#ffd98a';
        ctx.font         = '11px Inter, sans-serif';
        ctx.textBaseline = 'middle';
        ctx.fillText(b.count + ' events', x + 8, y + bh / 2);

        hitBoxes.push({ kind: 'cluster', x: x, y: y, w: bw, h: bh,
                        group: b.group, count: b.count, minTs: b.minTs, maxTs: b.maxTs });
    }

    /* ── Minimap ───────────────────────────────────────────────────── */
    function drawMinimap() {
        var w = minimap.width  / minimapDpr;
        var h = minimap.height / minimapDpr;

        minimapCtx.setTransform(minimapDpr, 0, 0, minimapDpr, 0, 0);
        minimapCtx.clearRect(0, 0, w, h);
        minimapCtx.fillStyle = '#0c1520';
        minimapCtx.fillRect(0, 0, w, h);

        var range = Math.max(1, rangeMax - rangeMin);
        for (var i = 0; i < events.length; i++) {
            var ev = events[i];
            var x  = ((ev.ts - rangeMin) / range) * w;
            minimapCtx.fillStyle  = groupColorMap[ev.group] || '#5da8ff';
            minimapCtx.globalAlpha = 0.65;
            minimapCtx.fillRect(x, 5, 1.5, h - 10);
        }
        minimapCtx.globalAlpha = 1;
        updateMinimapFocus();
    }

    function updateMinimapFocus() {
        var shellW = document.getElementById('minimap-shell').clientWidth;
        var range  = Math.max(1, rangeMax - rangeMin);
        var left   = ((viewStart - rangeMin) / range) * shellW;
        var right  = ((viewEnd   - rangeMin) / range) * shellW;
        minimapFocus.style.left  = clamp(left,  0, shellW) + 'px';
        minimapFocus.style.width = Math.max(6, clamp(right - left, 0, shellW)) + 'px';
    }

    /* ── Hit testing ───────────────────────────────────────────────── */
    function hitTest(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        var x    = clientX - rect.left;
        var y    = clientY - rect.top;
        for (var i = hitBoxes.length - 1; i >= 0; i--) {
            var hb = hitBoxes[i];
            if (x >= hb.x && x <= hb.x + hb.w && y >= hb.y && y <= hb.y + hb.h) return hb;
        }
        return null;
    }

    /* ── Tooltip ───────────────────────────────────────────────────── */
    function showTooltip(x, y, hb) {
        var html;
        if (hb.kind === 'event') {
            html = '<strong>' + escHtml(hb.item.label) + '</strong>'
                 + '<div class="tt-row"><b>Category:</b> ' + escHtml(groupLabelMap[hb.item.group] || hb.item.group) + '</div>'
                 + '<div class="tt-row"><b>Time:</b> ' + new Date(hb.item.ts).toLocaleString() + '</div>';
        } else {
            html = '<strong>' + hb.count + ' events</strong>'
                 + '<div class="tt-row"><b>Category:</b> ' + escHtml(groupLabelMap[hb.group] || hb.group) + '</div>'
                 + '<div class="tt-row"><b>From:</b> ' + new Date(hb.minTs).toLocaleDateString() + '</div>'
                 + '<div class="tt-row"><b>To:</b> ' + new Date(hb.maxTs).toLocaleDateString() + '</div>'
                 + '<div class="tt-row" style="margin-top:4px;color:#5a8099">Double-click to zoom in</div>';
        }
        tooltip.innerHTML      = html;
        tooltip.style.left     = (x + 14) + 'px';
        tooltip.style.top      = (y + 14) + 'px';
        tooltip.style.display  = 'block';
    }

    /* ── View meta ─────────────────────────────────────────────────── */
    function updateViewMeta(s, e, nodes) {
        var days = ((viewEnd - viewStart) / (1000 * 60 * 60 * 24)).toFixed(1);
        document.getElementById('view-meta').textContent =
            (e - s) + ' visible · ' + nodes + ' nodes · ' + days + ' d span';
    }

    /* ── Coordinate mapping ────────────────────────────────────────── */
    function mapTsToX(ts, width) {
        var dataW = Math.max(1, width - GROUP_LABEL_W - RIGHT_PAD);
        return GROUP_LABEL_W + ((ts - viewStart) / Math.max(1, viewEnd - viewStart)) * dataW;
    }

    /* ── Binary search ─────────────────────────────────────────────── */
    function lowerBound(arr, value) {
        var lo = 0, hi = arr.length;
        while (lo < hi) { var mid = (lo + hi) >> 1; if (arr[mid].ts < value) lo = mid + 1; else hi = mid; }
        return lo;
    }
    function upperBound(arr, value) {
        var lo = 0, hi = arr.length;
        while (lo < hi) { var mid = (lo + hi) >> 1; if (arr[mid].ts <= value) lo = mid + 1; else hi = mid; }
        return lo;
    }

    /* ── Tick logic ────────────────────────────────────────────────── */
    function formatTick(ms, step) {
        var d = new Date(ms);
        if (step < 1000*60*60) {
            /* minute-level: show date + HH:MM */
            return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate())
                 + ' ' + pad2(d.getUTCHours()) + ':' + pad2(d.getUTCMinutes());
        }
        if (step < 1000*60*60*24) {
            return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate())
                 + ' ' + pad2(d.getUTCHours()) + ':00';
        }
        if (step < 1000*60*60*24*365) {
            return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate());
        }
        return String(d.getUTCFullYear());
    }

    /* ── Canvas utilities ──────────────────────────────────────────── */
    function roundedRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y,   x + w, y + h, r);
        ctx.arcTo(x + w, y+h, x,     y + h, r);
        ctx.arcTo(x,     y+h, x,     y,     r);
        ctx.arcTo(x,     y,   x + w, y,     r);
        ctx.closePath();
    }

    function fitText(text, maxW) {
        ctx.font = '10px Inter, sans-serif';
        if (ctx.measureText(text).width <= maxW) return text;
        var t = text;
        while (t.length > 1 && ctx.measureText(t + '…').width > maxW) t = t.slice(0, -1);
        return t + '…';
    }
</script>
</body>
</html>
