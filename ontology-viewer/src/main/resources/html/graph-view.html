<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/franken-ui@latest/dist/css/core.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/franken-ui@2.1.2/dist/css/utilities.min.css" />
    <script src="assets/tailwindcss-cdn.js"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <script src="assets/lucide.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body class="antialiased bg-slate-950 text-slate-100 flex flex-col h-screen overflow-hidden select-none">
    <div class="flex shrink-0 items-center gap-4 border-b border-white/10 bg-slate-900/80 px-6 py-4 backdrop-blur" id="toolbar">
        <h2 class="flex items-center gap-2 text-base font-semibold tracking-tight text-slate-50"><i data-lucide="share-2" class="w-[18px] h-[18px]"></i>
            Neighborhood Graph</h2>
        <button class="inline-flex items-center gap-2 rounded-md border border-white/10 bg-white/5 px-3 py-1.5 text-xs font-medium text-slate-100 transition hover:border-white/20 hover:bg-white/10" onclick="fitGraph()">Fit View</button>
        <button class="inline-flex items-center gap-2 rounded-md border border-white/10 bg-white/5 px-3 py-1.5 text-xs font-medium text-slate-100 transition hover:border-white/20 hover:bg-white/10" onclick="togglePhysics()">Toggle Physics</button>
        <button class="inline-flex items-center gap-2 rounded-md border border-white/10 bg-white/5 px-3 py-1.5 text-xs font-medium text-slate-100 transition hover:border-white/20 hover:bg-white/10" onclick="resetGraph()">Reset</button>
        <span class="ml-auto text-xs text-slate-400" id="graph-stats"></span>
    </div>
    <div class="flex-1 relative" id="graph-wrapper">
        <div class="absolute inset-0 bg-muted/20" id="graph-container"></div>
        <div class="absolute top-2.5 right-2.5 bg-popover rounded-md text-xs z-20 pointer-events-auto overflow-hidden text-popover-foreground shadow-lg border border-border/15 w-fit min-w-[140px] max-w-[220px]" id="legend"></div>
        <div class="absolute bottom-2.5 left-2.5 right-2.5 bg-popover rounded-md px-4 py-3 text-xs overflow-y-auto hidden z-20 pointer-events-auto text-popover-foreground shadow-lg border border-border/15 max-h-[150px] select-text" id="node-info"></div>
        <div class="absolute inset-0 bg-black/60 z-[200] hidden justify-center items-center p-4" id="expansion-dialog-overlay">
            <div class="bg-popover rounded-lg px-6 py-5 min-w-[340px] max-w-[440px] max-h-[80vh] overflow-y-auto text-popover-foreground shadow-2xl border border-border/15" id="expansion-dialog"></div>
        </div>
    </div>

    <script>
        var network = null;
        var nodesDataSet = null;
        var edgesDataSet = null;
        var exploredNodes = new Set();
        var physicsEnabled = true;
        var initialUri = '';
        var EXPAND_THRESHOLD = 20;
        var pendingExpandNodeId = null;
        var expandedLiteralId = null;  // tracks which literal box is currently expanded

        var EXPLORED_BORDER_COLOR = '#33a02c';  // ColorBrewer Paired green for explored nodes
        var EXPLORED_BORDER_WIDTH = 3;

        function styleNavigationButtons(container) {
            if (!container) return;

            var nav = container.querySelector('.vis-navigation');
            if (nav) {
                nav.style.background = 'transparent';
                nav.style.border = 'none';
                nav.style.boxShadow = 'none';
                nav.style.display = 'flex';
                nav.style.flexDirection = 'column';
                nav.style.gap = '6px';
                nav.style.padding = '8px';
            }

            var buttons = container.querySelectorAll('.vis-button');
            for (var i = 0; i < buttons.length; i++) {
                var btn = buttons[i];
                btn.style.width = '34px';
                btn.style.height = '34px';
                btn.style.lineHeight = '34px';
                btn.style.display = 'flex';
                btn.style.alignItems = 'center';
                btn.style.justifyContent = 'center';
                btn.style.padding = '0';
                btn.style.borderRadius = '10px';
                btn.style.border = '1px solid hsl(var(--border) / 0.25)';
                btn.style.background = 'hsl(var(--card))';
                btn.style.color = 'hsl(var(--foreground))';
                btn.style.backgroundImage = 'none';
                btn.style.boxShadow = '0 4px 12px rgba(0, 0, 0, 0.25)';
                btn.style.cursor = 'pointer';
                btn.style.fontWeight = '700';
                btn.style.fontSize = '16px';
                btn.style.transition = 'all 0.18s ease';
                btn.onmouseenter = function () {
                    this.style.background = 'hsl(var(--accent))';
                    this.style.transform = 'translateY(-1px)';
                    this.style.boxShadow = '0 6px 14px rgba(0, 0, 0, 0.32)';
                };
                btn.onmouseleave = function () {
                    this.style.background = 'hsl(var(--card))';
                    this.style.transform = 'translateY(0)';
                    this.style.boxShadow = '0 4px 12px rgba(0, 0, 0, 0.25)';
                };
            }

            // Keep only zoom controls for a cleaner UI.
            var directional = container.querySelectorAll('.vis-button.vis-up, .vis-button.vis-down, .vis-button.vis-left, .vis-button.vis-right');
            for (var j = 0; j < directional.length; j++) {
                directional[j].style.display = 'none';
            }

            var zoomIn = container.querySelector('.vis-button.vis-zoomIn');
            var zoomOut = container.querySelector('.vis-button.vis-zoomOut');
            var fit = container.querySelector('.vis-button.vis-zoomExtends');

            if (zoomIn) {
                zoomIn.innerHTML = '<i data-lucide="zoom-in" class="w-4 h-4"></i>';
                zoomIn.style.fontSize = '0';
            }
            if (zoomOut) {
                zoomOut.innerHTML = '<i data-lucide="zoom-out" class="w-4 h-4"></i>';
                zoomOut.style.fontSize = '0';
            }
            if (fit) {
                fit.innerHTML = '<i data-lucide="maximize" class="w-4 h-4"></i>';
                fit.style.fontSize = '0';
            }

            if (window.lucide && typeof window.lucide.createIcons === 'function') {
                window.lucide.createIcons();
            }
        }

        function initGraph(uri) {
            initialUri = uri;
            try {
                nodesDataSet = new vis.DataSet();
                edgesDataSet = new vis.DataSet();
                exploredNodes.clear();

                var container = document.getElementById('graph-container');
                var options = {
                    physics: {
                        enabled: true,
                        solver: 'forceAtlas2Based',
                        forceAtlas2Based: {
                            gravitationalConstant: -100,
                            centralGravity: 0.005,
                            springLength: 220,
                            springConstant: 0.04,
                            damping: 0.4,
                            avoidOverlap: 0.8
                        },
                        minVelocity: 0.75,
                        stabilization: { iterations: 400 }
                    },
                    interaction: {
                        hover: true,
                        tooltipDelay: 200,
                        multiselect: true,
                        navigationButtons: true,
                        keyboard: true
                    },
                    nodes: {
                        font: { color: '#e0e0e0', size: 12 },
                        borderWidth: 2,
                        margin: 10
                    },
                    edges: {
                        font: { color: '#8899aa', size: 10, strokeWidth: 0, background: '#1a1a2e' },
                        color: { color: '#4a4a6a', highlight: '#e94560', hover: '#6a6a8a' },
                        smooth: { type: 'continuous' },
                        length: 280,
                        width: 1.5
                    },
                    layout: {
                        improvedLayout: true
                    }
                };

                network = new vis.Network(container, { nodes: nodesDataSet, edges: edgesDataSet }, options);
                styleNavigationButtons(container);
                // Navigation buttons are created asynchronously by vis.js; retry a couple of times,
                // but avoid subtree observers because tooltip mutations on hover can cause re-style loops.
                setTimeout(function () { styleNavigationButtons(container); }, 120);
                setTimeout(function () { styleNavigationButtons(container); }, 400);

                // Draw dot grid on the canvas (moves & scales with the graph)
                var DOT_SPACING = 40;  // world-coordinate spacing between dots
                var DOT_RADIUS = 1.2;
                var DOT_COLOR = 'rgba(160,160,160,0.45)';
                var MIN_SCREEN_SPACING = 12; // minimum pixel spacing to avoid overdraw
                network.on('beforeDrawing', function (ctx) {
                    // ctx is in world coordinates — vis.js already applied the camera transform
                    var scale = network.getScale();
                    // Skip drawing dots if they would be too dense on screen
                    if (DOT_SPACING * scale < MIN_SCREEN_SPACING) return;

                    ctx.save();  // Prevent canvas state leak into vis.js node rendering

                    var viewPos = network.getViewPosition();  // center of viewport in world coords
                    var rect = container.getBoundingClientRect();
                    var halfW = (rect.width / scale) / 2;
                    var halfH = (rect.height / scale) / 2;

                    var left = viewPos.x - halfW;
                    var right = viewPos.x + halfW;
                    var top = viewPos.y - halfH;
                    var bottom = viewPos.y + halfH;

                    // Snap to grid
                    var startX = Math.floor(left / DOT_SPACING) * DOT_SPACING;
                    var startY = Math.floor(top / DOT_SPACING) * DOT_SPACING;

                    ctx.fillStyle = DOT_COLOR;
                    ctx.beginPath();
                    for (var x = startX; x <= right; x += DOT_SPACING) {
                        for (var y = startY; y <= bottom; y += DOT_SPACING) {
                            ctx.moveTo(x + DOT_RADIUS, y);
                            ctx.arc(x, y, DOT_RADIUS, 0, 2 * Math.PI);
                        }
                    }
                    ctx.fill();

                    ctx.restore();  // Restore canvas state so vis.js renders nodes correctly
                });

                // Double-click to expand
                network.on('doubleClick', function (params) {
                    if (!nodesDataSet) return;
                    if (params.nodes.length > 0) {
                        var nodeId = params.nodes[0];
                        if (nodeId.indexOf('_lit_') >= 0) return;
                        expandNodeSmart(nodeId);
                    }
                });

                // Click to show info & expand/collapse literals
                network.on('click', function (params) {
                    if (!nodesDataSet) return;
                    if (params.nodes.length > 0) {
                        var nodeId = params.nodes[0];
                        // collapseLiteral();  // collapse any previously expanded literal
                        // expandLiteral(nodeId);
                        showNodeInfo(nodeId);
                    } else {
                        //collapseLiteral();
                        document.getElementById('node-info').style.display = 'none';
                    }
                });

                // Smart-expand the initial node
                expandNodeSmart(uri);

                javaBridge.log('Graph initialized for: ' + uri);
            } catch (e) {
                javaBridge.log('Error initializing graph: ' + e.message);
                document.getElementById('graph-container').innerHTML =
                    '<div class="p-10 text-center text-destructive">' +
                    '<h2>Error</h2><p>' + e.message + '</p></div>';
            }
        }

        function expandNodeSmart(nodeId) {
            if (exploredNodes.has(nodeId)) {
                javaBridge.log('Node already explored: ' + nodeId);
                return;
            }
            try {
                javaBridge.log('Expanding node: ' + nodeId);
                var summaryJson = javaBridge.getNeighborSummaryJson(nodeId);
                var summary = JSON.parse(summaryJson);
                javaBridge.log('Neighbor summary for ' + nodeId + ': ' + summary.totalCount + ' neighbors across ' + summary.types.length + ' types');

                if (summary.totalCount <= EXPAND_THRESHOLD) {
                    // Small neighborhood — load everything
                    var neighborJson = javaBridge.getNeighborsJson(nodeId);
                    var data = JSON.parse(neighborJson);
                    applyExpansionData(nodeId, data);
                } else {
                    // Large neighborhood — show filter dialog
                    showExpansionDialog(nodeId, summary);
                }
            } catch (e) {
                javaBridge.log('Error expanding node: ' + e.message);
            }
        }

        function normalizeNode(node) {
            // Extract and store type from title (format: "TypeName\nURI")
            if (node.title && !node._nodeType) {
                var nlIdx = node.title.indexOf('\n');
                node._nodeType = nlIdx >= 0 ? node.title.substring(0, nlIdx) : null;
            }
            // Ensure non-literal nodes have complete color specs for vis.js
            if (node.shape === 'box' || (node.id && node.id.indexOf('_lit_') >= 0))
                return node;

            // Normalize color to ensure it has background, border, highlight, and hover states
            var c = node.color;
            if (c && typeof c === 'object') {
                var bg = c.background || '#a6cee3';
                var bd = c.border || '#666';
                if (!c.highlight) {
                    c.highlight = { background: bg, border: bd };
                }
                if (!c.hover) {
                    c.hover = { background: bg, border: bd };
                }
            } else if (typeof c === 'string') {
                node.color = { background: c, border: c, highlight: { background: c, border: c }, hover: { background: c, border: c } };
            } else if (!c) {
                node.color = { background: '#a6cee3', border: '#a6cee3', highlight: { background: '#a6cee3', border: '#a6cee3' }, hover: { background: '#a6cee3', border: '#a6cee3' } };
            }
            // Ensure font color is set for dark theme
            if (!node.font || !node.font.color) {
                node.font = Object.assign({ color: '#e0e0e0', size: 12 }, node.font || {});
            }
            return node;
        }

        function applyExpansionData(nodeId, data) {
            var existingNodeIds = new Set(nodesDataSet.getIds());
            var existingEdgeKeys = new Set();
            var allEdges = edgesDataSet.get();
            for (var i = 0; i < allEdges.length; i++) {
                var e = allEdges[i];
                existingEdgeKeys.add(e.from + '|' + e.to + '|' + (e.label || ''));
            }

            var newNodes = [];
            var newEdges = [];

            data.nodes.forEach(function (node) {
                if (!existingNodeIds.has(node.id)) {
                    newNodes.push(normalizeNode(node));
                }
            });

            data.edges.forEach(function (edge) {
                var key = edge.from + '|' + edge.to + '|' + (edge.label || '');
                if (!existingEdgeKeys.has(key)) {
                    edge.id = 'e_exp_' + Math.random().toString(36).substr(2, 9);
                    newEdges.push(edge);
                }
            });

            if (newNodes.length > 0) nodesDataSet.add(newNodes);
            if (newEdges.length > 0) edgesDataSet.add(newEdges);

            exploredNodes.add(nodeId);
            markNodeExplored(nodeId);

            updateStats();
            updateLegend();
            javaBridge.log('Expanded node: ' + nodeId + ' (+' + newNodes.length + ' nodes, +' + newEdges.length + ' edges)');
        }

        function showExpansionDialog(nodeId, summary) {
            pendingExpandNodeId = nodeId;
            var dialog = document.getElementById('expansion-dialog');
            var nodeLabel = getNodeLabel(nodeId);
            var html = '<h3 class="text-foreground mb-1 text-sm font-semibold">Expand "' + escapeHtml(nodeLabel) + '"</h3>';
            html += '<p class="text-muted-foreground mb-3 text-xs">' + summary.totalCount + ' neighbors found</p>';
            html += '<div class="mb-1.5 text-xs text-muted-foreground">Select types to load:</div>';

            summary.types.sort(function (a, b) { return b.count - a.count; });

            for (var i = 0; i < summary.types.length; i++) {
                var t = summary.types[i];
                var defaultChecked = t.count <= EXPAND_THRESHOLD ? ' checked' : '';
                html += '<label class="flex items-center gap-2 px-2 py-1 rounded-md mb-0.5 cursor-pointer text-xs hover:bg-accent transition-colors">';
                html += '<input type="checkbox" class="type-check" value="' + escapeHtml(t.type) + '"' + defaultChecked + '>';
                html += '<span class="type-dot w-3 h-3 rounded-full shrink-0 inline-block" style="background:' + t.color + '"></span>';
                html += '<span>' + escapeHtml(t.type) + '</span>';
                html += '<span class="ml-auto text-muted-foreground text-xs">(' + t.count + ')</span>';
                html += '</label>';
            }

            if (summary.literalCount > 0) {
                html += '<label class="flex items-center gap-2 px-2 py-1 rounded-md mb-0.5 cursor-pointer text-xs hover:bg-accent transition-colors">';
                html += '<input type="checkbox" id="include-literals" checked>';
                html += '<span class="type-dot w-3 h-3 rounded-full shrink-0 inline-block" style="background:#f0f0f0;border:1px solid #666"></span>';
                html += '<span>Data properties</span>';
                html += '<span class="ml-auto text-muted-foreground text-xs">(' + summary.literalCount + ')</span>';
                html += '</label>';
            }

            html += '<div class="mt-3.5 flex gap-2 items-center text-xs text-foreground">';
            html += '<label>Max per type:</label>';
            html += '<input type="number" class="px-2 py-1 bg-background border border-border rounded-md text-foreground text-xs outline-none focus:border-ring select-text w-[60px]" id="max-per-type" value="25" min="0" title="0 = no limit">';
            html += '<span class="text-xs text-muted-foreground ml-1">(0 = all)</span>';
            html += '</div>';

            html += '<div class="flex gap-2 mt-4 justify-end">';
            html += '<button class="px-3 py-1.5 rounded-md border border-border bg-background text-foreground text-xs font-medium transition hover:bg-secondary hover:border-border/80 cursor-pointer" onclick="selectAllTypes(true)">All</button>';
            html += '<button class="px-3 py-1.5 rounded-md border border-border bg-background text-foreground text-xs font-medium transition hover:bg-secondary hover:border-border/80 cursor-pointer" onclick="selectAllTypes(false)">None</button>';
            html += '<button class="px-3 py-1.5 rounded-md border border-accent bg-accent text-accent-foreground text-xs font-medium transition hover:bg-accent/90 hover:border-accent/80 cursor-pointer" onclick="confirmExpansion()">Expand</button>';
            html += '<button class="px-3 py-1.5 rounded-md border border-border bg-background text-foreground text-xs font-medium transition hover:bg-secondary hover:border-border/80 cursor-pointer" onclick="cancelExpansion()">Cancel</button>';
            html += '</div>';

            dialog.innerHTML = html;
            document.getElementById('expansion-dialog-overlay').style.display = 'flex';
        }

        function getNodeLabel(nodeId) {
            var node = nodesDataSet ? nodesDataSet.get(nodeId) : null;
            if (node && node.label) return node.label;
            var hash = nodeId.lastIndexOf('#');
            if (hash >= 0 && hash < nodeId.length - 1) return nodeId.substring(hash + 1);
            var slash = nodeId.lastIndexOf('/');
            if (slash >= 0 && slash < nodeId.length - 1) return nodeId.substring(slash + 1);
            return nodeId;
        }

        function selectAllTypes(checked) {
            var boxes = document.querySelectorAll('.type-check');
            for (var i = 0; i < boxes.length; i++) boxes[i].checked = checked;
            var litBox = document.getElementById('include-literals');
            if (litBox) litBox.checked = checked;
        }

        function confirmExpansion() {
            var nodeId = pendingExpandNodeId;
            if (!nodeId) return;

            var selectedTypes = [];
            var boxes = document.querySelectorAll('.type-check');
            for (var i = 0; i < boxes.length; i++) {
                if (boxes[i].checked) selectedTypes.push(boxes[i].value);
            }
            var litBox = document.getElementById('include-literals');
            var includeLiterals = litBox ? litBox.checked : true;
            var maxPerType = parseInt(document.getElementById('max-per-type').value) || 0;

            closeExpansionDialog();

            if (selectedTypes.length === 0 && !includeLiterals) {
                javaBridge.log('No types selected for expansion');
                return;
            }

            try {
                var typesJson = JSON.stringify(selectedTypes);
                var neighborJson = javaBridge.getFilteredNeighborsJson(
                    nodeId, typesJson, maxPerType, includeLiterals ? 'true' : 'false');
                var data = JSON.parse(neighborJson);
                applyExpansionData(nodeId, data);
                javaBridge.log('Filtered expand: ' + selectedTypes.join(', ') + ' max=' + maxPerType);
            } catch (e) {
                javaBridge.log('Error in filtered expansion: ' + e.message);
            }
        }

        function cancelExpansion() {
            closeExpansionDialog();
        }

        function closeExpansionDialog() {
            document.getElementById('expansion-dialog-overlay').style.display = 'none';
            pendingExpandNodeId = null;
        }

        function markNodeExplored(nodeId) {
            try {
                var node = nodesDataSet.get(nodeId);
                if (node && node.shape !== 'box') {
                    var color = node.color || {};
                    if (typeof color === 'string') {
                        color = { background: color };
                    }
                    color.border = EXPLORED_BORDER_COLOR;
                    nodesDataSet.update({
                        id: nodeId,
                        color: color,
                        borderWidth: EXPLORED_BORDER_WIDTH
                    });
                }
            } catch (e) { }
        }

        function showNodeInfo(nodeId) {
            var node = nodesDataSet.get(nodeId);
            if (!node) return;
            var info = document.getElementById('node-info');
            info.style.display = 'block';
            var html = '<h4 class="text-foreground mb-1 font-semibold">' + escapeHtml(node.label || nodeId) + '</h4>';
            if (node.title) {
                html += '<div class="text-muted-foreground text-[10px] break-all">' + escapeHtml(node.title) + '</div>';
            }
            var isLiteral = (node.shape === 'box') || (node.id && node.id.indexOf('_lit_') >= 0);
            if (!isLiteral) {
                var isExplored = exploredNodes.has(nodeId);
                html += '<div class="mt-1.5 flex items-center gap-1 ' + (isExplored ? 'text-green-600' : 'text-orange-500') + '">' +
                    (isExplored ? '<i data-lucide="check"/> Explored' : '<i data-lucide="circle"/> Not explored (double-click to expand)') + '</div>';
            }
            info.innerHTML = html;
        }

        function expandLiteral(nodeId) {
            javaBridge.log('Expanding literal node: ' + nodeId);
            var node = nodesDataSet.get(nodeId);
            if (!node) return;
            var isLiteral = (node.shape === 'box') || (nodeId && nodeId.indexOf('_lit_') >= 0);
            if (!isLiteral) return;
            // title holds the full untruncated value
            if (!node.title || node.title === node.label) return;
            // Store original short label for later collapse
            nodesDataSet.update({
                id: nodeId,
                label: node.title,
                _shortLabel: node.label,
                font: { size: 12, color: '#222', multi: false },
                widthConstraint: { maximum: 450 }
            });
            expandedLiteralId = nodeId;
        }

        function collapseLiteral() {
            if (!expandedLiteralId) return;
            var node = nodesDataSet.get(expandedLiteralId);
            if (node && node._shortLabel) {
                nodesDataSet.update({
                    id: expandedLiteralId,
                    label: node._shortLabel,
                    font: { size: 11, color: '#333' }
                });
                nodesDataSet.update({ id: expandedLiteralId });
                // Remove private keys via remove+re-add to avoid DataSet corruption
                var clean = Object.assign({}, nodesDataSet.get(expandedLiteralId));
                delete clean._shortLabel;
                delete clean.widthConstraint;
                nodesDataSet.update(clean);
            }
            expandedLiteralId = null;
        }

        function fitGraph() {
            if (network) network.fit({ animation: true });
        }

        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            if (network) {
                network.setOptions({ physics: { enabled: physicsEnabled } });
            }
        }

        function resetGraph() {
            exploredNodes.clear();
            initGraph(initialUri);
        }

        function updateStats() {
            var nodeCount = nodesDataSet ? nodesDataSet.length : 0;
            var edgeCount = edgesDataSet ? edgesDataSet.length : 0;
            document.getElementById('graph-stats').textContent =
                nodeCount + ' nodes | ' + edgeCount + ' edges | ' + exploredNodes.size + ' explored';
        }

        function updateLegend() {
            var types = {};
            if (nodesDataSet) {
                nodesDataSet.forEach(function (node) {
                    // Skip literal/box nodes (data properties)
                    if (node.shape === 'box') return;
                    if (node.id && node.id.indexOf('_lit_') >= 0) return;
                    var type = node._nodeType;
                    if (!type && node.title) {
                        var nlIdx = node.title.indexOf('\n');
                        type = nlIdx >= 0 ? node.title.substring(0, nlIdx) : null;
                    }
                    if (type && !types[type]) {
                        var color = '#a6cee3';
                        if (node.color) {
                            if (typeof node.color === 'string') color = node.color;
                            else if (node.color.background) color = node.color.background;
                        }
                        types[type] = color;
                    }
                });
            }
            var legend = document.getElementById('legend');
            var wasCollapsed = legend.classList.contains('collapsed');
            var body = '';
            body += '<div class="flex items-center gap-1.5 mb-1"><span class="w-3 h-3 rounded-full inline-block" style="background:#ccc;border:2px solid #33a02c"></span> Explored</div>';
            body += '<div class="flex items-center gap-1.5 mb-1"><span class="w-3 h-3 rounded-full inline-block" style="background:#ccc;border:2px solid #999"></span> Not explored</div>';
            body += '<hr class="border-secondary my-1.5">';
            for (var type in types) {
                body += '<div class="flex items-center gap-1.5 mb-1 whitespace-nowrap overflow-hidden text-ellipsis"><span class="w-3 h-3 rounded-full shrink-0 inline-block" style="background:' + types[type] + '"></span> ' + escapeHtml(type) + '</div>';
            }
            legend.innerHTML = '<div class="px-3 py-2 bg-secondary text-secondary-foreground text-xs font-semibold cursor-pointer select-none flex items-center gap-1.5 hover:bg-accent transition-colors" id="legend-header" onclick="toggleLegend()"><span class="toggle-arrow flex text-[10px] transition-transform duration-200"><i data-lucide="chevron-down"></i></span> Legend</div>' +
                '<div class="px-3 py-2 overflow-hidden transition-all duration-250" id="legend-body" style="max-height:500px;opacity:1">' + body + '</div>';
            if (wasCollapsed) {
                legend.classList.add('collapsed');
                var legendBody = document.getElementById('legend-body');
                legendBody.style.maxHeight = '0';
                legendBody.style.opacity = '0';
                legendBody.style.paddingTop = '0';
                legendBody.style.paddingBottom = '0';
                var arrow = legend.querySelector('.toggle-arrow');
                if (arrow) {
                    arrow.style.transform = 'rotate(-90deg)';
                }
            }
        }

        function toggleLegend() {
            var legend = document.getElementById('legend');
            if (!legend) return;

            legend.classList.toggle('collapsed');
            var collapsed = legend.classList.contains('collapsed');
            var legendBody = document.getElementById('legend-body');
            var arrow = legend.querySelector('.toggle-arrow');

            if (legendBody) {
                if (collapsed) {
                    legendBody.style.maxHeight = '0';
                    legendBody.style.opacity = '0';
                    legendBody.style.paddingTop = '0';
                    legendBody.style.paddingBottom = '0';
                } else {
                    legendBody.style.maxHeight = '500px';
                    legendBody.style.opacity = '1';
                    legendBody.style.paddingTop = '';
                    legendBody.style.paddingBottom = '';
                }
            }

            if (arrow) {
                arrow.style.transform = collapsed ? 'rotate(-90deg)' : 'rotate(0deg)';
            }
        }

        // Reusable element for escapeHtml (avoids creating a new element each call)
        var _escDiv = document.createElement('div');
        function escapeHtml(text) {
            if (!text) return '';
            _escDiv.textContent = text;
            return _escDiv.innerHTML;
        }
    </script>
    <script>
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
            window.lucide.createIcons();
        }
    </script>
</body>

</html>
