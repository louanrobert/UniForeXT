<!DOCTYPE html>
<html lang="en" class="dark uk-theme-zinc uk-radii-md uk-shadows-sm uk-font-sm">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/franken-ui@latest/dist/css/core.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/franken-ui@2.1.2/dist/css/utilities.min.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>

        textarea,
        pre,
        code,
        .result-table {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        textarea {
            min-height: 230px;
            resize: vertical;
            border: 1px solid hsl(var(--border) / 0.2);
        }

        #result-table-wrap {
            max-height: 48vh;
            overflow: auto;
            border: 1px solid hsl(var(--border) / 0.2);
            border-radius: 8px;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .result-table th,
        .result-table td {
            border-bottom: 1px solid hsl(var(--border) / 0.15);
            padding: 8px;
            text-align: left;
            vertical-align: top;
            white-space: nowrap;
        }

        .result-table td {
            max-width: 420px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-table th {
            position: sticky;
            top: 0;
            background: hsl(var(--secondary));
            z-index: 2;
        }

        .kind {
            color: hsl(var(--muted-foreground));
            font-size: 10px;
            margin-left: 6px;
        }

        #result-ttl {
            max-height: 48vh;
            overflow: auto;
            white-space: pre;
            border: 1px solid hsl(var(--border) / 0.2);
        }
    </style>
</head>

<body class="bg-background text-foreground h-screen overflow-hidden">
    <div class="h-full flex flex-col">
        <div class="bg-card px-6 py-4 flex items-center gap-3 shrink-0 border-b border-border">
            <button class="uk-btn uk-btn-default uk-btn-xs" onclick="javaBridge.navigateBack()">Back</button>
            <h2 class="text-base text-foreground font-semibold tracking-tight flex items-center gap-2">
                <i data-lucide="terminal-square" style="width:18px;height:18px"></i> Query system
            </h2>
            <span class="text-xs text-muted-foreground ml-auto">Read-only SPARQL: SELECT, ASK, CONSTRUCT, DESCRIBE</span>
        </div>

        <div class="flex-1 min-h-0 p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-6">
            <section class="lg:col-span-5 bg-card rounded-lg border border-border/20 p-4 flex flex-col min-h-0">
                <div class="flex items-center gap-2 mb-3">
                    <label class="text-xs text-muted-foreground" for="example-query">Example</label>
                    <select class="uk-select uk-select-xs w-auto" id="example-query" onchange="applyExample(this.value)">
                        <option value="">Custom query</option>
                        <option value="select10">List 10 triples</option>
                        <option value="types">Count by rdf:type</option>
                        <option value="ask">ASK if any triples exist</option>
                        <option value="describe">Describe first subject</option>
                    </select>
                </div>
                <textarea class="uk-textarea text-xs bg-background text-foreground p-3 rounded-md outline-none"
                    id="query-input" spellcheck="false"></textarea>
                <div class="mt-3 flex items-center gap-2">
                    <button class="uk-btn uk-btn-primary uk-btn-xs" onclick="runQuery()">Run</button>
                    <button class="uk-btn uk-btn-default uk-btn-xs" onclick="clearQuery()">Clear</button>
                    <span class="text-xs text-muted-foreground ml-auto" id="status">Ready</span>
                </div>
            </section>

            <section class="lg:col-span-7 bg-card rounded-lg border border-border/20 p-4 flex flex-col min-h-0">
                <div class="text-xs text-muted-foreground mb-2" id="result-meta">No results yet.</div>
                <div class="min-h-0 flex-1" id="result-root"></div>
            </section>
        </div>
    </div>

    <script>
        function initQueryView() {
            lucide.createIcons();
            document.getElementById('query-input').value = defaultQuery();
        }

        function defaultQuery() {
            return [
                'SELECT ?s ?p ?o',
                'WHERE {',
                '  ?s ?p ?o .',
                '}',
                'LIMIT 50'
            ].join('\n');
        }

        function applyExample(id) {
            var q = defaultQuery();
            if (id === 'select10') {
                q = [
                    'SELECT ?s ?p ?o',
                    'WHERE {',
                    '  ?s ?p ?o .',
                    '}',
                    'LIMIT 10'
                ].join('\n');
            } else if (id === 'types') {
                q = [
                    'SELECT ?type (COUNT(?s) AS ?count)',
                    'WHERE {',
                    '  ?s a ?type .',
                    '}',
                    'GROUP BY ?type',
                    'ORDER BY DESC(?count)',
                    'LIMIT 100'
                ].join('\n');
            } else if (id === 'ask') {
                q = 'ASK WHERE { ?s ?p ?o }';
            } else if (id === 'describe') {
                q = [
                    'DESCRIBE ?s',
                    'WHERE {',
                    '  ?s ?p ?o .',
                    '}',
                    'LIMIT 1'
                ].join('\n');
            }
            document.getElementById('query-input').value = q;
        }

        function clearQuery() {
            document.getElementById('query-input').value = '';
            document.getElementById('result-root').innerHTML = '';
            document.getElementById('result-meta').textContent = 'No results yet.';
            document.getElementById('status').textContent = 'Ready';
        }

        function runQuery() {
            var query = document.getElementById('query-input').value || '';
            var status = document.getElementById('status');
            var resultRoot = document.getElementById('result-root');
            var resultMeta = document.getElementById('result-meta');

            resultRoot.innerHTML = '';
            resultMeta.textContent = '';

            if (!query.trim()) {
                status.textContent = 'Query is empty';
                return;
            }

            status.textContent = 'Running...';

            try {
                var raw = javaBridge.executeSparqlJson(query);
                var res = JSON.parse(raw);
                renderResult(res);
                status.textContent = res.ok ? 'Done' : 'Failed';
            } catch (e) {
                status.textContent = 'Failed';
                resultMeta.textContent = 'Execution error';
                resultRoot.textContent = e.message;
            }
        }

        function renderResult(res) {
            var root = document.getElementById('result-root');
            var meta = document.getElementById('result-meta');
            root.innerHTML = '';

            if (!res.ok) {
                meta.textContent = 'Query failed';
                var err = document.createElement('pre');
                err.className = 'bg-background rounded-md p-3 text-xs text-destructive';
                err.textContent = res.message || 'Unknown error';
                root.appendChild(err);
                return;
            }

            if (res.queryType === 'SELECT') {
                var truncated = res.truncated ? ' (truncated)' : '';
                meta.textContent = 'SELECT: ' + (res.rowCount || 0) + ' rows' + truncated;
                if (res.message) {
                    meta.textContent += ' - ' + res.message;
                }
                root.appendChild(buildSelectTable(res.columns || [], res.rows || []));
                return;
            }

            if (res.queryType === 'ASK') {
                meta.textContent = 'ASK result';
                var askBox = document.createElement('div');
                askBox.className = 'bg-background rounded-md p-4 text-sm';
                askBox.textContent = String(!!res.boolean);
                root.appendChild(askBox);
                return;
            }

            if (res.queryType === 'CONSTRUCT' || res.queryType === 'DESCRIBE') {
                meta.textContent = res.queryType + ': ' + (res.tripleCount || 0) + ' triples';
                var pre = document.createElement('pre');
                pre.className = 'bg-background rounded-md p-3 text-xs';
                pre.id = 'result-ttl';
                pre.textContent = res.ttl || '';
                root.appendChild(pre);
                return;
            }

            meta.textContent = 'Unknown result type';
            root.textContent = JSON.stringify(res, null, 2);
        }

        function buildSelectTable(columns, rows) {
            var wrap = document.createElement('div');
            wrap.id = 'result-table-wrap';

            var table = document.createElement('table');
            table.className = 'result-table';

            var thead = document.createElement('thead');
            var hr = document.createElement('tr');
            for (var i = 0; i < columns.length; i++) {
                var th = document.createElement('th');
                th.textContent = '?' + columns[i];
                hr.appendChild(th);
            }
            thead.appendChild(hr);

            var tbody = document.createElement('tbody');
            for (var r = 0; r < rows.length; r++) {
                var tr = document.createElement('tr');
                var row = rows[r];
                var rowUri = getRowUri(row, columns);

                if (rowUri) {
                    tr.style.cursor = 'pointer';
                    tr.title = 'Double-click to open graph view';
                    tr.addEventListener('dblclick', (function (uri) {
                        return function () {
                            openGraphView(uri);
                        };
                    })(rowUri));
                }

                for (var c = 0; c < columns.length; c++) {
                    var col = columns[c];
                    var cell = document.createElement('td');
                    var v = row[col];
                    cell.title = toCellFullText(v);
                    cell.textContent = toCellText(v);

                    var kind = document.createElement('span');
                    kind.className = 'kind';
                    kind.textContent = '[' + toKind(v) + ']';
                    cell.appendChild(kind);

                    tr.appendChild(cell);
                }
                tbody.appendChild(tr);
            }

            table.appendChild(thead);
            table.appendChild(tbody);
            wrap.appendChild(table);
            return wrap;
        }

        function getRowUri(row, columns) {
            for (var i = 0; i < columns.length; i++) {
                var value = row[columns[i]];
                if (value && value.kind === 'uri' && value.value) {
                    return value.value;
                }
            }
            return null;
        }

        function openGraphView(uri) {
            try {
                if (javaBridge && typeof javaBridge.openGraphForIndividual === 'function') {
                    javaBridge.openGraphForIndividual(uri);
                }
            } catch (e) {
                console.error('Failed to open graph view:', e);
            }
        }

        function toKind(v) {
            if (!v || !v.kind) return 'null';
            return v.kind;
        }

        function toCellText(v) {
            if (!v || v.value === null || typeof v.value === 'undefined') return '';
            if (v.kind === 'uri') return v.display || v.value;
            return String(v.value);
        }

        function toCellFullText(v) {
            if (!v) return '';
            var text = '';
            if (typeof v.value !== 'undefined' && v.value !== null) text += String(v.value);
            if (v.datatype) text += '\n^^' + v.datatype;
            if (v.lang) text += '\n@' + v.lang;
            return text;
        }
    </script>
</body>

</html>
