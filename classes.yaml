config:
  namespace: "https://incident.ccb.be/"

classes:
  - name: Command
    uri_template: "command/{command_hash}"
    relations:
      - name: hasComputer
        cardinality: n-to-1
        class: Computer
      - name: hasDescription
        cardinality: 1-to-1
        class: String
      - name: hasUser
        cardinality: n-to-1
        class: User

  - name: Computer
    uri_template: "computer/{hostname}"
    relations:
      - name: hasDomain
        cardinality: n-to-1
        class: String
      - name: hasHostname
        cardinality: 1-to-1
        class: String
      - name: hasIP
        cardinality: 1-to-1
        class: String

  - name: Detection
    uri_template: "detection/{}"
    relations:
      - name: hasComputer
        cardinality: n-to-1
        class: Computer
      - name: hasDescription
        cardinality: 1-to-1
        class: String
      - name: hasExtraInformation
        cardinality: 1-to-n
        class: String
      - name: hasID
        cardinality: 1-to-1
        class: UnsignedLong
      - name: hasName
        cardinality: 1-to-1
        class: String
      - name: hasTechnique
        cardinality: n-to-n
        class: String

  - name: Event
    is_instantiable: false
    children:
      - name: Configuration_event
        is_instantiable: false
        children:
          - name: RegistryLoad_configuration_event
            uri_template: "event/registry/load/{}"
          - name: RegistryModification_configuration_event
            uri_template: "event/registry/modify/{}"
          - name: ScheduledTaskCreation_configuration_event
            uri_template: "event/scheduled_task/creation/{}"
          - name: ScheduledTaskDeletion_configuration_event
            uri_template: "event/scheduled_task/deletion/{}"
          - name: ServiceInstallation_configuration_event
            uri_template: "event/service/installation/{}"
      - name: Logon_event

  - name: LogFile
    uri_template: "log_file/{log_file_path}"

  - name: Path # putting the path in the uri ? strange no ?

  - name: Process
    uri_template: "process/{executable_name}/"

  - name: Session

  - name: Threat

  - name: User