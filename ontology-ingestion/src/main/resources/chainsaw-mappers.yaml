mappers:
  - name: AntivirusMapper
    owlClass: Antivirus
    identifier:
      fields:
        - "Threat Name"
        - "timestamp"
      separator: "_"
    generics:
      - addTimestamp
      - addComputer
      - addLogFile
      - addUser
    fieldMappings:
      - sourceField: "Threat Name"
        type: dataProperty
        owlProperty: hasName
      - sourceField: "detections"
        type: dataProperty
        owlProperty: hasDescription
        prefix: "Antivirus detection: "
      - sourceField: "Threat Path"
        type: dataProperty
        owlProperty: hasExtraInformation
        prefix: "Threat Path: "
      - sourceField: "SHA1"
        type: dataProperty
        owlProperty: hasExtraInformation
        prefix: "SHA1: "
      - sourceField: "Threat Type"
        type: dataProperty
        owlProperty: hasExtraInformation
        prefix: "Threat Type: "

  - name: SigmaMapper
    owlClass: Sigma
    identifier:
      fields:
        - "detections"
        - "timestamp"
      separator: "_"
    staticProperties:
      - owlProperty: hasDescription
        value: "Sigma detection"
    generics:
      - addName
      - addTimestamp
      - addLogFile
      - addComputer
    fieldMappings:
      - sourceField: "Event Data"
        type: dataProperty
        owlProperty: hasExtraInformation
