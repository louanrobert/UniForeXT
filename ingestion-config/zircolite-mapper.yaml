genericMappings:
  addTimestamp:
    - sourceField: "SystemTime"
      type: dataProperty
      owlProperty: hasTimestamp
      dataType: xsd:dateTimeStamp

  addComputer:
    - type: linkedIndividual
      owlClass: Computer
      linkProperty: hasComputer
      identifier:
        fields: "Computer"
      dataProperties:
        - sourceField: "Computer"
          type: dataProperty
          owlProperty: hasHostname

  addOriginalLogFile:
    - type: linkedIndividual
      owlClass: LogFile
      linkProperty: hasLogFile
      identifier:
        fields: "OriginalLogfile"
        useHash: true
      nestedLinks:
        - type: linkedIndividual
          owlClass: Path
          linkProperty: hasPath
          identifier:
            fields: "OriginalLogfile"
            useHash: true
          nestedLinks:
            - sourceField: "OriginalLogfile"
              type: dataProperty
              owlProperty: hasContent

  addSubjectUser:
    - type: linkedIndividual
      owlClass: User
      linkProperty: hasUser
      identifier:
        fields: "SubjectUserName"
      dataProperties:
        - sourceField: "SubjectUserName"
          type: dataProperty
          owlProperty: hasName

mappers:
  - name: ZircoliteMapper
    file: "${ANALYSIS_ROOT}/Zircolite_results.csv"
    owlClass: Detection
    forensicTool: Zircolite
    delimiter: ';'
    identifier:
      fields:
        - "row_id"
        - "EventID"
        - "SystemTime"
      separator: "_"
    generics:
      - addTimestamp
      - addComputer
      - addOriginalLogFile
      - addSubjectUser
    fieldMappings:
      - sourceField: "rule_title"
        type: dataProperty
        owlProperty: hasName

      - sourceField: "rule_description"
        type: dataProperty
        owlProperty: hasDescription

      - sourceField: "EventID"
        type: dataProperty
        owlProperty: hasEventID
        dataType: xsd:unsignedLong

      - sourceField: "rule_level"
        type: dataProperty
        owlProperty: hasLevel
        unique: false

      - sourceField: "rule_count"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "Rule count: "

      - sourceField: "Provider_Name"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "Provider: "

      - sourceField: "Channel"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "Channel: "

      - sourceField: "Message"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "Message: "

      - sourceField: "ProcessName"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "Process: "

      - sourceField: "IpAddress"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "IP address: "

      - sourceField: "TargetUserName"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "Target user: "

      - sourceField: "ServiceName"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "Service: "

      - sourceField: "ImageName"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "Image: "

      - sourceField: "Command"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "Command: "

      - sourceField: "ScriptBlockText"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "Script block: "

      - sourceField: "ObjectName"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "Object: "

      - sourceField: "FilePath"
        type: dataProperty
        owlProperty: hasExtraInformation
        unique: false
        prefix: "File path: "